    <title>사회과학 분야에 코딩 에이전트는 얼마나 퍼졌나: 사회과학자 1,260명 설문 분석 (feat. Anthropic) - 읽을거리&amp;정보공유 - PyTorchKR</title>
    <meta name="description" content="코딩 에이전트와 사회과학 연구
한 명의 사회과학자가 새로운 연구 아이디어를 떠올렸다고 해봅시다. 과거에는 데이터를 내려받아 정리하고, 분석 코드를 한 줄씩 작성하고, 결과를 해석한 뒤 다시 코드를 고치는 지난한 과정을 모두 스스로 거쳐야 했습니다. 사람의 손을 반드시 거쳐야 했던 이 실증 연구의 핵심 단계들이, 이제는 처음으로 기계에 통째로 위임될 수 있게 되었습니다. 
Anthropic의 이번 보고서는 이러한 변화가 실제 사회과학 연구 현장에 얼마나 스며들었는지를, 정량 사회과학자 1{,}260 명을 대상으로 한 설문으로 처음 측정한 결과를 다룹니다. 핵심 질문은 분명합니다. 누가 코딩 에이전트를 쓰고 있고, 무엇에 쓰며, 그 결과 연구 산출물은 어떻게 달라지는가? 결론부터 말하면, 설문 응답자의 단 20\% 만이 코딩 에이전트를 정기적으로 사용하고 있었고, 그 사용은 분야와 경력, 심지어 성별에 따라 매우 불균등하게 나뉘어 있었습니다. 
챗봇을 넘어 코딩 에이전트로
최근 몇 년 사이 생성형 AI(generative AI)는 과학 연구에 빠르게 침투했습니다. 가장 권위 있는 학술지의 논문에서도, 그리고 사회과학 분야에서도 AI 챗봇의 기여가 점점 늘고 있습니다. 이는 AI가 연구 생산성을 끌어올릴 것이라는 기대를 낳는 한편, 동료 평가(peer review)의 과부하와 학술 &amp;#39;AI 슬롭(slop)&amp;#39;의 범람에 대한 우려도 함께 키우고 있습니다. 
하지만 지금까지 차례를 주고받는(turn-taking) 방식의 AI 챗봇은 주로 글쓰기 보조에 쓰였습니다. 분석의 설계와 실행, 해석이라는 무거운 작업은 여전히 사람의 몫으로 남아 있었습니다. 챗봇은 사람이 던진 질문에 답을 돌려줄 뿐, 데이터셋을 직접 붙들고 분석을 끝까지 굴리지는 못했기 때문입니다. 
코딩 에이전트(coding agent)는 결이 다릅니다. Claude Code 나 Codex 같은 에이전트형 코딩 플랫폼은 연구 아이디어와 데이터셋을 건네받으면, 분석 코드를 작성하고 실행하며 출력을 해석하고 다&amp;hellip;">

        <div class="hidden" id="data-preloaded" data-preloaded="{&quot;topic_10483&quot;:&quot;{\&quot;post_stream\&quot;:{\&quot;posts\&quot;:[{\&quot;id\&quot;:20094,\&quot;name\&quot;:\&quot;박정환\&quot;,\&quot;username\&quot;:\&quot;9bow\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.pytorch.kr/9bow/{size}/16301_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-06-04T06:30:39.027Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/a/f/af090456b7515397c668d72b346c1b3f1ac94f44.png\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/af090456b7515397c668d72b346c1b3f1ac94f44\\\&quot; title=\\\&quot;사회과학에 코딩 에이전트는 얼마나 퍼졌나: 사회과학자 1,260명 설문 분석 (feat. Anthropic)\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/a/f/af090456b7515397c668d72b346c1b3f1ac94f44.png\\\&quot; alt=\\\&quot;사회과학에 코딩 에이전트는 얼마나 퍼졌나: 사회과학자 1,260명 설문 분석 (feat. Anthropic)\\\&quot; data-base62-sha1=\\\&quot;oYqSjxtsqkk8bd8lPqJIRGso256\\\&quot; width=\\\&quot;883\\\&quot; height=\\\&quot;499\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003e사회과학에 코딩 에이전트는 얼마나 퍼졌나: 사회과학자 1,260명 설문 분석 (feat. Anthropic)\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e883×499 39.2 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20094-h-1\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-1\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e코딩 에이전트와 사회과학 연구\\u003c/h2\\u003e\\n\\u003cp\\u003e한 명의 사회과학자가 새로운 연구 아이디어를 떠올렸다고 해봅시다. 과거에는 데이터를 내려받아 정리하고, 분석 코드를 한 줄씩 작성하고, 결과를 해석한 뒤 다시 코드를 고치는 지난한 과정을 모두 스스로 거쳐야 했습니다. 사람의 손을 반드시 거쳐야 했던 이 실증 연구의 핵심 단계들이, 이제는 처음으로 기계에 통째로 위임될 수 있게 되었습니다.\\u003c/p\\u003e\\n\\u003cp\\u003eAnthropic의 이번 보고서는 이러한 변화가 실제 사회과학 연구 현장에 얼마나 스며들었는지를, 정량 사회과학자 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e1{,}260\\u003c/span\\u003e 명을 대상으로 한 설문으로 처음 측정한 결과를 다룹니다. 핵심 질문은 분명합니다. \\u003cstrong\\u003e누가\\u003c/strong\\u003e 코딩 에이전트를 쓰고 있고, \\u003cstrong\\u003e무엇에\\u003c/strong\\u003e 쓰며, 그 결과 연구 산출물은 \\u003cstrong\\u003e어떻게\\u003c/strong\\u003e 달라지는가? 결론부터 말하면, 설문 응답자의 단 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e20\\\\%\\u003c/span\\u003e 만이 코딩 에이전트를 정기적으로 사용하고 있었고, 그 사용은 분야와 경력, 심지어 성별에 따라 매우 불균등하게 나뉘어 있었습니다.\\u003c/p\\u003e\\n\\u003ch3\\u003e\\u003ca name=\\\&quot;p-20094-h-2\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-2\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e챗봇을 넘어 코딩 에이전트로\\u003c/h3\\u003e\\n\\u003cp\\u003e최근 몇 년 사이 생성형 AI(generative AI)는 과학 연구에 빠르게 침투했습니다. \\u003ca href=\\\&quot;https://www.nature.com/articles/s41562-025-02273-8\\\&quot;\\u003e가장 권위 있는 학술지\\u003c/a\\u003e의 논문에서도, 그리고 \\u003ca href=\\\&quot;https://sociologicalscience.com/articles-v13-3-45/\\\&quot;\\u003e사회과학\\u003c/a\\u003e 분야에서도 AI 챗봇의 기여가 점점 늘고 있습니다. 이는 AI가 연구 생산성을 끌어올릴 것이라는 기대를 낳는 한편, 동료 평가(peer review)의 과부하와 학술 &#39;AI 슬롭(slop)&#39;의 범람에 대한 우려도 함께 키우고 있습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e하지만 지금까지 차례를 주고받는(turn-taking) 방식의 AI 챗봇은 주로 \\u003ca href=\\\&quot;https://sociologicalscience.com/articles-v13-3-45/\\\&quot;\\u003e글쓰기 보조\\u003c/a\\u003e에 쓰였습니다. 분석의 설계와 실행, 해석이라는 무거운 작업은 여전히 사람의 몫으로 남아 있었습니다. 챗봇은 사람이 던진 질문에 답을 돌려줄 뿐, 데이터셋을 직접 붙들고 분석을 끝까지 굴리지는 못했기 때문입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e코딩 에이전트(coding agent)는 결이 다릅니다. \\u003cstrong\\u003eClaude Code\\u003c/strong\\u003e 나 \\u003cstrong\\u003eCodex\\u003c/strong\\u003e 같은 에이전트형 코딩 플랫폼은 연구 아이디어와 데이터셋을 건네받으면, 분석 코드를 작성하고 실행하며 출력을 해석하고 다시 수정하는 과정을 자율적으로 반복합니다. 그동안 사람만이 할 수 있다고 여겨졌던 실증 연구의 단계들이, 처음으로 \\u003ca href=\\\&quot;https://www.nber.org/papers/w34202\\\&quot;\\u003e자동화\\u003c/a\\u003e될 수 있게 된 것입니다. 극단적으로는 \\u003ca href=\\\&quot;https://www.nature.com/articles/s41586-026-10265-5\\\&quot;\\u003e컴퓨터 과학 연구\\u003c/a\\u003e나 \\u003ca href=\\\&quot;https://osf.io/preprints/socarxiv/24xfq_v1\\\&quot;\\u003e사회과학 연구 아이디어\\u003c/a\\u003e를 자율적으로 수행하는 다중 에이전트(multi-agent) 파이프라인까지 등장했습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이러한 도구는 과학을 가속하고 더 과감하게 만들 수 있습니다. 연구 실행이 빨라진다는 것은 곧 발견이 값싸고 풍부해진다는 뜻이기 때문입니다. 그러나 동시에 연구 자원의 격차를 증폭시키고, 학술 기록의 혼잡(congestion)을 악화시킬 위험도 있습니다. 더 근본적으로는, AI가 점점 더 넓은 범위의 연구 작업을 떠맡게 되면서 AI 특유의 분석적 선택이 우리가 경제와 사회, 그리고 우리 자신을 이해하는 방식에 흔적을 남길 수도 있습니다.\\u003c/p\\u003e\\n\\u003ch3\\u003e\\u003ca name=\\\&quot;p-20094-h-3\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-3\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e이 설문은 무엇을 보았나\\u003c/h3\\u003e\\n\\u003cp\\u003e연구진은 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e2026\\u003c/span\\u003e 년 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e2\\u003c/span\\u003e 월 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e20\\u003c/span\\u003e 일부터 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e3\\u003c/span\\u003e 월 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e24\\u003c/span\\u003e 일까지, 미국과 캐나다에서 활동 중인 정량 사회과학자를 대상으로 설문을 진행했습니다. 다만 이는 대표 표본(representative sample)이 아닙니다. 응답자들은 Claude Max 계정 접근권을 제공하는 연구에 모집되었기 때문에, AI 도구에 호기심을 가진 연구자 쪽으로 표본이 기울었을 수 있습니다. 그럼에도 응답자들은 더 일반적인 초대를 받은 이전 표본(파일럿)과 상당히 유사했는데, 이에 대해서는 마지막 절에서 다시 짚습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e표본은 다섯 갈래로 모았습니다. 사회학, 정치학, 경영학, 경제학, 심리학, 교육학, 공중보건 학과의 교수와 학생 연락처를 미국 R1 및 주요 캐나다 연구중심대학 웹사이트에서 수집했고, 오픈 학술 데이터베이스 \\u003ca href=\\\&quot;https://openalex.org/\\\&quot;\\u003eOpenAlex\\u003c/a\\u003e로 최근 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e1\\u003c/span\\u003e 년 내 논문을 낸 활동적 연구자를 추렸으며, 학회 프로그램과 대학원 주임교수를 통한 배포, 미국사회학회(ASA)나 경영학회(Academy of Management) 같은 학술 커뮤니티의 메일링 리스트도 활용했습니다. 이렇게 직접 이메일을 보낸 학자만 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e44{,}700\\u003c/span\\u003e 명입니다. 초기 스크리너(screener)에서 정량적 실증 데이터를 다루는 연구자로 한정했고, 박사 과정생은 최소 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e2\\u003c/span\\u003e 년 차 이상이면서 학계 진출을 계획하는 경우만 포함했습니다. 설문을 마친 응답자에게는 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e10\\u003c/span\\u003e 달러 기프트 카드를 제공했으며, 스크리너와 완료 조건을 적용한 최종 분석 표본이 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e1{,}260\\u003c/span\\u003e 명입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a.jpeg\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/88c399270e500af480e2144ad4b170797ecdb46a\\\&quot; title=\\\&quot;분야별 코딩 에이전트와 AI 도구 채택률을 나란히 보여주는 막대 그래프 / Adoption of coding agents by discipline\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a_2_1028x578.jpeg\\\&quot; alt=\\\&quot;분야별 코딩 에이전트와 AI 도구 채택률을 나란히 보여주는 막대 그래프 / Adoption of coding agents by discipline\\\&quot; data-base62-sha1=\\\&quot;jvS0cHmkyp1ah0DEENx8JD2V5aO\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;578\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a_2_2056x1156.jpeg 2x\\\&quot; data-dominant-color=\\\&quot;F2F0EB\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003e분야별 코딩 에이전트와 AI 도구 채택률을 나란히 보여주는 막대 그래프 / Adoption of coding agents by discipline\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e3840×2160 232 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e응답자는 경제학, 정치학, 사회학이 각각 전체의 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e\\\\frac{1}{5}\\u003c/span\\u003e 씩으로 고르게 나뉘었고, 경영과학과 심리학이 그 뒤를 바짝 따랐습니다. 공중보건, 교육학, 커뮤니케이션 연구자도 소수 포함되었습니다. 직급으로는 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e40\\\\%\\u003c/span\\u003e 가 정교수 또는 부교수, \\u003cspan class=\\\&quot;math\\\&quot;\\u003e25\\\\%\\u003c/span\\u003e 가 조교수, 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e30\\\\%\\u003c/span\\u003e 가 박사 과정생이었습니다. 흥미롭게도 응답자가 자유 서술로 적은 분야는 원래 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e318\\u003c/span\\u003e 개의 고유 값이었는데, 연구진은 이를 Claude를 활용한 분류와 수작업 코딩을 병행해 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e8\\u003c/span\\u003e 개의 분야 범주와 잔여 &#39;Other&#39; 범주로 정리했습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e중요한 점은, 이번 설문이 더 큰 연구의 \\u003cstrong\\u003e기준선(baseline) 조사\\u003c/strong\\u003e 라는 것입니다. 연구진은 일부 연구자에게 Claude Code 접근권을 무작위로 제공하는 무작위 실험(randomized experiment)을 포함한 후속 연구를 진행 중이며, 코딩 에이전트가 연구 생산성에 미치는 인과적 효과는 향후 별도로 발표할 예정입니다. 이번 글은 그 출발점에서, 누가 이 도구를 쓰고 있고 무엇에 쓰는지를 먼저 짚는 첫 단면입니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20094-h-4\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-4\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e코딩 에이전트는 아직 대다수에게 닿지 않았다\\u003c/h2\\u003e\\n\\u003cp\\u003e연구진은 AI 사용을 두 가지 방식으로 측정했습니다. 먼저 \\\&quot;\\u003cem\\u003e연구 과정에 도움을 받기 위해 생성형 AI 모델을 사용한 적이 있는가?\\u003c/em\\u003e\\\&quot;라고 물었을 때, 응답자의 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e81\\\\%\\u003c/span\\u003e 가 그렇다고 답했습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e그렇다면 점점 더 강력해지는 코딩 에이전트를 실제 워크플로우에 받아들인 사람은 얼마나 될까요? 연구진은 \\\&quot;\\u003cem\\u003e명령줄(command line)에 통합된 AI 코딩 어시스턴트(Codex, Cursor, Claude Code 등)를 일주일에 한 번 이상 정기적으로 사용하는가?\\u003c/em\\u003e\\\&quot;라고 물은 뒤, 후속 질문으로 실제 그 도구들(또는 Google Antigravity) 중 하나를 쓰는지 검증했습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e그 결과, 코딩 에이전트를 사용하는 응답자는 \\u003cstrong\\u003e단 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e20\\\\%\\u003c/span\\u003e\\u003c/strong\\u003e 에 그쳤습니다. 이번 설문은 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e2025\\u003c/span\\u003e 년 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e12\\u003c/span\\u003e 월 말 Claude Code와 Opus \\u003cspan class=\\\&quot;math\\\&quot;\\u003e4.6\\u003c/span\\u003e 을 둘러싼 논의가 한바탕 일고 약 두 달 뒤에 이뤄졌습니다. 그런데도 AI에 관심이 있어 스스로 설문에 참여한 응답자들 사이에서조차, 코딩 에이전트를 워크플로우에 들인 사람은 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e5\\u003c/span\\u003e 명 중 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e1\\u003c/span\\u003e 명꼴에 불과했던 것입니다. 사용자 중에서는 Claude Code가 가장 흔해서 코딩 에이전트 사용자의 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e86\\\\%\\u003c/span\\u003e 가 Claude Code를 쓴다고 답했고, 그다음으로 흔한 Codex는 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e31\\\\%\\u003c/span\\u003e 였습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e위 히어로 그래프(Figure 1)의 기준선은 전체 AI 사용률을 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e81\\\\%\\u003c/span\\u003e, 전체 코딩 에이전트 사용률을 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e19\\\\%\\u003c/span\\u003e (본문 서술에서는 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e20\\\\%\\u003c/span\\u003e 로 반올림)로 표시합니다. 두 값 사이의 큰 간극은, 챗봇으로 AI의 문을 두드린 사람은 많아도 분석을 자율적으로 굴리는 에이전트까지 나아간 사람은 아직 소수라는 뜻입니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20094-h-5\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-5\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e채택은 매우 불균등하다\\u003c/h2\\u003e\\n\\u003ch3\\u003e\\u003ca name=\\\&quot;p-20094-h-6\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-6\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e분야와 경력에 따른 격차\\u003c/h3\\u003e\\n\\u003cp\\u003e전체 채택률 안에는 분야별로 큰 편차가 숨어 있습니다. 경제학자의 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e38\\\\%\\u003c/span\\u003e, 정치학자의 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e25\\\\%\\u003c/span\\u003e 가 코딩 에이전트를 쓰는 반면, 공중보건(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e6\\\\%\\u003c/span\\u003e ), 커뮤니케이션(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e6\\\\%\\u003c/span\\u003e ), 교육학(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e4\\\\%\\u003c/span\\u003e )은 한 자릿수에 머물렀습니다. 이 기울기는 전체 AI 사용률의 분야별 차이와 대체로 같은 방향이지만, 코딩 에이전트 채택의 격차가 평균적으로 더 가팔랐습니다. 정량적 데이터 분석이 연구의 중심에 있는 분야일수록 코딩 에이전트의 효용을 먼저 체감한 셈입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e경력 단계에 따른 격차는 더 극적입니다. 박사 과정생과 박사후연구원(postdoc)의 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e\\\\frac{1}{4}\\u003c/span\\u003e 이상이 최소 주 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e1\\u003c/span\\u003e 회 코딩 에이전트를 쓰는 반면, 정년을 보장받은(tenured) 교수에서는 그 비율이 절반 넘게 떨어집니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3.jpeg\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/dd433c653099890c90cbe64c0ee6b53a5f2665f3\\\&quot; title=\\\&quot;경력 단계별 AI 사용률과 코딩 에이전트 사용률을 비교한 선 그래프, 박사 과정생에서 정교수로 갈수록 사용률이 하락 / AI adoption by career stage\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3_2_1028x578.jpeg\\\&quot; alt=\\\&quot;경력 단계별 AI 사용률과 코딩 에이전트 사용률을 비교한 선 그래프, 박사 과정생에서 정교수로 갈수록 사용률이 하락 / AI adoption by career stage\\\&quot; data-base62-sha1=\\\&quot;vznzxCfd0ieLqIlEBbxIzJ0spKH\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;578\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3_2_2056x1156.jpeg 2x\\\&quot; data-dominant-color=\\\&quot;F2F1EB\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003e경력 단계별 AI 사용률과 코딩 에이전트 사용률을 비교한 선 그래프, 박사 과정생에서 정교수로 갈수록 사용률이 하락 / AI adoption by career stage\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e3840×2160 182 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eFigure 2를 보면, 전체 AI 사용률(파란 선)은 박사 과정생 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e92\\\\%\\u003c/span\\u003e 에서 정교수 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e68\\\\%\\u003c/span\\u003e 로 완만하게 떨어지지만, 코딩 에이전트 사용률(주황 선)은 박사후연구원 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e28\\\\%\\u003c/span\\u003e 에서 정교수 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e9\\\\%\\u003c/span\\u003e 로 훨씬 가파르게 추락합니다. 코딩 에이전트를 받아들이는 쪽은 결국 젊은 연구자들입니다. 이들은 기술적으로 더 능숙하고, 코드와 데이터를 직접 다룰 가능성이 높으며, 연구 성과를 내야 한다는 경력상의 압박도 더 강하게 받기 때문입니다.\\u003c/p\\u003e\\n\\u003ch3\\u003e\\u003ca name=\\\&quot;p-20094-h-7\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-7\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e성별과 대학 위상에 따른 불균등\\u003c/h3\\u003e\\n\\u003cp\\u003e격차는 분야와 경력을 넘어섭니다. 연구진이 응답자의 이름을 성별로 분류한 결과, 전형적으로 남성으로 분류되는 이름을 가진 연구자가 전형적으로 여성으로 분류되는 이름을 가진 연구자보다 코딩 에이전트를 \\u003cstrong\\u003e\\u003cspan class=\\\&quot;math\\\&quot;\\u003e2\\u003c/span\\u003e 배 넘게\\u003c/strong\\u003e 채택하고 있었습니다(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e22\\\\%\\u003c/span\\u003e 대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e9\\\\%\\u003c/span\\u003e ). 여기서 성별은 응답자가 직접 밝힌 이름을 \\u003ccode\\u003egender_guesser\\u003c/code\\u003e 파이썬 라이브러리로 추정한 것으로, male과 mostly_male을 &#39;전형적 남성 이름&#39;, female과 mostly_female을 &#39;전형적 여성 이름&#39;으로 묶고 중성적이거나 판별 불가능한 이름은 분석에서 제외했습니다. 즉 자기 식별이 아니라 이름 기반 추정값이라는 점은 감안해야 합니다. 위상이 높은 대학과 사립 대학에서도 사용률이 눈에 띄게 높았습니다. 이 모든 차이는 \\u003cspan class=\\\&quot;math\\\&quot;\\u003ep\\u0026lt;0.05\\u003c/span\\u003e 수준에서 통계적으로 유의했습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834.jpeg\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/e320fbc76e712cf1e879cfb9bfde15763b5ce834\\\&quot; title=\\\&quot;경력, 성별, 대학 속성에 따른 AI 사용과 코딩 에이전트 사용의 채택률 차이를 보여주는 두 패널 막대 그래프 / Differences in AI and coding agent adoption\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834_2_1028x578.jpeg\\\&quot; alt=\\\&quot;경력, 성별, 대학 속성에 따른 AI 사용과 코딩 에이전트 사용의 채택률 차이를 보여주는 두 패널 막대 그래프 / Differences in AI and coding agent adoption\\\&quot; data-base62-sha1=\\\&quot;wph3glC8MB9vXHyuzve0yNQ92EA\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;578\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834_2_2056x1156.jpeg 2x\\\&quot; data-dominant-color=\\\&quot;E1E4E2\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003e경력, 성별, 대학 속성에 따른 AI 사용과 코딩 에이전트 사용의 채택률 차이를 보여주는 두 패널 막대 그래프 / Differences in AI and coding agent adoption\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e3840×2160 265 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eFigure 3의 두 패널은 핵심을 분명히 보여줍니다. 왼쪽 패널(AI 사용)에서 집단 간 차이는 비교적 작습니다. 남성 이름 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e81\\\\%\\u003c/span\\u003e 대 여성 이름 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e78\\\\%\\u003c/span\\u003e, 상위 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e25\\u003c/span\\u003e 위 대학 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e83\\\\%\\u003c/span\\u003e 대 그 외 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e81\\\\%\\u003c/span\\u003e 로 격차가 미미합니다. 그러나 오른쪽 패널(코딩 에이전트 사용)에서는 격차가 훨씬 큽니다. 같은 성별 비교에서 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e22\\\\%\\u003c/span\\u003e 대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e9\\\\%\\u003c/span\\u003e, 대학 위상 비교에서 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e24\\\\%\\u003c/span\\u003e 대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e17\\\\%\\u003c/span\\u003e 로 벌어집니다(상위 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e25\\u003c/span\\u003e 개 대학은 Nature Index \\u003cspan class=\\\&quot;math\\\&quot;\\u003e2025\\u003c/span\\u003e 선도 기관 기준이며 표본의 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e28\\\\%\\u003c/span\\u003e 를 차지합니다). 사립 대학(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e23\\\\%\\u003c/span\\u003e )과 공립 대학(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e17\\\\%\\u003c/span\\u003e ) 사이에서도 같은 방향의 격차가 나타납니다.\\u003c/p\\u003e\\n\\u003cp\\u003e특히 주목할 점은, 성별 격차가 단순히 &#39;AI를 시도해 본 비율&#39;의 차이로 설명되지 않는다는 것입니다. AI를 연구에 써본 적 있는 응답자만 추려도, 정기적인 코딩 에이전트 사용에서의 성별 격차는 전체 표본에서보다 오히려 약간 더 컸습니다. 이 차이는 같은 분야와 같은 경력 단계 안에서 비교해도 그대로 유지되었습니다. 코딩 에이전트 채택이 적어도 이 초기 국면에서는 AI 전반의 채택보다 더 큰 불평등을 안고 있음을 시사합니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20094-ai-8\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-ai-8\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e연구자들은 AI로 무엇을 하는가\\u003c/h2\\u003e\\n\\u003cp\\u003e채택률만큼 흥미로운 것은 &#39;용도&#39;입니다. AI를 쓰는 연구자들은 코딩 에이전트든 챗봇이든 실제로 무엇에 AI를 활용하고 있을까요? AI와 학술 연구를 둘러싼 논쟁은 그동안 글쓰기에 집중되어 왔습니다. 환각으로 지어낸 문헌 검토, 형식적인 서론에 흩뿌려진 \\\&quot;\\u003cem\\u003e이것은 X가 아니라 Y다\\u003c/em\\u003e\\\&quot; 같은 표현, 그리고 논문 작성의 완전 자동화 가능성 같은 것들입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d.jpeg\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/8b17879979f8322fd0528aff522be6bee170c00d\\\&quot; title=\\\&quot;코딩 에이전트 사용자와 그 외 AI 사용자의 용도별 사용 비율, 그리고 분야별 용도 비율을 보여주는 막대 그래프와 히트맵 / What researchers use AI to do\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d_2_1028x578.jpeg\\\&quot; alt=\\\&quot;코딩 에이전트 사용자와 그 외 AI 사용자의 용도별 사용 비율, 그리고 분야별 용도 비율을 보여주는 막대 그래프와 히트맵 / What researchers use AI to do\\\&quot; data-base62-sha1=\\\&quot;jQsMohHX6VeJbNbYzT001s3xqjz\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;578\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d_2_2056x1156.jpeg 2x\\\&quot; data-dominant-color=\\\&quot;DDD8CC\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003e코딩 에이전트 사용자와 그 외 AI 사용자의 용도별 사용 비율, 그리고 분야별 용도 비율을 보여주는 막대 그래프와 히트맵 / What researchers use AI to do\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e3840×2160 297 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e그러나 Figure 4가 보여주는 현실은 다릅니다. 코딩 에이전트 사용자든 그 외 사용자든 가장 흔한 용도는 정량 데이터 분석을 위한 \\u003cstrong\\u003e코드 작성\\u003c/strong\\u003e 입니다. 코딩 에이전트 사용자의 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e97\\\\%\\u003c/span\\u003e, 그 외 AI 사용자의 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e77\\\\%\\u003c/span\\u003e 가 코드 생성에 AI를 쓴다고 답했습니다. 그다음이 산문 편집(edit prose)이었고, 방법론 조언과 선행 연구 배경 조사가 뒤를 이었습니다. 흥미롭게도 코딩 에이전트 사용자와 그 외 사용자를 합쳐도, 산문 초안 작성(draft prose)에 AI를 써본 사람은 전체 AI 사용자의 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e\\\\frac{1}{3}\\u003c/span\\u003e 에 불과했습니다. 이 패턴은 대체로 모든 분야에서 유지되었고, 산문 초안 작성을 흔히 하는 분야는 경제학과 경영학 정도였습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e같은 용도라도 코딩 에이전트 사용자가 모든 항목에서 더 높은 비율을 보인다는 점도 눈에 띕니다. 코드 작성(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e97\\\\%\\u003c/span\\u003e 대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e77\\\\%\\u003c/span\\u003e ), 산문 편집(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e87\\\\%\\u003c/span\\u003e 대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e72\\\\%\\u003c/span\\u003e ), 방법론 조언(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e77\\\\%\\u003c/span\\u003e 대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e63\\\\%\\u003c/span\\u003e ), 문헌 검토(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e76\\\\%\\u003c/span\\u003e 대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e60\\\\%\\u003c/span\\u003e )에 이르기까지, 에이전트를 쓰는 사람은 AI를 더 다양한 작업에 더 깊이 끌어들이고 있었습니다. AI에 대한 두려움의 초점이 &#39;글쓰기&#39;에 맞춰져 있는 동안, 정작 현장에서 AI가 가장 활발히 쓰이는 곳은 &#39;분석 코드&#39;였던 셈입니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20094-h-9\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-9\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e코딩 에이전트 사용자는 더 생산적인가\\u003c/h2\\u003e\\n\\u003cp\\u003e이쯤 되면 자연스럽게 떠오르는 질문이 있습니다. 코딩 에이전트는 연구자를 더 생산적으로 만들까요? 사실 이것이 이번 설문이 출발점으로 삼은 더 큰 연구의 핵심 질문입니다. 인과관계를 가리는 실험은 아직 진행 중이지만, 기준선 설문만으로도 코딩 에이전트 사용자와 그 외 연구자를 연구 과정의 여러 길목에서 비교해 볼 수 있습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e다만 이 비교는 순수하게 기술적(descriptive)이라는 점을 분명히 해야 합니다. 코딩 에이전트 사용을 스스로 택한 연구자와 그렇지 않은 연구자는 측정되지 않은 여러 면에서 다를 수밖에 없습니다. 따라서 아래 차이는 인과적 효과가 아니라, 두 집단을 처음으로 나란히 견주어 본 결과로 읽어야 합니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f.jpeg\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/a77aae6ad40219fba44be53c7199f8f482da0f5f\\\&quot; title=\\\&quot;코딩 에이전트 사용자와 비사용자 간 연구 산출물의 생산성 차이를 신뢰구간과 함께 보여주는 점 추정 그래프 / Productivity differences between coding agent users and others\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f_2_1028x578.jpeg\\\&quot; alt=\\\&quot;코딩 에이전트 사용자와 비사용자 간 연구 산출물의 생산성 차이를 신뢰구간과 함께 보여주는 점 추정 그래프 / Productivity differences between coding agent users and others\\\&quot; data-base62-sha1=\\\&quot;nTAA1EBcCJP2fiQvYiSOAAJXToX\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;578\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f_2_2056x1156.jpeg 2x\\\&quot; data-dominant-color=\\\&quot;F1EFEB\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003e코딩 에이전트 사용자와 비사용자 간 연구 산출물의 생산성 차이를 신뢰구간과 함께 보여주는 점 추정 그래프 / Productivity differences between coding agent users and others\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e3840×2160 194 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eFigure 5는 설문 직전 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e6\\u003c/span\\u003e 개월 동안 자가 보고된 연구 산출물을, 프로젝트 착수부터 논문 제출까지 단계별로 보여줍니다. 경력 단계와 분야, 설문 응답 시기를 통제한 추정치에서, 코딩 에이전트 사용자는 더 많은 프로젝트를 시작하고(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e+9\\\\%\\u003c/span\\u003e, 유의), 더 많은 워킹페이퍼(working paper)를 공개하며(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e+73\\\\%\\u003c/span\\u003e, 고도로 유의), 더 많은 연구비를 신청하고(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e+33\\\\%\\u003c/span\\u003e, 고도로 유의), 학회 발표 제출도 다소 더 많았습니다(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e+10\\\\%\\u003c/span\\u003e ).\\u003c/p\\u003e\\n\\u003cp\\u003e비율로 환산하면, 코딩 에이전트 사용자는 같은 분야와 경력 단계의 동료보다 실증 프로젝트 착수에서 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e10\\\\%\\u003c/span\\u003e, 워킹페이퍼 공개에서 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e75\\\\%\\u003c/span\\u003e 더 생산적으로 보입니다. 절대량으로도 프로젝트는 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e\\\\frac{1}{4}\\u003c/span\\u003e 편, 워킹페이퍼는 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e\\\\frac{1}{2}\\u003c/span\\u003e 편 더 많은 셈입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e그런데 이 생산성 차이는 연구 파이프라인의 \\u003cstrong\\u003e앞단\\u003c/strong\\u003e 에서만 나타납니다. 코딩 에이전트 사용자가 저널에 새 논문을 더 많이 제출하거나(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e+3\\\\%\\u003c/span\\u003e, 유의하지 않음) 논문을 더 빨리 재제출한다(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e-6\\\\%\\u003c/span\\u003e, 유의하지 않음)는 증거는 발견되지 않았습니다. 이는 코딩 에이전트 사용이 최근에야 시작된 현상이라 논문이 제출 단계에 이르기까지의 시차 때문일 수도 있습니다. 그러나 코딩 에이전트가 프로젝트를 시작하고 굴리는 데는 유용해도, 논문을 저널에 제출할 수 있을 만큼 다듬는 &#39;마지막 1마일(last mile)&#39;에서는 덜 유용할 가능성도 있습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이 보정(adjustment)이 왜 중요한지는 부록의 미보정(unadjusted) 수치와 견주면 분명해집니다. 분야와 경력을 통제하지 않은 원시 비교(Figure A1)에서는 코딩 에이전트 사용자가 오히려 저널에 논문을 \\u003cstrong\\u003e더 적게\\u003c/strong\\u003e 제출하는 것으로 나타납니다. 그러나 이는 코딩 에이전트 채택이 특정 분야와 경력 단계에 쏠려 있어 생기는 착시로, 이 요인들을 통제하면 그 음의 차이가 사라지고 유의하지 않은 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e+3\\\\%\\u003c/span\\u003e 로 바뀝니다. 보정 모형은 경력 단계(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e5\\u003c/span\\u003e 개 범주), 분야(\\u003cspan class=\\\&quot;math\\\&quot;\\u003e9\\u003c/span\\u003e 개 범주), 설문 응답 주차를 고정효과(fixed effect)로 넣은 OLS 회귀이며, 이분산에 강건한(heteroskedasticity-robust) 표준오차를 쓰고 추정 계수 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e\\\\beta\\u003c/span\\u003e 를 비사용자 평균으로 나눠 백분율 차이를 구합니다. 푸아송(Poisson) 모형으로 바꿔도 결과는 비슷했습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20094-h-10\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-10\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e연구자들의 기대와 우려\\u003c/h2\\u003e\\n\\u003cp\\u003e연구진은 연구자들이 AI 도구에 무엇을 기대하는지도 물었습니다. AI는 출판 가능한 논문을 쓰는 데 있어 사회과학자를 더 생산적으로 만드는가? 그리고 AI는 사회과학 전체를 더 낫게 만들 것인가, 아니면 더 나쁘게 만들 것인가?\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534.jpeg\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/dbf9f8f40291d0b9150803e53190f67739f37534\\\&quot; title=\\\&quot;AI 사용 사례 수에 따른 생산성 기대와 분야 영향 기대, 그리고 에이전트 사용 여부에 따른 기대를 비교한 점 그래프 / What researchers expect from AI adoption\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534_2_1028x578.jpeg\\\&quot; alt=\\\&quot;AI 사용 사례 수에 따른 생산성 기대와 분야 영향 기대, 그리고 에이전트 사용 여부에 따른 기대를 비교한 점 그래프 / What researchers expect from AI adoption\\\&quot; data-base62-sha1=\\\&quot;vo08276Wba0D17jRRmOeuwWz3Wk\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;578\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534_2_2056x1156.jpeg 2x\\\&quot; data-dominant-color=\\\&quot;F2F1ED\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003eAI 사용 사례 수에 따른 생산성 기대와 분야 영향 기대, 그리고 에이전트 사용 여부에 따른 기대를 비교한 점 그래프 / What researchers expect from AI adoption\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e3840×2160 178 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e생산성에 대해서는 연구자들이 낙관적이었습니다. \\u003cspan class=\\\&quot;math\\\&quot;\\u003e1\\u003c/span\\u003e 부터 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e10\\u003c/span\\u003e 까지의 척도에서 응답자의 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e88\\\\%\\u003c/span\\u003e 가 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e5\\u003c/span\\u003e 점을 넘겼고, 절반이 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e8\\u003c/span\\u003e 점 이상을 줬습니다. Figure 6의 왼쪽이 보여주듯, AI를 더 많은 종류의 작업에 쓰는 연구자일수록 더 낙관적이었습니다(생산성 기대는 사용 사례 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e0\\u003c/span\\u003e 개일 때 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e6.1\\u003c/span\\u003e 점에서 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e6\\u003c/span\\u003e 개일 때 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e8.6\\u003c/span\\u003e 점으로 올라갑니다). 오른쪽은 코딩 에이전트 사용자가 비사용자보다 더 낙관적임을 보여줍니다. 구체적으로 코딩 에이전트 사용자는 생산성 기대를 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e8.6\\u003c/span\\u003e 점, 분야 영향 기대를 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e7.0\\u003c/span\\u003e 점으로 매겨, 비사용자(각각 약 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e7.2\\u003c/span\\u003e 점, \\u003cspan class=\\\&quot;math\\\&quot;\\u003e5.4\\u003c/span\\u003e 점)보다 두 항목 모두에서 더 높게 평가했습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이 설문이 애초에 AI 도구를 시도해 보고 싶어 하는 사람들로부터 표본을 끌어왔으니, 생산성에 대한 낙관이 보이는 것은 그리 놀랍지 않습니다. 그러나 이 낙관주의자들 사이에서조차, AI가 출판 가능한 논문 작성을 좁게 돕는 것에 대한 기대와 AI가 사회과학 전반에 미칠 영향에 대한 기대 사이에는 뚜렷한 간극이 있었습니다. 응답자의 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e70\\\\%\\u003c/span\\u003e 는 분야 전체에 대한 기대보다 논문 생산성에 대한 기대가 더 높았습니다. 분야 영향을 논문 생산성보다 더 낙관하는 연구자는 거의 없었고, 오히려 분야 영향을 더 비관하는 연구자가 많았습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이 간극은 의미심장합니다. 연구자들은 *\\\&quot;내 논문 생산성은 오르겠지만, 그 대가로 분야 전체에는 비용이 따를지 모른다\\\&quot;*고 우려하는 것으로 보입니다. 논문이 많아진다는 것은 곧 주목을 둘러싼 혼잡과 경쟁을 뜻할 수 있습니다. 또한 일부 연구자가 AI 도구를 선택적 보고(selective reporting)나 위험을 회피한 점진적 연구처럼, 사회과학의 기존 문제를 오히려 악화시키는 방식으로 쓸지 모른다는 두려움도 깔려 있습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20094-h-11\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-h-11\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e한계와 향후 연구 방향\\u003c/h2\\u003e\\n\\u003cp\\u003e이 보고서의 결과를 읽을 때 염두에 둘 한계가 몇 가지 있습니다. 첫째, 여기 제시된 데이터는 워크플로우와 AI 사용에 관한 연구에 참여하도록 명시적으로 모집된 정량 사회과학자들의 이메일 설문에 기반합니다. 따라서 응답자는 비응답자보다 AI를 더 많이 쓰고 더 낙관적일 가능성이 높습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e둘째, 앞서 본 초기 단계의 생산성 차이는 어디까지나 기술적으로 해석되어야 합니다. 코딩 에이전트의 초기 채택자는 비채택자보다 원래 더 생산적이거나, 설문으로 직접 측정할 수 없는 여러 면에서 다를 수 있습니다. 셋째, 이번 분석은 연구자가 보고한 산출물의 \\u003cstrong\\u003e양\\u003c/strong\\u003e 만 볼 뿐, 그 \\u003cstrong\\u003e질\\u003c/strong\\u003e 에 대해서는 아무것도 말하지 않습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e연구진은 이 선택 편향이 결과를 얼마나 왜곡하는지 직접 점검했습니다. 본 설문에 앞서 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e2\\u003c/span\\u003e 월 초 진행한 파일럿 조사는 후속 실험(Claude Max 접근권 제공)을 모집 단계에서 전혀 알리지 않고 *\\\&quot;연구 워크플로우의 변화\\\&quot;*에 관한 연구라고만 소개했기에, AI 관심도로 인한 자기 선택의 영향을 가늠하는 잣대가 됩니다. 비교가 공정하도록 본 표본을 파일럿과 같은 조건(사회학, 정치학, 경영학으로 한정하고 정교수 제외)으로 좁혀 견주면, 전체 AI 사용률은 파일럿 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e87.3\\\\%\\u003c/span\\u003e 대 본 표본 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e84.5\\\\%\\u003c/span\\u003e 로 거의 차이가 없었습니다. 본 표본이 더 많은 종류의 작업에 AI를 쓰고(평균 사용 사례 수 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e3.71\\u003c/span\\u003e 대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e3.12\\u003c/span\\u003e ) \\u003cspan class=\\\&quot;math\\\&quot;\\u003e1\\u003c/span\\u003e 부터 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e10\\u003c/span\\u003e 까지 척도에서 더 낙관적이긴 했지만(생산성 기대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e+0.46\\u003c/span\\u003e, 분야 영향 기대 \\u003cspan class=\\\&quot;math\\\&quot;\\u003e+0.93\\u003c/span\\u003e ), 핵심 경향은 그대로였습니다. 두 표본 모두에서 코드 작성과 편집이 가장 흔한 용도였고 산문 초안 작성은 드물었으며, 논문 생산성에 대한 기대가 분야 영향에 대한 기대를 웃도는 간극도 유지되었습니다. 요컨대 표본 선택은 AI를 향한 열의의 &#39;수준&#39;은 부풀렸을지언정, 이 글이 강조한 구조적 &#39;패턴&#39;까지 만들어 낸 것은 아니라는 뜻입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e연구진은 향후 업데이트에서 코딩 에이전트 사용자를 깨끗한 비교 집단(clean comparison group)과 견주고, 코딩 에이전트로 보강된 연구가 양뿐 아니라 내용 면에서도 달라 보이는지를 평가하겠다고 밝혔습니다. 무작위 실험의 결과가 더해지면, 지금의 기술적 관찰이 인과적 주장으로 한 걸음 나아갈 수 있을 것입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이러한 한계에도 불구하고, 이 보고서가 보여주는 그림은 분명합니다. 코딩 에이전트는 사회과학으로 확산되고 있습니다. 예컨대 우리가 경제와 정치를 연구하는 방식은, 점점 더 AI 코딩 에이전트가 일부 내려준 분석 결정을 거치게 됩니다. 이 자동화가 열어줄 잠재력과 그에 따르는 위험을 함께 직시하는 일이, 앞으로 사회과학이 마주할 중요한 과제가 될 것입니다. 누가 이 도구의 힘을 누리고 누가 뒤처지는가 하는 격차의 문제는, 그 과제의 한가운데에 놓여 있습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20094-scroll-anthropic-coding-agents-in-the-social-sciences-12\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20094-scroll-anthropic-coding-agents-in-the-social-sciences-12\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/images/emoji/fluentui/scroll.png?v=15\\\&quot; title=\\\&quot;:scroll:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:scroll:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e Anthropic의 Coding Agents in the Social Sciences 소개 블로그\\u003c/h2\\u003e\\n\\u003caside class=\\\&quot;onebox allowlistedgeneric\\\&quot; data-onebox-src=\\\&quot;https://www.anthropic.com/research/coding-agents-social-sciences\\\&quot;\\u003e\\n  \\u003cheader class=\\\&quot;source\\\&quot;\\u003e\\n      \\u003cimg               <p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/a/f/af090456b7515397c668d72b346c1b3f1ac94f44.png" data-download-href="https://discuss.pytorch.kr/uploads/default/af090456b7515397c668d72b346c1b3f1ac94f44" title="사회과학에 코딩 에이전트는 얼마나 퍼졌나: 사회과학자 1,260명 설문 분석 (feat. Anthropic)"><img src="https://discuss.pytorch.kr/uploads/default/original/3X/a/f/af090456b7515397c668d72b346c1b3f1ac94f44.png" alt="사회과학에 코딩 에이전트는 얼마나 퍼졌나: 사회과학자 1,260명 설문 분석 (feat. Anthropic)" data-base62-sha1="oYqSjxtsqkk8bd8lPqJIRGso256" width="883" height="499"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">사회과학에 코딩 에이전트는 얼마나 퍼졌나: 사회과학자 1,260명 설문 분석 (feat. Anthropic)</span><span class="informations">883×499 39.2 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<h2><a name="p-20094-h-1" class="anchor" href="#p-20094-h-1" aria-label="Heading link"></a>코딩 에이전트와 사회과학 연구</h2>
<p>한 명의 사회과학자가 새로운 연구 아이디어를 떠올렸다고 해봅시다. 과거에는 데이터를 내려받아 정리하고, 분석 코드를 한 줄씩 작성하고, 결과를 해석한 뒤 다시 코드를 고치는 지난한 과정을 모두 스스로 거쳐야 했습니다. 사람의 손을 반드시 거쳐야 했던 이 실증 연구의 핵심 단계들이, 이제는 처음으로 기계에 통째로 위임될 수 있게 되었습니다.</p>
<p>Anthropic의 이번 보고서는 이러한 변화가 실제 사회과학 연구 현장에 얼마나 스며들었는지를, 정량 사회과학자 <span class="math">1{,}260</span> 명을 대상으로 한 설문으로 처음 측정한 결과를 다룹니다. 핵심 질문은 분명합니다. <strong>누가</strong> 코딩 에이전트를 쓰고 있고, <strong>무엇에</strong> 쓰며, 그 결과 연구 산출물은 <strong>어떻게</strong> 달라지는가? 결론부터 말하면, 설문 응답자의 단 <span class="math">20\%</span> 만이 코딩 에이전트를 정기적으로 사용하고 있었고, 그 사용은 분야와 경력, 심지어 성별에 따라 매우 불균등하게 나뉘어 있었습니다.</p>
<h3><a name="p-20094-h-2" class="anchor" href="#p-20094-h-2" aria-label="Heading link"></a>챗봇을 넘어 코딩 에이전트로</h3>
<p>최근 몇 년 사이 생성형 AI(generative AI)는 과학 연구에 빠르게 침투했습니다. <a href="https://www.nature.com/articles/s41562-025-02273-8">가장 권위 있는 학술지</a>의 논문에서도, 그리고 <a href="https://sociologicalscience.com/articles-v13-3-45/">사회과학</a> 분야에서도 AI 챗봇의 기여가 점점 늘고 있습니다. 이는 AI가 연구 생산성을 끌어올릴 것이라는 기대를 낳는 한편, 동료 평가(peer review)의 과부하와 학술 'AI 슬롭(slop)'의 범람에 대한 우려도 함께 키우고 있습니다.</p>
<p>하지만 지금까지 차례를 주고받는(turn-taking) 방식의 AI 챗봇은 주로 <a href="https://sociologicalscience.com/articles-v13-3-45/">글쓰기 보조</a>에 쓰였습니다. 분석의 설계와 실행, 해석이라는 무거운 작업은 여전히 사람의 몫으로 남아 있었습니다. 챗봇은 사람이 던진 질문에 답을 돌려줄 뿐, 데이터셋을 직접 붙들고 분석을 끝까지 굴리지는 못했기 때문입니다.</p>
<p>코딩 에이전트(coding agent)는 결이 다릅니다. <strong>Claude Code</strong> 나 <strong>Codex</strong> 같은 에이전트형 코딩 플랫폼은 연구 아이디어와 데이터셋을 건네받으면, 분석 코드를 작성하고 실행하며 출력을 해석하고 다시 수정하는 과정을 자율적으로 반복합니다. 그동안 사람만이 할 수 있다고 여겨졌던 실증 연구의 단계들이, 처음으로 <a href="https://www.nber.org/papers/w34202">자동화</a>될 수 있게 된 것입니다. 극단적으로는 <a href="https://www.nature.com/articles/s41586-026-10265-5">컴퓨터 과학 연구</a>나 <a href="https://osf.io/preprints/socarxiv/24xfq_v1">사회과학 연구 아이디어</a>를 자율적으로 수행하는 다중 에이전트(multi-agent) 파이프라인까지 등장했습니다.</p>
<p>이러한 도구는 과학을 가속하고 더 과감하게 만들 수 있습니다. 연구 실행이 빨라진다는 것은 곧 발견이 값싸고 풍부해진다는 뜻이기 때문입니다. 그러나 동시에 연구 자원의 격차를 증폭시키고, 학술 기록의 혼잡(congestion)을 악화시킬 위험도 있습니다. 더 근본적으로는, AI가 점점 더 넓은 범위의 연구 작업을 떠맡게 되면서 AI 특유의 분석적 선택이 우리가 경제와 사회, 그리고 우리 자신을 이해하는 방식에 흔적을 남길 수도 있습니다.</p>
<h3><a name="p-20094-h-3" class="anchor" href="#p-20094-h-3" aria-label="Heading link"></a>이 설문은 무엇을 보았나</h3>
<p>연구진은 <span class="math">2026</span> 년 <span class="math">2</span> 월 <span class="math">20</span> 일부터 <span class="math">3</span> 월 <span class="math">24</span> 일까지, 미국과 캐나다에서 활동 중인 정량 사회과학자를 대상으로 설문을 진행했습니다. 다만 이는 대표 표본(representative sample)이 아닙니다. 응답자들은 Claude Max 계정 접근권을 제공하는 연구에 모집되었기 때문에, AI 도구에 호기심을 가진 연구자 쪽으로 표본이 기울었을 수 있습니다. 그럼에도 응답자들은 더 일반적인 초대를 받은 이전 표본(파일럿)과 상당히 유사했는데, 이에 대해서는 마지막 절에서 다시 짚습니다.</p>
<p>표본은 다섯 갈래로 모았습니다. 사회학, 정치학, 경영학, 경제학, 심리학, 교육학, 공중보건 학과의 교수와 학생 연락처를 미국 R1 및 주요 캐나다 연구중심대학 웹사이트에서 수집했고, 오픈 학술 데이터베이스 <a href="https://openalex.org/">OpenAlex</a>로 최근 <span class="math">1</span> 년 내 논문을 낸 활동적 연구자를 추렸으며, 학회 프로그램과 대학원 주임교수를 통한 배포, 미국사회학회(ASA)나 경영학회(Academy of Management) 같은 학술 커뮤니티의 메일링 리스트도 활용했습니다. 이렇게 직접 이메일을 보낸 학자만 <span class="math">44{,}700</span> 명입니다. 초기 스크리너(screener)에서 정량적 실증 데이터를 다루는 연구자로 한정했고, 박사 과정생은 최소 <span class="math">2</span> 년 차 이상이면서 학계 진출을 계획하는 경우만 포함했습니다. 설문을 마친 응답자에게는 <span class="math">10</span> 달러 기프트 카드를 제공했으며, 스크리너와 완료 조건을 적용한 최종 분석 표본이 <span class="math">1{,}260</span> 명입니다.</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a.jpeg" data-download-href="https://discuss.pytorch.kr/uploads/default/88c399270e500af480e2144ad4b170797ecdb46a" title="분야별 코딩 에이전트와 AI 도구 채택률을 나란히 보여주는 막대 그래프 / Adoption of coding agents by discipline"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a_2_1028x578.jpeg" alt="분야별 코딩 에이전트와 AI 도구 채택률을 나란히 보여주는 막대 그래프 / Adoption of coding agents by discipline" data-base62-sha1="jvS0cHmkyp1ah0DEENx8JD2V5aO" width="1028" height="578" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/8/8/88c399270e500af480e2144ad4b170797ecdb46a_2_2056x1156.jpeg 2x" data-dominant-color="F2F0EB"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">분야별 코딩 에이전트와 AI 도구 채택률을 나란히 보여주는 막대 그래프 / Adoption of coding agents by discipline</span><span class="informations">3840×2160 232 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>응답자는 경제학, 정치학, 사회학이 각각 전체의 약 <span class="math">\frac{1}{5}</span> 씩으로 고르게 나뉘었고, 경영과학과 심리학이 그 뒤를 바짝 따랐습니다. 공중보건, 교육학, 커뮤니케이션 연구자도 소수 포함되었습니다. 직급으로는 약 <span class="math">40\%</span> 가 정교수 또는 부교수, <span class="math">25\%</span> 가 조교수, 약 <span class="math">30\%</span> 가 박사 과정생이었습니다. 흥미롭게도 응답자가 자유 서술로 적은 분야는 원래 <span class="math">318</span> 개의 고유 값이었는데, 연구진은 이를 Claude를 활용한 분류와 수작업 코딩을 병행해 <span class="math">8</span> 개의 분야 범주와 잔여 'Other' 범주로 정리했습니다.</p>
<p>중요한 점은, 이번 설문이 더 큰 연구의 <strong>기준선(baseline) 조사</strong> 라는 것입니다. 연구진은 일부 연구자에게 Claude Code 접근권을 무작위로 제공하는 무작위 실험(randomized experiment)을 포함한 후속 연구를 진행 중이며, 코딩 에이전트가 연구 생산성에 미치는 인과적 효과는 향후 별도로 발표할 예정입니다. 이번 글은 그 출발점에서, 누가 이 도구를 쓰고 있고 무엇에 쓰는지를 먼저 짚는 첫 단면입니다.</p>
<h2><a name="p-20094-h-4" class="anchor" href="#p-20094-h-4" aria-label="Heading link"></a>코딩 에이전트는 아직 대다수에게 닿지 않았다</h2>
<p>연구진은 AI 사용을 두 가지 방식으로 측정했습니다. 먼저 "<em>연구 과정에 도움을 받기 위해 생성형 AI 모델을 사용한 적이 있는가?</em>"라고 물었을 때, 응답자의 <span class="math">81\%</span> 가 그렇다고 답했습니다.</p>
<p>그렇다면 점점 더 강력해지는 코딩 에이전트를 실제 워크플로우에 받아들인 사람은 얼마나 될까요? 연구진은 "<em>명령줄(command line)에 통합된 AI 코딩 어시스턴트(Codex, Cursor, Claude Code 등)를 일주일에 한 번 이상 정기적으로 사용하는가?</em>"라고 물은 뒤, 후속 질문으로 실제 그 도구들(또는 Google Antigravity) 중 하나를 쓰는지 검증했습니다.</p>
<p>그 결과, 코딩 에이전트를 사용하는 응답자는 <strong>단 <span class="math">20\%</span></strong> 에 그쳤습니다. 이번 설문은 <span class="math">2025</span> 년 <span class="math">12</span> 월 말 Claude Code와 Opus <span class="math">4.6</span> 을 둘러싼 논의가 한바탕 일고 약 두 달 뒤에 이뤄졌습니다. 그런데도 AI에 관심이 있어 스스로 설문에 참여한 응답자들 사이에서조차, 코딩 에이전트를 워크플로우에 들인 사람은 <span class="math">5</span> 명 중 <span class="math">1</span> 명꼴에 불과했던 것입니다. 사용자 중에서는 Claude Code가 가장 흔해서 코딩 에이전트 사용자의 <span class="math">86\%</span> 가 Claude Code를 쓴다고 답했고, 그다음으로 흔한 Codex는 <span class="math">31\%</span> 였습니다.</p>
<p>위 히어로 그래프(Figure 1)의 기준선은 전체 AI 사용률을 <span class="math">81\%</span>, 전체 코딩 에이전트 사용률을 <span class="math">19\%</span> (본문 서술에서는 약 <span class="math">20\%</span> 로 반올림)로 표시합니다. 두 값 사이의 큰 간극은, 챗봇으로 AI의 문을 두드린 사람은 많아도 분석을 자율적으로 굴리는 에이전트까지 나아간 사람은 아직 소수라는 뜻입니다.</p>
<h2><a name="p-20094-h-5" class="anchor" href="#p-20094-h-5" aria-label="Heading link"></a>채택은 매우 불균등하다</h2>
<h3><a name="p-20094-h-6" class="anchor" href="#p-20094-h-6" aria-label="Heading link"></a>분야와 경력에 따른 격차</h3>
<p>전체 채택률 안에는 분야별로 큰 편차가 숨어 있습니다. 경제학자의 약 <span class="math">38\%</span>, 정치학자의 <span class="math">25\%</span> 가 코딩 에이전트를 쓰는 반면, 공중보건(<span class="math">6\%</span> ), 커뮤니케이션(<span class="math">6\%</span> ), 교육학(<span class="math">4\%</span> )은 한 자릿수에 머물렀습니다. 이 기울기는 전체 AI 사용률의 분야별 차이와 대체로 같은 방향이지만, 코딩 에이전트 채택의 격차가 평균적으로 더 가팔랐습니다. 정량적 데이터 분석이 연구의 중심에 있는 분야일수록 코딩 에이전트의 효용을 먼저 체감한 셈입니다.</p>
<p>경력 단계에 따른 격차는 더 극적입니다. 박사 과정생과 박사후연구원(postdoc)의 약 <span class="math">\frac{1}{4}</span> 이상이 최소 주 <span class="math">1</span> 회 코딩 에이전트를 쓰는 반면, 정년을 보장받은(tenured) 교수에서는 그 비율이 절반 넘게 떨어집니다.</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3.jpeg" data-download-href="https://discuss.pytorch.kr/uploads/default/dd433c653099890c90cbe64c0ee6b53a5f2665f3" title="경력 단계별 AI 사용률과 코딩 에이전트 사용률을 비교한 선 그래프, 박사 과정생에서 정교수로 갈수록 사용률이 하락 / AI adoption by career stage"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3_2_1028x578.jpeg" alt="경력 단계별 AI 사용률과 코딩 에이전트 사용률을 비교한 선 그래프, 박사 과정생에서 정교수로 갈수록 사용률이 하락 / AI adoption by career stage" data-base62-sha1="vznzxCfd0ieLqIlEBbxIzJ0spKH" width="1028" height="578" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/d/dd433c653099890c90cbe64c0ee6b53a5f2665f3_2_2056x1156.jpeg 2x" data-dominant-color="F2F1EB"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">경력 단계별 AI 사용률과 코딩 에이전트 사용률을 비교한 선 그래프, 박사 과정생에서 정교수로 갈수록 사용률이 하락 / AI adoption by career stage</span><span class="informations">3840×2160 182 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>Figure 2를 보면, 전체 AI 사용률(파란 선)은 박사 과정생 <span class="math">92\%</span> 에서 정교수 <span class="math">68\%</span> 로 완만하게 떨어지지만, 코딩 에이전트 사용률(주황 선)은 박사후연구원 <span class="math">28\%</span> 에서 정교수 <span class="math">9\%</span> 로 훨씬 가파르게 추락합니다. 코딩 에이전트를 받아들이는 쪽은 결국 젊은 연구자들입니다. 이들은 기술적으로 더 능숙하고, 코드와 데이터를 직접 다룰 가능성이 높으며, 연구 성과를 내야 한다는 경력상의 압박도 더 강하게 받기 때문입니다.</p>
<h3><a name="p-20094-h-7" class="anchor" href="#p-20094-h-7" aria-label="Heading link"></a>성별과 대학 위상에 따른 불균등</h3>
<p>격차는 분야와 경력을 넘어섭니다. 연구진이 응답자의 이름을 성별로 분류한 결과, 전형적으로 남성으로 분류되는 이름을 가진 연구자가 전형적으로 여성으로 분류되는 이름을 가진 연구자보다 코딩 에이전트를 <strong><span class="math">2</span> 배 넘게</strong> 채택하고 있었습니다(<span class="math">22\%</span> 대 <span class="math">9\%</span> ). 여기서 성별은 응답자가 직접 밝힌 이름을 <code>gender_guesser</code> 파이썬 라이브러리로 추정한 것으로, male과 mostly_male을 '전형적 남성 이름', female과 mostly_female을 '전형적 여성 이름'으로 묶고 중성적이거나 판별 불가능한 이름은 분석에서 제외했습니다. 즉 자기 식별이 아니라 이름 기반 추정값이라는 점은 감안해야 합니다. 위상이 높은 대학과 사립 대학에서도 사용률이 눈에 띄게 높았습니다. 이 모든 차이는 <span class="math">p&lt;0.05</span> 수준에서 통계적으로 유의했습니다.</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834.jpeg" data-download-href="https://discuss.pytorch.kr/uploads/default/e320fbc76e712cf1e879cfb9bfde15763b5ce834" title="경력, 성별, 대학 속성에 따른 AI 사용과 코딩 에이전트 사용의 채택률 차이를 보여주는 두 패널 막대 그래프 / Differences in AI and coding agent adoption"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834_2_1028x578.jpeg" alt="경력, 성별, 대학 속성에 따른 AI 사용과 코딩 에이전트 사용의 채택률 차이를 보여주는 두 패널 막대 그래프 / Differences in AI and coding agent adoption" data-base62-sha1="wph3glC8MB9vXHyuzve0yNQ92EA" width="1028" height="578" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/e/3/e320fbc76e712cf1e879cfb9bfde15763b5ce834_2_2056x1156.jpeg 2x" data-dominant-color="E1E4E2"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">경력, 성별, 대학 속성에 따른 AI 사용과 코딩 에이전트 사용의 채택률 차이를 보여주는 두 패널 막대 그래프 / Differences in AI and coding agent adoption</span><span class="informations">3840×2160 265 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>Figure 3의 두 패널은 핵심을 분명히 보여줍니다. 왼쪽 패널(AI 사용)에서 집단 간 차이는 비교적 작습니다. 남성 이름 <span class="math">81\%</span> 대 여성 이름 <span class="math">78\%</span>, 상위 <span class="math">25</span> 위 대학 <span class="math">83\%</span> 대 그 외 <span class="math">81\%</span> 로 격차가 미미합니다. 그러나 오른쪽 패널(코딩 에이전트 사용)에서는 격차가 훨씬 큽니다. 같은 성별 비교에서 <span class="math">22\%</span> 대 <span class="math">9\%</span>, 대학 위상 비교에서 <span class="math">24\%</span> 대 <span class="math">17\%</span> 로 벌어집니다(상위 <span class="math">25</span> 개 대학은 Nature Index <span class="math">2025</span> 선도 기관 기준이며 표본의 <span class="math">28\%</span> 를 차지합니다). 사립 대학(<span class="math">23\%</span> )과 공립 대학(<span class="math">17\%</span> ) 사이에서도 같은 방향의 격차가 나타납니다.</p>
<p>특히 주목할 점은, 성별 격차가 단순히 'AI를 시도해 본 비율'의 차이로 설명되지 않는다는 것입니다. AI를 연구에 써본 적 있는 응답자만 추려도, 정기적인 코딩 에이전트 사용에서의 성별 격차는 전체 표본에서보다 오히려 약간 더 컸습니다. 이 차이는 같은 분야와 같은 경력 단계 안에서 비교해도 그대로 유지되었습니다. 코딩 에이전트 채택이 적어도 이 초기 국면에서는 AI 전반의 채택보다 더 큰 불평등을 안고 있음을 시사합니다.</p>
<h2><a name="p-20094-ai-8" class="anchor" href="#p-20094-ai-8" aria-label="Heading link"></a>연구자들은 AI로 무엇을 하는가</h2>
<p>채택률만큼 흥미로운 것은 '용도'입니다. AI를 쓰는 연구자들은 코딩 에이전트든 챗봇이든 실제로 무엇에 AI를 활용하고 있을까요? AI와 학술 연구를 둘러싼 논쟁은 그동안 글쓰기에 집중되어 왔습니다. 환각으로 지어낸 문헌 검토, 형식적인 서론에 흩뿌려진 "<em>이것은 X가 아니라 Y다</em>" 같은 표현, 그리고 논문 작성의 완전 자동화 가능성 같은 것들입니다.</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d.jpeg" data-download-href="https://discuss.pytorch.kr/uploads/default/8b17879979f8322fd0528aff522be6bee170c00d" title="코딩 에이전트 사용자와 그 외 AI 사용자의 용도별 사용 비율, 그리고 분야별 용도 비율을 보여주는 막대 그래프와 히트맵 / What researchers use AI to do"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d_2_1028x578.jpeg" alt="코딩 에이전트 사용자와 그 외 AI 사용자의 용도별 사용 비율, 그리고 분야별 용도 비율을 보여주는 막대 그래프와 히트맵 / What researchers use AI to do" data-base62-sha1="jQsMohHX6VeJbNbYzT001s3xqjz" width="1028" height="578" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/8/b/8b17879979f8322fd0528aff522be6bee170c00d_2_2056x1156.jpeg 2x" data-dominant-color="DDD8CC"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">코딩 에이전트 사용자와 그 외 AI 사용자의 용도별 사용 비율, 그리고 분야별 용도 비율을 보여주는 막대 그래프와 히트맵 / What researchers use AI to do</span><span class="informations">3840×2160 297 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>그러나 Figure 4가 보여주는 현실은 다릅니다. 코딩 에이전트 사용자든 그 외 사용자든 가장 흔한 용도는 정량 데이터 분석을 위한 <strong>코드 작성</strong> 입니다. 코딩 에이전트 사용자의 <span class="math">97\%</span>, 그 외 AI 사용자의 <span class="math">77\%</span> 가 코드 생성에 AI를 쓴다고 답했습니다. 그다음이 산문 편집(edit prose)이었고, 방법론 조언과 선행 연구 배경 조사가 뒤를 이었습니다. 흥미롭게도 코딩 에이전트 사용자와 그 외 사용자를 합쳐도, 산문 초안 작성(draft prose)에 AI를 써본 사람은 전체 AI 사용자의 약 <span class="math">\frac{1}{3}</span> 에 불과했습니다. 이 패턴은 대체로 모든 분야에서 유지되었고, 산문 초안 작성을 흔히 하는 분야는 경제학과 경영학 정도였습니다.</p>
<p>같은 용도라도 코딩 에이전트 사용자가 모든 항목에서 더 높은 비율을 보인다는 점도 눈에 띕니다. 코드 작성(<span class="math">97\%</span> 대 <span class="math">77\%</span> ), 산문 편집(<span class="math">87\%</span> 대 <span class="math">72\%</span> ), 방법론 조언(<span class="math">77\%</span> 대 <span class="math">63\%</span> ), 문헌 검토(<span class="math">76\%</span> 대 <span class="math">60\%</span> )에 이르기까지, 에이전트를 쓰는 사람은 AI를 더 다양한 작업에 더 깊이 끌어들이고 있었습니다. AI에 대한 두려움의 초점이 '글쓰기'에 맞춰져 있는 동안, 정작 현장에서 AI가 가장 활발히 쓰이는 곳은 '분석 코드'였던 셈입니다.</p>
<h2><a name="p-20094-h-9" class="anchor" href="#p-20094-h-9" aria-label="Heading link"></a>코딩 에이전트 사용자는 더 생산적인가</h2>
<p>이쯤 되면 자연스럽게 떠오르는 질문이 있습니다. 코딩 에이전트는 연구자를 더 생산적으로 만들까요? 사실 이것이 이번 설문이 출발점으로 삼은 더 큰 연구의 핵심 질문입니다. 인과관계를 가리는 실험은 아직 진행 중이지만, 기준선 설문만으로도 코딩 에이전트 사용자와 그 외 연구자를 연구 과정의 여러 길목에서 비교해 볼 수 있습니다.</p>
<p>다만 이 비교는 순수하게 기술적(descriptive)이라는 점을 분명히 해야 합니다. 코딩 에이전트 사용을 스스로 택한 연구자와 그렇지 않은 연구자는 측정되지 않은 여러 면에서 다를 수밖에 없습니다. 따라서 아래 차이는 인과적 효과가 아니라, 두 집단을 처음으로 나란히 견주어 본 결과로 읽어야 합니다.</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f.jpeg" data-download-href="https://discuss.pytorch.kr/uploads/default/a77aae6ad40219fba44be53c7199f8f482da0f5f" title="코딩 에이전트 사용자와 비사용자 간 연구 산출물의 생산성 차이를 신뢰구간과 함께 보여주는 점 추정 그래프 / Productivity differences between coding agent users and others"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f_2_1028x578.jpeg" alt="코딩 에이전트 사용자와 비사용자 간 연구 산출물의 생산성 차이를 신뢰구간과 함께 보여주는 점 추정 그래프 / Productivity differences between coding agent users and others" data-base62-sha1="nTAA1EBcCJP2fiQvYiSOAAJXToX" width="1028" height="578" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/a/7/a77aae6ad40219fba44be53c7199f8f482da0f5f_2_2056x1156.jpeg 2x" data-dominant-color="F1EFEB"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">코딩 에이전트 사용자와 비사용자 간 연구 산출물의 생산성 차이를 신뢰구간과 함께 보여주는 점 추정 그래프 / Productivity differences between coding agent users and others</span><span class="informations">3840×2160 194 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>Figure 5는 설문 직전 <span class="math">6</span> 개월 동안 자가 보고된 연구 산출물을, 프로젝트 착수부터 논문 제출까지 단계별로 보여줍니다. 경력 단계와 분야, 설문 응답 시기를 통제한 추정치에서, 코딩 에이전트 사용자는 더 많은 프로젝트를 시작하고(<span class="math">+9\%</span>, 유의), 더 많은 워킹페이퍼(working paper)를 공개하며(<span class="math">+73\%</span>, 고도로 유의), 더 많은 연구비를 신청하고(<span class="math">+33\%</span>, 고도로 유의), 학회 발표 제출도 다소 더 많았습니다(<span class="math">+10\%</span> ).</p>
<p>비율로 환산하면, 코딩 에이전트 사용자는 같은 분야와 경력 단계의 동료보다 실증 프로젝트 착수에서 약 <span class="math">10\%</span>, 워킹페이퍼 공개에서 약 <span class="math">75\%</span> 더 생산적으로 보입니다. 절대량으로도 프로젝트는 약 <span class="math">\frac{1}{4}</span> 편, 워킹페이퍼는 약 <span class="math">\frac{1}{2}</span> 편 더 많은 셈입니다.</p>
<p>그런데 이 생산성 차이는 연구 파이프라인의 <strong>앞단</strong> 에서만 나타납니다. 코딩 에이전트 사용자가 저널에 새 논문을 더 많이 제출하거나(<span class="math">+3\%</span>, 유의하지 않음) 논문을 더 빨리 재제출한다(<span class="math">-6\%</span>, 유의하지 않음)는 증거는 발견되지 않았습니다. 이는 코딩 에이전트 사용이 최근에야 시작된 현상이라 논문이 제출 단계에 이르기까지의 시차 때문일 수도 있습니다. 그러나 코딩 에이전트가 프로젝트를 시작하고 굴리는 데는 유용해도, 논문을 저널에 제출할 수 있을 만큼 다듬는 '마지막 1마일(last mile)'에서는 덜 유용할 가능성도 있습니다.</p>
<p>이 보정(adjustment)이 왜 중요한지는 부록의 미보정(unadjusted) 수치와 견주면 분명해집니다. 분야와 경력을 통제하지 않은 원시 비교(Figure A1)에서는 코딩 에이전트 사용자가 오히려 저널에 논문을 <strong>더 적게</strong> 제출하는 것으로 나타납니다. 그러나 이는 코딩 에이전트 채택이 특정 분야와 경력 단계에 쏠려 있어 생기는 착시로, 이 요인들을 통제하면 그 음의 차이가 사라지고 유의하지 않은 <span class="math">+3\%</span> 로 바뀝니다. 보정 모형은 경력 단계(<span class="math">5</span> 개 범주), 분야(<span class="math">9</span> 개 범주), 설문 응답 주차를 고정효과(fixed effect)로 넣은 OLS 회귀이며, 이분산에 강건한(heteroskedasticity-robust) 표준오차를 쓰고 추정 계수 <span class="math">\beta</span> 를 비사용자 평균으로 나눠 백분율 차이를 구합니다. 푸아송(Poisson) 모형으로 바꿔도 결과는 비슷했습니다.</p>
<h2><a name="p-20094-h-10" class="anchor" href="#p-20094-h-10" aria-label="Heading link"></a>연구자들의 기대와 우려</h2>
<p>연구진은 연구자들이 AI 도구에 무엇을 기대하는지도 물었습니다. AI는 출판 가능한 논문을 쓰는 데 있어 사회과학자를 더 생산적으로 만드는가? 그리고 AI는 사회과학 전체를 더 낫게 만들 것인가, 아니면 더 나쁘게 만들 것인가?</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534.jpeg" data-download-href="https://discuss.pytorch.kr/uploads/default/dbf9f8f40291d0b9150803e53190f67739f37534" title="AI 사용 사례 수에 따른 생산성 기대와 분야 영향 기대, 그리고 에이전트 사용 여부에 따른 기대를 비교한 점 그래프 / What researchers expect from AI adoption"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534_2_1028x578.jpeg" alt="AI 사용 사례 수에 따른 생산성 기대와 분야 영향 기대, 그리고 에이전트 사용 여부에 따른 기대를 비교한 점 그래프 / What researchers expect from AI adoption" data-base62-sha1="vo08276Wba0D17jRRmOeuwWz3Wk" width="1028" height="578" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534_2_1028x578.jpeg, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534_2_1542x867.jpeg 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/b/dbf9f8f40291d0b9150803e53190f67739f37534_2_2056x1156.jpeg 2x" data-dominant-color="F2F1ED"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">AI 사용 사례 수에 따른 생산성 기대와 분야 영향 기대, 그리고 에이전트 사용 여부에 따른 기대를 비교한 점 그래프 / What researchers expect from AI adoption</span><span class="informations">3840×2160 178 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>생산성에 대해서는 연구자들이 낙관적이었습니다. <span class="math">1</span> 부터 <span class="math">10</span> 까지의 척도에서 응답자의 <span class="math">88\%</span> 가 <span class="math">5</span> 점을 넘겼고, 절반이 <span class="math">8</span> 점 이상을 줬습니다. Figure 6의 왼쪽이 보여주듯, AI를 더 많은 종류의 작업에 쓰는 연구자일수록 더 낙관적이었습니다(생산성 기대는 사용 사례 <span class="math">0</span> 개일 때 약 <span class="math">6.1</span> 점에서 <span class="math">6</span> 개일 때 약 <span class="math">8.6</span> 점으로 올라갑니다). 오른쪽은 코딩 에이전트 사용자가 비사용자보다 더 낙관적임을 보여줍니다. 구체적으로 코딩 에이전트 사용자는 생산성 기대를 약 <span class="math">8.6</span> 점, 분야 영향 기대를 약 <span class="math">7.0</span> 점으로 매겨, 비사용자(각각 약 <span class="math">7.2</span> 점, <span class="math">5.4</span> 점)보다 두 항목 모두에서 더 높게 평가했습니다.</p>
<p>이 설문이 애초에 AI 도구를 시도해 보고 싶어 하는 사람들로부터 표본을 끌어왔으니, 생산성에 대한 낙관이 보이는 것은 그리 놀랍지 않습니다. 그러나 이 낙관주의자들 사이에서조차, AI가 출판 가능한 논문 작성을 좁게 돕는 것에 대한 기대와 AI가 사회과학 전반에 미칠 영향에 대한 기대 사이에는 뚜렷한 간극이 있었습니다. 응답자의 <span class="math">70\%</span> 는 분야 전체에 대한 기대보다 논문 생산성에 대한 기대가 더 높았습니다. 분야 영향을 논문 생산성보다 더 낙관하는 연구자는 거의 없었고, 오히려 분야 영향을 더 비관하는 연구자가 많았습니다.</p>
<p>이 간극은 의미심장합니다. 연구자들은 *"내 논문 생산성은 오르겠지만, 그 대가로 분야 전체에는 비용이 따를지 모른다"*고 우려하는 것으로 보입니다. 논문이 많아진다는 것은 곧 주목을 둘러싼 혼잡과 경쟁을 뜻할 수 있습니다. 또한 일부 연구자가 AI 도구를 선택적 보고(selective reporting)나 위험을 회피한 점진적 연구처럼, 사회과학의 기존 문제를 오히려 악화시키는 방식으로 쓸지 모른다는 두려움도 깔려 있습니다.</p>
<h2><a name="p-20094-h-11" class="anchor" href="#p-20094-h-11" aria-label="Heading link"></a>한계와 향후 연구 방향</h2>
<p>이 보고서의 결과를 읽을 때 염두에 둘 한계가 몇 가지 있습니다. 첫째, 여기 제시된 데이터는 워크플로우와 AI 사용에 관한 연구에 참여하도록 명시적으로 모집된 정량 사회과학자들의 이메일 설문에 기반합니다. 따라서 응답자는 비응답자보다 AI를 더 많이 쓰고 더 낙관적일 가능성이 높습니다.</p>
<p>둘째, 앞서 본 초기 단계의 생산성 차이는 어디까지나 기술적으로 해석되어야 합니다. 코딩 에이전트의 초기 채택자는 비채택자보다 원래 더 생산적이거나, 설문으로 직접 측정할 수 없는 여러 면에서 다를 수 있습니다. 셋째, 이번 분석은 연구자가 보고한 산출물의 <strong>양</strong> 만 볼 뿐, 그 <strong>질</strong> 에 대해서는 아무것도 말하지 않습니다.</p>
<p>연구진은 이 선택 편향이 결과를 얼마나 왜곡하는지 직접 점검했습니다. 본 설문에 앞서 <span class="math">2</span> 월 초 진행한 파일럿 조사는 후속 실험(Claude Max 접근권 제공)을 모집 단계에서 전혀 알리지 않고 *"연구 워크플로우의 변화"*에 관한 연구라고만 소개했기에, AI 관심도로 인한 자기 선택의 영향을 가늠하는 잣대가 됩니다. 비교가 공정하도록 본 표본을 파일럿과 같은 조건(사회학, 정치학, 경영학으로 한정하고 정교수 제외)으로 좁혀 견주면, 전체 AI 사용률은 파일럿 <span class="math">87.3\%</span> 대 본 표본 <span class="math">84.5\%</span> 로 거의 차이가 없었습니다. 본 표본이 더 많은 종류의 작업에 AI를 쓰고(평균 사용 사례 수 <span class="math">3.71</span> 대 <span class="math">3.12</span> ) <span class="math">1</span> 부터 <span class="math">10</span> 까지 척도에서 더 낙관적이긴 했지만(생산성 기대 <span class="math">+0.46</span>, 분야 영향 기대 <span class="math">+0.93</span> ), 핵심 경향은 그대로였습니다. 두 표본 모두에서 코드 작성과 편집이 가장 흔한 용도였고 산문 초안 작성은 드물었으며, 논문 생산성에 대한 기대가 분야 영향에 대한 기대를 웃도는 간극도 유지되었습니다. 요컨대 표본 선택은 AI를 향한 열의의 '수준'은 부풀렸을지언정, 이 글이 강조한 구조적 '패턴'까지 만들어 낸 것은 아니라는 뜻입니다.</p>
<p>연구진은 향후 업데이트에서 코딩 에이전트 사용자를 깨끗한 비교 집단(clean comparison group)과 견주고, 코딩 에이전트로 보강된 연구가 양뿐 아니라 내용 면에서도 달라 보이는지를 평가하겠다고 밝혔습니다. 무작위 실험의 결과가 더해지면, 지금의 기술적 관찰이 인과적 주장으로 한 걸음 나아갈 수 있을 것입니다.</p>
<p>이러한 한계에도 불구하고, 이 보고서가 보여주는 그림은 분명합니다. 코딩 에이전트는 사회과학으로 확산되고 있습니다. 예컨대 우리가 경제와 정치를 연구하는 방식은, 점점 더 AI 코딩 에이전트가 일부 내려준 분석 결정을 거치게 됩니다. 이 자동화가 열어줄 잠재력과 그에 따르는 위험을 함께 직시하는 일이, 앞으로 사회과학이 마주할 중요한 과제가 될 것입니다. 누가 이 도구의 힘을 누리고 누가 뒤처지는가 하는 격차의 문제는, 그 과제의 한가운데에 놓여 있습니다.</p>
