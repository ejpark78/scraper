# ==============================================================================
# 🛸 Document Explorer & MCP Hybrid Server Service Block
# ==============================================================================

services:
  viewer:
    build:
      context: ../../../
      dockerfile: docker/tools/viewer/Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: linkedin/clipper-viewer:latest
    command: ["npx", "ts-node", "src/viewer/server.ts"]
    profiles:
      - tools
    environment:
      - TZ=Asia/Seoul
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/collections', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.viewer.rule=Host(`viewer.localhost`) || Host(`viewer.127.0.0.1.nip.io`) || Host(`mcp.localhost`)"
      - "traefik.http.routers.viewer.entrypoints=websecure"
      - "traefik.http.routers.viewer.tls=true"
      - "traefik.http.services.viewer.loadbalancer.server.port=3000"
