# ==============================================================================
# 🐙 Gitea Service Block (Local Git Mirroring & Hosting)
# ==============================================================================
# - 주소: https://gitea.localhost/ 또는 https://gitea.127.0.0.1.nip.io/
# - DB: SQLite3 내장 데이터베이스
# - 데이터 경로: ./docker/tools/gitea/data
# ==============================================================================

services:
  gitea:
    image: gitea/gitea:1.26-rootless
    profiles:
      - tools
    depends_on:
      traefik:
        condition: service_healthy      
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__server__ROOT_URL=https://gitea.localhost/
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__DOMAIN=gitea.localhost
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__ADMIN_USERNAME=gitea-admin
      - GITEA__security__ADMIN_PASSWORD=admin12345
      - GITEA__security__ADMIN_EMAIL=admin@example.com
      - GITEA__actions__ENABLED=true
      - TZ=Asia/Seoul
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/.services/gitea/data:/data
      - ${HOST_PROJECT_PATH:-.}/data/.services/gitea/repositories:/var/lib/gitea/git
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`gitea.localhost`) || Host(`gitea.127.0.0.1.nip.io`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls=true"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"

  act_runner:
    image: gitea/act_runner:latest
    profiles:
      - tools
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      - GITEA_INSTANCE_URL=http://gitea:3000
      - GITEA_RUNNER_REGISTRATION_TOKEN_FILE=/data/token
      - GITEA_RUNNER_NAME=local-runner
      - GITEA_RUNNER_LABELS=ubuntu-latest:docker://node:18-bullseye,ubuntu-22.04:docker://node:18-bullseye
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_PROJECT_PATH:-.}/data/.services/gitea/act_runner:/data
    restart: unless-stopped
