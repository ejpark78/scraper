# ==============================================================================
# 🎯 Vikunja Service Block (Local Issue, Task & Project Planner)
# ==============================================================================
# - 주소: https://vikunja.localhost/ 또는 https://vikunja.127.0.0.1.nip.io/
# - DB: SQLite3 내장 데이터베이스
# - 데이터 경로: ./docker/tools/vikunja/db, ./docker/tools/vikunja/data
# ==============================================================================

services:
  vikunja:
    image: vikunja/vikunja:0.24.2
    profiles:
      - tools
    environment:
      - VIKUNJA_DATABASE_TYPE=sqlite
      - VIKUNJA_DATABASE_PATH=/db/vikunja.db
      - VIKUNJA_SERVICE_PUBLICURL=https://vikunja.localhost/
      - TZ=Asia/Seoul
    volumes:
      - ./data:/app/vikunja/files
      - ./db:/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3456/api/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vikunja.rule=Host(`vikunja.localhost`) || Host(`vikunja.127.0.0.1.nip.io`)"
      - "traefik.http.routers.vikunja.entrypoints=websecure"
      - "traefik.http.routers.vikunja.tls=true"
      - "traefik.http.services.vikunja.loadbalancer.server.port=3456"
