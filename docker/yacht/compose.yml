services:
  yacht:
    # 📝 Default Login Info:
    # - URL: http://yacht.localhost || http://yacht.127.0.0.1.nip.io
    # - User: admin@yacht.local
    # - Pass: pass
    image: selfhostedpro/yacht:latest
    container_name: yacht
    profiles:
      - tools
    environment:
      - base_url=https://yacht.127.0.0.1.nip.io/api/
    volumes:
      - ./data/.services/yacht:/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "uvicorn"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yacht.rule=Host(`yacht.localhost`) || Host(`yacht.127.0.0.1.nip.io`)"
      - "traefik.http.routers.yacht.entrypoints=websecure"
      - "traefik.http.routers.yacht.tls=true"
      - "traefik.http.services.yacht.loadbalancer.server.port=8000"
