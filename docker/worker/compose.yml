# ==============================================================================
# 🏃 LinkedIn Crawler CLI & Distributed Workers (profile: runtime)
# ==============================================================================

services:
  worker:
    build:
      context: ../../
      dockerfile: docker/worker/base/Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: linkedin/worker:latest
    profiles:
      - runtime
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - AUTH=${AUTH:-}

      - LIST_SLACK=${LIST_SLACK:-}
      - CHUNK_SIZE=${CHUNK_SIZE:-}
      - SESSION_DIR=/app/data/sessions
      - LISTS=${LISTS:-}
      - URLS=${URLS:-}
      - HTML=${HTML:-}
      - MD=${MD:-}
      - TZ=Asia/Seoul
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - ${HOST_PROJECT_PATH:-.}/data/sites:/app/data/sites
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  scraper:
    build:
      context: ../../
      dockerfile: docker/worker/scraper/Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: linkedin/scraper:latest
    command: ["npx", "ts-node", "src/crawler/workers/ScraperWorker.ts"]
    environment:
      - TZ=Asia/Seoul
      - JSON_LOG=true
      - LIST_SLACK=0

      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
      - SESSION_DIR=/app/data/sessions
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - ${HOST_PROJECT_PATH:-.}/data/sites:/app/data/sites
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ScraperWorker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: ${SCALE:-2}

  converter:
    build:
      context: ../../
      dockerfile: docker/worker/converter/Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: linkedin/converter:latest
    command: ["npx", "ts-node", "src/crawler/workers/ConverterWorker.ts"]
    environment:
      - TZ=Asia/Seoul
      - AUTH=${AUTH:-}
      - JSON_LOG=true
      - LIST_SLACK=0

      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sites:/app/data/sites
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ConverterWorker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1

  indexer:
    build:
      context: ../../
      dockerfile: docker/worker/indexer/Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: linkedin/indexer:latest
    command: ["npx", "ts-node", "src/crawler/workers/IndexerWorker.ts"]
    environment:
      - TZ=Asia/Seoul
      - AUTH=${AUTH:-}
      - JSON_LOG=true
      - LIST_SLACK=0

      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-superMasterKeySecret123}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "IndexerWorker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1


