# ==============================================================================
# 🏃 LinkedIn Crawler CLI & Distributed Workers (profile: runtime)
# ==============================================================================
# 1. clipper
#    - 용도: 링크드인 채용 공고 일회성 수집 파이프라인 및 CLI 구동을 위한 메인 환경
#    - 볼륨: 수집 세션을 보존하기 위해 `${HOST_PROJECT_PATH:-.}/data/sessions` 바인딩
#
# 2. clipper-worker
#    - 용도: Redis 큐(`jobs_queue`)에 누적된 상세 다운로드 요청을 분산 소비하여 다운로드하는 비동기 분산 워커
#    - 스케일링: 기본 5개의 레플리카 복제본(`replicas: 5`) 구조로 비동기 동시 다운로드 파이프라인 형성
#    - 헬스체크: `pgrep -f redis_worker.ts` 커맨드를 통해 백그라운드 구동 스크립트 프로세스 정상 동작 확인
# ==============================================================================

services:
  clipper:
    build:
      context: ../../
      dockerfile: docker/clipper/Dockerfile
    image: linkedin/clipper:latest
    profiles:
      - runtime
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - AUTH=${AUTH:-}
      - PARALLEL=${PARALLEL:-}
      - SLACK_TIME=${SLACK_TIME:-}
      - CHUNK_SIZE=${CHUNK_SIZE:-}
      - LISTS=${LISTS:-}
      - URLS=${URLS:-}
      - HTML=${HTML:-}
      - MD=${MD:-}
      - TZ=Asia/Seoul
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  clipper-worker:
    build:
      context: ../../
      dockerfile: docker/clipper/Dockerfile
    image: linkedin/clipper:latest
    command: ["npx", "ts-node", "src/redis_worker.ts"]
    environment:
      - TZ=Asia/Seoul
      - AUTH=${AUTH:-}
      - JSON_LOG=true
      - SLACK_TIME=0
      - PARALLEL=1
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "redis_worker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 5
