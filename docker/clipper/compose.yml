# ==============================================================================
# 🏃 LinkedIn Crawler CLI & Distributed Workers (profile: runtime)
# ==============================================================================
# 1. clipper
#    - 용도: 링크드인 채용 공고 일회성 수집 파이프라인 및 CLI 구동을 위한 메인 환경
#    - 볼륨: 수집 세션을 보존하기 위해 `${HOST_PROJECT_PATH:-.}/data/sessions` 바인딩
#
# 2. clipper-scraper
#    - 용도: Redis 수집 대기열(`scrape_queue`)에 누적된 상세 요청을 분산 소비하여 HTML을 다운로드하고 MongoDB에 적재하는 워커
#    - 스케일링: 노트북 리소스 최적화 및 Playwright 메모리 점유율을 고려하여 복제본(`replicas: 2`) 할당
#    - 헬스체크: `pgrep -f ScraperWorker.ts` 커맨드를 통해 백그라운드 구동 스크립트 프로세스 정상 동작 확인
#
# 3. clipper-transformer
#    - 용도: 수집 완료 이벤트(`transform_queue`)에 감지된 Raw HTML을 Markdown으로 가공하고 Silver Layer에 적재하는 정제 워커
#    - 스케일링: 가벼운 파싱 및 데이터 변환 위주 연산이므로 복제본(`replicas: 1`) 할당
#    - 헬스체크: `pgrep -f TransformerWorker.ts` 커맨드를 통해 백그라운드 구동 스크립트 프로세스 정상 동작 확인
# ==============================================================================

services:
  clipper:
    build:
      context: ../../
      dockerfile: docker/clipper/Dockerfile
    image: linkedin/clipper:latest
    profiles:
      - runtime
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - AUTH=${AUTH:-}
      - PARALLEL=${PARALLEL:-}
      - SLACK_TIME=${SLACK_TIME:-}
      - CHUNK_SIZE=${CHUNK_SIZE:-}
      - LISTS=${LISTS:-}
      - URLS=${URLS:-}
      - HTML=${HTML:-}
      - MD=${MD:-}
      - TZ=Asia/Seoul
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - ${HOST_PROJECT_PATH:-.}/src:/app/src
      - ${HOST_PROJECT_PATH:-.}/config:/app/config
      - ${HOST_PROJECT_PATH:-.}/package.json:/app/package.json
      - ${HOST_PROJECT_PATH:-.}/tsconfig.json:/app/tsconfig.json
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  clipper-scraper:
    build:
      context: ../../
      dockerfile: docker/clipper/Dockerfile
    image: linkedin/clipper:latest
    command: ["npx", "ts-node", "src/ScraperWorker.ts"]
    environment:
      - TZ=Asia/Seoul
      - AUTH=${AUTH:-}
      - JSON_LOG=true
      - SLACK_TIME=0
      - PARALLEL=1
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - ${HOST_PROJECT_PATH:-.}/src:/app/src
      - ${HOST_PROJECT_PATH:-.}/config:/app/config
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ScraperWorker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2

  clipper-transformer:
    build:
      context: ../../
      dockerfile: docker/clipper/Dockerfile
    image: linkedin/clipper:latest
    command: ["npx", "ts-node", "src/TransformerWorker.ts"]
    environment:
      - TZ=Asia/Seoul
      - AUTH=${AUTH:-}
      - JSON_LOG=true
      - SLACK_TIME=0
      - PARALLEL=1
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - ${HOST_PROJECT_PATH:-.}/src:/app/src
      - ${HOST_PROJECT_PATH:-.}/config:/app/config
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "TransformerWorker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
