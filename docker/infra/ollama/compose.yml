# ==============================================================================
# 🦙 Ollama Local LLM Engine Service Block
# ==============================================================================
# - 주소: http://ollama.localhost/ 또는 내부망 컨테이너 간 http://ollama:11434/
# - 용도: 외부 API 키 없이 자체 GPU/CPU 자원을 사용하여 오프라인 LLM 연동
# - 볼륨: 모델 파일 가중치 보존용 data/.services/ollama
# ==============================================================================

services:
  ollama:
    image: ollama/ollama:latest
    profiles:
      - tools
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/.services/ollama:/root/.ollama
    restart: unless-stopped
    # Apple Silicon GPU 패스스루 가속이 필요한 경우 주석 해제하거나 기본 구동
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: apple
    #           count: all
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.localhost`)"
      - "traefik.http.routers.ollama.entrypoints=websecure"
      - "traefik.http.routers.ollama.tls=true"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
