# ==============================================================================
# 💻 Kasm Workspaces Remote GUI Developer Shell (profile: tools)
# ==============================================================================
# 1. kasm
#    - 용도: 브라우저 격리 기반 독립 데스크톱(VNC/웹 쉘) 환경에서 수집기를 원격 디버깅/실행할 수 있도록 제공하는 컨테이너 환경
#    - 접속 URL: https://kasm.localhost 또는 https://kasm.127.0.0.1.nip.io
#    - 기본 계정: ID: admin@kasm.local / PW: password2026
#    - 볼륨: 현재 프로젝트 루트 디렉토리 전체를 내부 `/home/kasm-user/linkedin`으로 매핑하여 직접 개발/빌드/수행 가능
#    - 라우팅: Traefik 역방향 프록시를 통해 HTTPS/WSS 스트리밍 라우팅 서비스 (포트 6901)
# ==============================================================================

services:
  kasm:
    build:
      context: .
      dockerfile: Dockerfile
    image: linkedin/kasm:latest
    profiles:
      - tools
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      - VNC_PW=password2026
      - VNCOPTIONS=-disableBasicAuth
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Asia/Seoul
    shm_size: "1gb"
    volumes:
      - ${HOST_PROJECT_PATH:-.}/:/home/kasm-user/linkedin
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost:6901/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kasm.rule=Host(`kasm.localhost`) || Host(`kasm.127.0.0.1.nip.io`)"
      - "traefik.http.routers.kasm.entrypoints=websecure"
      - "traefik.http.routers.kasm.tls=true"
      - "traefik.http.services.kasm.loadbalancer.server.port=6901"
      - "traefik.http.services.kasm.loadbalancer.server.scheme=https"
