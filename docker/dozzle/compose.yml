# ==============================================================================
# 🔍 Dozzle Real-time Container Log Viewer (profile: tools)
# ==============================================================================
# 1. dozzle
#    - 용도: 구동 중인 모든 도커 컨테이너들의 stdout/stderr 로그를 웹 브라우저에서 스트리밍 형태로 실시간 모니터링하는 도구
#    - 접속 URL: https://dozzle.localhost 또는 https://dozzle.127.0.0.1.nip.io (인증 생략)
#    - 헬스체크: Dozzle 실행 바이너리 자체의 내장 헬스체크 명령어 사용 `["CMD", "/dozzle", "healthcheck"]`
#                (Scratch 경량 빌드로 curl/wget이 없기 때문)
#    - 권한: `/var/run/docker.sock` 마운트 필요
# ==============================================================================

services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    profiles:
      - tools
    depends_on:
      traefik:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`dozzle.localhost`) || Host(`dozzle.127.0.0.1.nip.io`)"
      - "traefik.http.routers.dozzle.entrypoints=websecure"
      - "traefik.http.routers.dozzle.tls=true"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
