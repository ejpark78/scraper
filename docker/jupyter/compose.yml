# ==============================================================================
# 📓 Jupyter Data Analysis Workspace (profile: tools)
# ==============================================================================
# 1. jupyter
#    - 용도: 채용 공고 통계 데이터 분석 및 NER(SpaCy) 기반 주요 기술 스택을 추출하는 Jupyter Notebook 개발 환경
#    - 접속 URL: https://jupyter.localhost 또는 https://jupyter.127.0.0.1.nip.io (토큰/패스워드 무설정 자동 진입)
#    - 볼륨: 프로젝트 루트의 `notebooks` 폴더를 컨테이너 내부 Jovyan 홈 경로에 바인딩
#    - 특이사항: 권한 문제 우회를 위해 root 사용자로 띄우되, 내부 UID/GID를 Jovyan 사용자 권한(1000:1000)으로 맞춰 생성
# ==============================================================================

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: linkedin/jupyter:latest
    profiles:
      - tools
    depends_on:
      traefik:
        condition: service_healthy
    user: root
    environment:
      - TZ=Asia/Seoul
      - NB_UID=1000
      - NB_GID=1000
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
    volumes:
      - ${HOST_PROJECT_PATH:-.}/notebooks:/home/jovyan
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: ["start-notebook.sh", "--NotebookApp.token=''", "--NotebookApp.password=''"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jupyter.rule=Host(`jupyter.localhost`) || Host(`jupyter.127.0.0.1.nip.io`)"
      - "traefik.http.routers.jupyter.entrypoints=websecure"
      - "traefik.http.routers.jupyter.tls=true"
      - "traefik.http.services.jupyter.loadbalancer.server.port=8888"
