# ==============================================================================
# 🌐 Traefik Reverse Proxy Service Block
# ==============================================================================
# 1. traefik (profile: tools)
#    - 용도: 컨테이너들에 대해 `*.localhost` 및 `*.127.0.0.1.nip.io` 도메인을 기반으로 한 SSL/TLS 라우팅 및
#            포트 80(HTTP) ➡ 443(HTTPS) 강제 리다이렉션을 수행하는 중앙 게이트웨이 프록시
#    - 포트: 호스트의 80, 443 포트 점유
#    - 대시보드 URL: https://route.localhost/dashboard/ 또는 https://route.127.0.0.1.nip.io/dashboard/
#    - 보안 설정: `--serverstransport.insecureskipverify=true`를 통한 자가서명 인증서(Self-signed) 신뢰 지원
# ==============================================================================

services:
  traefik:
    image: traefik:v3.7.1
    profiles:
      - tools
    command:
      - "--ping=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.http.tls=true"
      - "--serverstransport.insecureskipverify=true"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Asia/Seoul
      - DOCKER_API_VERSION=1.40
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    networks:
      default:
        aliases:
          - mcp.localhost
          - viewer.localhost
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`route.localhost`) || Host(`route.127.0.0.1.nip.io`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-redirect"
      - "traefik.http.middlewares.dashboard-redirect.redirectregex.regex=^https://route.localhost/$$"
      - "traefik.http.middlewares.dashboard-redirect.redirectregex.replacement=https://route.localhost/dashboard/"
