
# (echo "# USER_UID/USER_GID"; echo "USER_UID=$(id -u)"; echo "USER_GID=$(id -g)"; echo "DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)") | tee -a .env

services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USER_UID=${USER_UID:-1000}
        - USER_GID=${USER_GID:-1000}
        - DOCKER_GID=${DOCKER_GID:-989}
    image: linkedin/opencode:latest
    tty: true
    stdin_open: true    
    profiles:
      - tools
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    group_add:
      - "${DOCKER_GID:-989}"    
    environment:
      - TZ=Asia/Seoul
      - TERM=xterm-256color
      - HOME=/tmp
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}
      - DOCKER_GID=${DOCKER_GID:-989}
    volumes:
      - ${HOST_PROJECT_PATH:-.}:${HOST_PROJECT_PATH:-/workspace}
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    working_dir: ${HOST_PROJECT_PATH:-/workspace}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f opencode || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
