# ==============================================================================
# 🛸 Document Explorer & MCP Hybrid Server Service Block
# ==============================================================================
# - clipper-viewer
#   - 용도: 수집된 MongoDB 데이터를 지메일(Gmail) 스타일로 조회 및 풀텍스트 검색하고,
#           Cursor 등의 AI 에이전트와 연동 가능한 MCP(Model Context Protocol) SSE 서비스 제공
#   - 접속 URL: https://viewer.localhost 또는 https://viewer.127.0.0.1.nip.io
#   - 라우팅: Traefik 프록시를 통해 TLS 라우팅 서비스 (포트 3000)
# ==============================================================================

services:
  viewer:
    build:
      context: ../../
      dockerfile: docker/clipper/Dockerfile
    image: linkedin/clipper:latest
    command: ["npx", "ts-node", "src/viewer/server.ts"]
    profiles:
      - tools
    environment:
      - TZ=Asia/Seoul
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sites:/app/data/sites
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/collections', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.viewer.rule=Host(`viewer.localhost`) || Host(`viewer.127.0.0.1.nip.io`) || Host(`mcp.localhost`)"
      - "traefik.http.routers.viewer.entrypoints=websecure"
      - "traefik.http.routers.viewer.tls=true"
      - "traefik.http.services.viewer.loadbalancer.server.port=3000"
