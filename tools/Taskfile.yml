version: '3'

includes:
  obsidian:
    taskfile: ./obsidian/Taskfile.yml
    dir: ./tools/obsidian

tasks:
  agents:dump:
    desc: "Dump agent sessions."
    summary: |
      Extract and dump agent session artifacts and diagnostics data.
      
      [Variables]
        - AGENTS: (옵션) 덤프할 에이전트명 (기본값: "agy,opencode,codex" 멀티 지정)
        
      [Usage Examples]
        - task tools:agents:dump
        - task tools:agents:dump AGENTS="agy"
    cmds:
      - npm run agents:sessions -- --all-targets --all --agent={{.AGENTS | default "agy,opencode,codex"}}

  agents:dump-transcripts:
    desc: "Dump agent transcripts."
    summary: |
      Dump JSONL raw transcripts for specific agent conversations.
      
      [Variables]
        - AGENTS: (옵션) 대상 에이전트 식별자 목록 (기본값: "agy,opencode,codex")
        
      [Usage Examples]
        - task tools:agents:dump-transcripts
    cmds:
      - npm run agents:sessions -- --transcript --all --agent={{.AGENTS | default "agy,opencode,codex"}}

  agents:dump-context:
    desc: "Dump agent context."
    summary: |
      Dump current active codebase context gathered by agents.
      
      [Variables]
        - AGENTS: (옵션) 대상 에이전트 식별자 목록
        
      [Usage Examples]
        - task tools:agents:dump-context
    cmds:
      - npm run agents:sessions -- --context --all --agent={{.AGENTS | default "agy,opencode,codex"}}

  agents:dump-brain:
    desc: "Dump agent brain/session memory."
    summary: |
      Dump semantic brain logs and memory segments of active agents.
      
      [Variables]
        - AGENTS: (옵션) 대상 에이전트 식별자 목록
        
      [Usage Examples]
        - task tools:agents:dump-brain
    cmds:
      - npm run agents:sessions -- --brain --all --agent={{.AGENTS | default "agy,opencode,codex"}}

  agents:dump-sysinfo:
    desc: Dump agent system information.
    summary: |
      Display Antigravity CLI system configurations and operational state.
      
      [Usage Examples]
        - task tools:agents:dump-sysinfo
    cmds:
      - npm run agents:sessions -- --sysinfo

  agents:compress-rules:
    desc: "Compress agent rules context."
    summary: |
      Compress workspace rules markdown files to optimize agent token efficiency.
      
      [Variables]
        - AGENTS: (옵션) 대상 에이전트 식별자 목록
        
      [Usage Examples]
        - task tools:agents:compress-rules
    cmds:
      - npm run agents:sessions -- --context --all --agent={{.AGENTS | default "agy,opencode,codex"}}
      - npm run agents:rules -- --compress

  agents:lint-rules:
    desc: Lint agent rules.
    summary: |
      Validate syntax, frontmatter format, and integrity of agent config rules.
      
      [Usage Examples]
        - task tools:agents:lint-rules
    cmds:
      - npm run agents:rules -- --lint

  agents:dump-all:
    desc: "Dump all agent diagnostics."
    summary: |
      Perform a comprehensive diagnostic dump (transcripts, brain, sysinfo, compressed rules).
      
      [Variables]
        - AGENTS: (옵션) 대상 에이전트 식별자 목록
        
      [Usage Examples]
        - task tools:agents:dump-all
    cmds:
      - task tools:agents:dump-sysinfo
      - task tools:agents:dump-transcripts AGENTS={{.AGENTS | default "agy,opencode,codex"}}
      - task tools:agents:dump-context AGENTS={{.AGENTS | default "agy,opencode,codex"}}
      - task tools:agents:dump-brain AGENTS={{.AGENTS | default "agy,opencode,codex"}}
      - task tools:agents:compress-rules AGENTS={{.AGENTS | default "agy,opencode,codex"}}
      - task tools:agents:lint-rules

  agents:usage:
    desc: Print agent usage diagnostics.
    summary: |
      Calculate and display session durations and token usage metrics.
      
      [Usage Examples]
        - task tools:agents:usage
    cmds:
      - npm run agents:usage

  agents:prune:
    desc: Prune agent session data.
    summary: |
      Clean up old workspace directories, scratch records, and cached transcripts.
      
      [Usage Examples]
        - task tools:agents:prune
    cmds:
      - npm run agents:sessions -- --prune

  agents:commit:
    desc: Commit changes through the project commit helper.
    summary: |
      Interactively run local lint, type-check, and AI review checks before committing.
      
      [Usage Examples]
        - task tools:agents:commit
    cmds:
      - npm run commit

  agents:wiki:
    desc: Compile the OpenKB wiki through the app task.
    summary: |
      Trigger the Markdown document builder compilation cycle to refresh knowledge base books.
      
      [Usage Examples]
        - task tools:agents:wiki
    cmds:
      - task app:openkb:compile

  agents:code-review:
    desc: Run AI code review through Antigravity CLI.
    summary: |
      Trigger Antigravity code review skill to automatically analyze latest workspace diffs.
      
      [Usage Examples]
        - task tools:agents:code-review
    cmds:
      - agy --skill code_review "Run semantic code review on my latest modifications."

  agents:review:
    desc: Run AI code review through Antigravity CLI.
    summary: |
      Alias for tools:agents:code-review.
      
      [Usage Examples]
        - task tools:agents:review
    cmds:
      - agy --skill code_review "Run semantic code review on my latest modifications."

  agents:push:
    desc: Push changes through the project push helper.
    summary: |
      Push locally committed branches and synchronize issue tracking tags with Gitea.
      
      [Usage Examples]
        - task tools:agents:push
    cmds:
      - npm run push

  up:
    desc: Start current web tools profile services.
    summary: |
      Spin up developer utility services (Mongo Express, RedisInsight, Gitea, Obsidian viewer).
      
      [Usage Examples]
        - task tools:up
    cmds:
      - '{{.COMPOSE}} --profile tools up -d traefik mongo-express redisinsight gitea obsidian'

  down:
    desc: Stop current web tools profile services.
    summary: |
      Stop and pause all developer utility containers.
      
      [Usage Examples]
        - task tools:down
    cmds:
      - '{{.COMPOSE}} --profile tools stop mongo-express redisinsight gitea obsidian'

  up-me:
    desc: Start Mongo Express.
    summary: |
      Start Mongo Express web UI for MongoDB administration.
      
      [Usage Examples]
        - task tools:up-me
    cmds:
      - '{{.COMPOSE}} --profile tools up -d mongo-express'

  up-redis:
    desc: Start RedisInsight.
    summary: |
      Start RedisInsight web UI for Redis instance diagnostics.
      
      [Usage Examples]
        - task tools:up-redis
    cmds:
      - '{{.COMPOSE}} --profile tools up -d redisinsight'

  up-gitea:
    desc: Start Gitea and ensure local admin account.
    summary: |
      Verify and run Gitea container, ensuring local API connectivity.
      
      [Usage Examples]
        - task tools:up-gitea
    cmds:
      - task infra:gitea:up

  up-obsidian:
    desc: Start Obsidian docs viewer.
    summary: |
      Spin up the local Obsidian static HTML docs web server.
      
      [Usage Examples]
        - task tools:up-obsidian
    cmds:
      - '{{.COMPOSE}} --profile tools up -d obsidian'

  down-obsidian:
    desc: Stop Obsidian docs viewer.
    summary: |
      Stop the local Obsidian docs web server container.
      
      [Usage Examples]
        - task tools:down-obsidian
    cmds:
      - '{{.COMPOSE}} --profile tools stop obsidian'

  ollama:run:
    desc: Start native Ollama and run the configured model.
    summary: |
      Start local Ollama server and boot the specified LLM neural network model.
      
      [Variables]
        - MODEL: (옵션) 구동할 로컬 LLM 모델 이름 (기본값: "gemma4:e4b-mlx")
        
      [Usage Examples]
        - task tools:ollama:run
        - task tools:ollama:run MODEL="llama3"
    cmds:
      - open -a Ollama 2>/dev/null || (pgrep -x "ollama" >/dev/null && echo "Ollama가 이미 실행 중입니다.") || echo "Ollama 앱이 애플리케이션 디렉토리에 없습니다. 백그라운드 CLI 실행을 시도합니다."
      - sleep 2
      - ollama run {{.MODEL | default "gemma4:e4b-mlx"}}

  ollama:logs:
    desc: Follow native Ollama logs.
    summary: |
      Tail real-time logs from native host Ollama servers.
      
      [Usage Examples]
        - task tools:ollama:logs
    cmds:
      - |
        if [ -f ~/Library/Logs/Ollama/app.log ]; then
          tail -n 50 -f ~/Library/Logs/Ollama/app.log
        elif [ -f ~/.ollama/logs/server.log ]; then
          tail -n 50 -f ~/.ollama/logs/server.log
        else
          echo "Ollama 로그 파일을 찾을 수 없습니다."
        fi

  ollama:ps:
    desc: List loaded native Ollama models.
    summary: |
      Query active host Ollama service for memory-allocated LLM profiles.
      
      [Usage Examples]
        - task tools:ollama:ps
    cmds:
      - ollama ps

  ollama:stop:
    desc: Stop native Ollama.
    summary: |
      Gracefully shut down native Ollama models and server processes on host.
      
      [Usage Examples]
        - task tools:ollama:stop
