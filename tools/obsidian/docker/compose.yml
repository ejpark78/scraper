# ==============================================================================
# 📝 Obsidian Docs Service Block (Self-Hosted Wiki Viewer)
# ==============================================================================
# - 주소: https://docs.localhost/ 또는 https://docs.127.0.0.1.nip.io/
# - 용도: OpenKB로 컴파일된 Gitea Wiki(data/gitea-wiki/) 문서를 시각적으로 탐색하고 편집
# - 포트: Traefik을 통한 80/443 SSL 프록시 포트 포워딩 (호스트 포트 직접 노출 없음)
# ==============================================================================

services:
  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    profiles:
      - tools
    security_opt:
      - seccomp:unconfined # Required for Electron rendering in containers
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      - PUID=${USER_UID:-1000}
      - PGID=${USER_GID:-1000}
      - TZ=Asia/Seoul
    volumes:
      # /config/Obsidian 내부로 위키 디렉토리를 바인딩하여 자동 로딩되게 설정
      - ${HOST_PROJECT_PATH:-.}/data/openkb:/config/Obsidian
    shm_size: "1gb"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs.rule=Host(`docs.localhost`) || Host(`docs.127.0.0.1.nip.io`)"
      - "traefik.http.routers.docs.entrypoints=websecure"
      - "traefik.http.routers.docs.tls=true"
      - "traefik.http.services.docs.loadbalancer.server.port=3000"
