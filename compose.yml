  - apps/ebook/docker/compose.yml
  - apps/viewer/docker/compose.yml
  - infra/gitea/docker/compose.yml
  - infra/mongodb/docker/compose.yml
  - infra/meilisearch/docker/compose.yml
  - infra/redis/docker/compose.yml
  - infra/traefik/docker/compose.yml
  - tools/obsidian/docker/compose.yml
  - apps/openkb/docker/compose.yml
  - apps/wiki/docker/compose.yml
  - infra/autoheal/docker/compose.yml

