  - docker/tools/cronicle/compose.yml
  - docker/tools/dozzle/compose.yml
  - docker/tools/jupyter/compose.yml
  - docker/tools/kasm/compose.yml
  - docker/tools/opencode/compose.yml
  - docker/tools/yacht/compose.yml
  - docker/tools/onwatch/compose.yml
  - docker/infra/mongodb/compose.yml
  - docker/infra/meilisearch/compose.yml
  - docker/infra/redis/compose.yml
  - docker/infra/traefik/compose.yml
