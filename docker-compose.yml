services:
  clipper:
    build: .
    image: linkedin-clipper:latest
    environment:
      - AUTH=${AUTH:-}
      - PARALLEL=${PARALLEL:-}
      - LISTS=${LISTS:-}
      - URLS=${URLS:-}
      - HTML=${HTML:-}
      - MD=${MD:-}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('playwright')"]
      interval: 30s
      timeout: 10s
      retries: 3

