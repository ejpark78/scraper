services:
  traefik:
    image: traefik:v3.7.1
    command:
      - "--ping=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--serverstransport.insecureskipverify=true"
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Seoul
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`route.localhost`) || Host(`route.127.0.0.1.nip.io`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-redirect"
      - "traefik.http.middlewares.dashboard-redirect.redirectregex.regex=^http://route.localhost/$$"
      - "traefik.http.middlewares.dashboard-redirect.redirectregex.replacement=http://route.localhost/dashboard/"

  kasm:
    # 📝 Default Login Info:
    # - URL: https://kasm.localhost
    # - User: admin@kasm.local
    # - Pass: password2026 (custom password configured below VNC_PW)
    build:
      context: docker/kasm
      dockerfile: Dockerfile
    image: linkedin/kasm:latest
    profiles:
      - tools    
    environment:
      - VNC_PW=password2026
      - VNCOPTIONS=-disableBasicAuth
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Asia/Seoul
    shm_size: "1gb"
    volumes:
      - .:/home/kasm-user/linkedin
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost:6901/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kasm.rule=Host(`kasm.localhost`) || Host(`kasm.127.0.0.1.nip.io`)"
      - "traefik.http.routers.kasm.entrypoints=web"
      - "traefik.http.services.kasm.loadbalancer.server.port=6901"
      - "traefik.http.services.kasm.loadbalancer.server.scheme=https"

  redis:
    image: redis:alpine
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./data/.services/redis:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7.0
    environment:
      - TZ=Asia/Seoul
      - MONGO_INITDB_DATABASE=linkedin
    volumes:
      - ./data/.services/mongodb:/data/db
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    networks:
      default:
        aliases:
          - mongo
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongo-express:
    # 📝 Default Login Info:
    # - URL: http://me.localhost
    # - User: admin
    # - Pass: pass
    image: mongo-express:latest
    environment:
      - TZ=Asia/Seoul
      - MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
    restart: unless-stopped
    profiles:
      - tools       
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://admin:pass@127.0.0.1:8081/', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mongoexpress.rule=Host(`me.localhost`) || Host(`me.127.0.0.1.nip.io`)"
      - "traefik.http.routers.mongoexpress.entrypoints=web"
      - "traefik.http.services.mongoexpress.loadbalancer.server.port=8081"

  redisinsight:
    image: redis/redisinsight:3.4.2
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Seoul
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5540/', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redisinsight.rule=Host(`redis.localhost`) || Host(`redis.127.0.0.1.nip.io`)"
      - "traefik.http.routers.redisinsight.entrypoints=web"
      - "traefik.http.services.redisinsight.loadbalancer.server.port=5540"

  clipper:
    build:
      context: .
      dockerfile: docker/clipper/Dockerfile
    image: linkedin/clipper:latest
    profiles:
      - runtime
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - AUTH=${AUTH:-}
      - PARALLEL=${PARALLEL:-}
      - SLACK_TIME=${SLACK_TIME:-}
      - CHUNK_SIZE=${CHUNK_SIZE:-}
      - LISTS=${LISTS:-}
      - URLS=${URLS:-}
      - HTML=${HTML:-}
      - MD=${MD:-}
      - TZ=Asia/Seoul
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  clipper-worker:
    build:
      context: .
      dockerfile: docker/clipper/Dockerfile
    image: linkedin/clipper:latest
    command: ["npx", "ts-node", "src/redis_worker.ts"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Seoul
      - AUTH=${AUTH:-}
      - JSON_LOG=true
      - SLACK_TIME=0
      - PARALLEL=1
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ./data/sessions:/app/data/sessions
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "redis_worker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 5

  cronicle:
    # 📝 Default Login Info:
    # - URL: http://cron.localhost
    # - User: admin
    # - Pass: admin
    build:
      context: docker/cronicle
      dockerfile: Dockerfile
    image: linkedin/cronicle:latest
    hostname: localhost
    profiles:
      - tools    
    environment:
      - TZ=Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/.services/cronicle:/opt/cronicle/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3012/', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cronicle.rule=Host(`cron.localhost`) || Host(`cron.127.0.0.1.nip.io`)"
      - "traefik.http.routers.cronicle.entrypoints=web"
      - "traefik.http.services.cronicle.loadbalancer.server.port=3012"

  jupyter:
    build:
      context: docker/jupyter
      dockerfile: Dockerfile
    image: linkedin/jupyter:latest
    profiles:
      - tools
    user: root
    environment:
      - TZ=Asia/Seoul
      - NB_UID=1000
      - NB_GID=1000
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
    volumes:
      - ./notebooks:/home/jovyan
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: ["start-notebook.sh", "--NotebookApp.token=''", "--NotebookApp.password=''"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jupyter.rule=Host(`jupyter.localhost`) || Host(`jupyter.127.0.0.1.nip.io`)"
      - "traefik.http.routers.jupyter.entrypoints=web"
      - "traefik.http.services.jupyter.loadbalancer.server.port=8888"

  yacht:
    # 📝 Default Login Info:
    # - URL: http://yacht.localhost
    # - User: admin@yacht.local
    # - Pass: pass
    image: selfhostedpro/yacht:latest
    profiles:
      - tools
    environment:
      - base_url=/api/
    volumes:
      - ./data/.services/yacht:/config
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "uvicorn"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yacht.rule=Host(`yacht.localhost`) || Host(`yacht.127.0.0.1.nip.io`)"
      - "traefik.http.routers.yacht.entrypoints=web"
      - "traefik.http.services.yacht.loadbalancer.server.port=8000"

  dozzle:
    # 📝 Dozzle: Real-time container log viewer
    # - URL: http://dozzle.localhost
    # - No login required by default.
    image: amir20/dozzle:latest
    profiles:
      - tools
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`dozzle.localhost`) || Host(`dozzle.127.0.0.1.nip.io`)"
      - "traefik.http.routers.dozzle.entrypoints=web"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"



