services:
  traefik:
    image: traefik:v3.7.1
    command:
      - "--ping=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--serverstransport.insecureskipverify=true"
    ports:
      - "80:80"
    environment:
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`proxy.localhost`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-redirect"
      - "traefik.http.middlewares.dashboard-redirect.redirectregex.regex=^http://proxy.localhost/$$"
      - "traefik.http.middlewares.dashboard-redirect.redirectregex.replacement=http://proxy.localhost/dashboard/"

  kasm:
    build:
      context: .
      dockerfile: docker/kasm/Dockerfile
    image: linkedin-kasm:latest
    environment:
      - VNC_PW=password2026
      - VNCOPTIONS=-disableBasicAuth
      - USER_ID=1000
      - GROUP_ID=1000
    shm_size: "1gb"
    volumes:
      - .:/home/kasm-user/linkedin
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost:6901/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kasm.rule=Host(`kasm.localhost`)"
      - "traefik.http.routers.kasm.entrypoints=web"
      - "traefik.http.services.kasm.loadbalancer.server.port=6901"
      - "traefik.http.services.kasm.loadbalancer.server.scheme=https"

  clipper:
    build:
      context: .
      dockerfile: docker/clipper/Dockerfile
    image: linkedin-clipper:latest
    profiles:
      - tools
    environment:
      - AUTH=${AUTH:-}
      - PARALLEL=${PARALLEL:-}
      - LISTS=${LISTS:-}
      - URLS=${URLS:-}
      - HTML=${HTML:-}
      - MD=${MD:-}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./src:/app/src
      - ./Makefile:/app/Makefile

  redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redisinsight:
    image: redis/redisinsight:3.4.2
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5540/', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redisinsight.rule=Host(`redis.localhost`)"
      - "traefik.http.routers.redisinsight.entrypoints=web"
      - "traefik.http.services.redisinsight.loadbalancer.server.port=5540"

  clipper-worker:
    build:
      context: .
      dockerfile: docker/clipper/Dockerfile
    image: linkedin-clipper:latest
    restart: unless-stopped
    command: ["npx", "ts-node", "src/redis_worker.ts"]
    environment:
      - REDIS_URL=redis://redis:6379
      - AUTH=${AUTH:-}
      - JSON_LOG=true
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "redis_worker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 5

  cronicle:
    image: bluet/cronicle-docker:0.9.99
    hostname: localhost
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/cronicle:/opt/cronicle/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3012/', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cronicle.rule=Host(`cron.localhost`)"
      - "traefik.http.routers.cronicle.entrypoints=web"
      - "traefik.http.services.cronicle.loadbalancer.server.port=3012"

