<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Document Explorer</title>
  <!-- Google Fonts & Marked.js -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Prism.js for syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" id="app-container">
    <!-- 1. Left Sidebar: Collections -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">🛸</span>
        <h2>Antigravity</h2>
        <button id="sidebar-toggle" class="sidebar-toggle" title="Collapse Sidebar">◀</button>
      </div>
      <div class="section-title">Collections</div>
      <ul id="collection-list" class="collection-list">
        <li class="loading-text">Loading collections...</li>
      </ul>
      <div class="sidebar-footer">
        <span class="mcp-status" id="mcp-indicator">
          <span class="status-dot green"></span>
          MCP Server Ready
        </span>
      </div>
    </aside>

    <!-- 2. Middle Panel: Document list & Search -->
    <section class="list-panel">
      <div class="search-header">
        <button id="sidebar-expand" class="sidebar-expand hidden" title="Expand Sidebar">☰</button>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search documents..." autocomplete="off">
        </div>
      </div>
      <div class="country-filters hidden" id="country-filters">
        <button class="country-badge active" data-country="">🌎 All</button>
        <button class="country-badge" data-country="Japan">🇯🇵 Japan</button>
        <button class="country-badge" data-country="United Arab Emirates">🇦🇪 UAE</button>
        <button class="country-badge" data-country="Austria">🇦🇹 Austria</button>
        <button class="country-badge" data-country="South Korea">🇰🇷 Korea</button>
        <button class="country-badge" data-country="Germany">🇩🇪 Germany</button>
        <button class="country-badge" data-country="Canada">🇨🇦 Canada</button>
      </div>
      <div class="list-container">
        <div id="document-list" class="document-list">
          <div class="empty-state">Select a collection to browse documents</div>
        </div>
        <div class="pagination" id="pagination-controls">
          <button id="prev-page" class="page-btn" disabled>◀</button>
          <span id="page-indicator">Page 1</span>
          <button id="next-page" class="page-btn" disabled>▶</button>
        </div>
      </div>
    </section>

    <!-- 3. Right Panel: Document details (Tabs) -->
    <main class="detail-panel">
      <div id="detail-empty" class="detail-empty">
        <div class="empty-art">📬</div>
        <h3>No Document Selected</h3>
        <p>Click a document from the list to view its contents, markdown, and original source HTML.</p>
      </div>

      <div id="detail-content" class="detail-content hidden">
        <header class="detail-header">
          <h2 id="doc-title">Document Title</h2>
          <div class="doc-meta-info">
            <a class="meta-tag" id="doc-source-badge" target="_blank">GeekNews</a>
            <span class="meta-tag" id="doc-date">2026-06-07</span>
            <a href="#" id="doc-ref-url" target="_blank" class="meta-link hidden">Reference URL ↗</a>
          </div>
        </header>

        <nav class="tabs-nav">
          <button class="tab-btn active" data-tab="tab-rendered">Silver (Rendered)</button>
          <button class="tab-btn" data-tab="tab-markdown">Silver (Markdown)</button>
          <button class="tab-btn" data-tab="tab-silver-json">Silver (JSON)</button>
          <button class="tab-btn" data-tab="tab-html">Bronze (HTML)</button>
          <button class="tab-btn" data-tab="tab-bronze-json">Bronze (JSON)</button>
        </nav>

        <div class="tab-panes">
          <div id="tab-rendered" class="tab-pane active markdown-body">
            <!-- Rendered Markdown goes here -->
          </div>
          <div id="tab-markdown" class="tab-pane">
            <pre><code class="language-markdown" id="markdown-code"></code></pre>
          </div>
          <div id="tab-silver-json" class="tab-pane">
            <pre><code class="language-json" id="silver-json-code"></code></pre>
          </div>
          <div id="tab-html" class="tab-pane">
            <iframe id="html-preview" class="html-preview" srcdoc="<p>No HTML raw available</p>"></iframe>
          </div>
          <div id="tab-bronze-json" class="tab-pane">
            <pre><code class="language-json" id="bronze-json-code"></code></pre>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
