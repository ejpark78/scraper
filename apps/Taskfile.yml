version: '3'

includes:
  crawler:
    taskfile: ./crawler/Taskfile.yml
    dir: ./apps/crawler
  ebook:
    taskfile: ./ebook/Taskfile.yml
    dir: ./apps/ebook
  openkb:
    taskfile: ./openkb/Taskfile.yml
    dir: ./apps/openkb
  viewer:
    taskfile: ./viewer/Taskfile.yml
    dir: ./apps/viewer

tasks:
  browser:login:
    desc: "Log into a browser-backed site session."
    summary: |
      Log into a Playwright browser-backed site session (LinkedIn, GPTERS, etc.) to store authentication state.
      
      [Variables]
        - SITE: (옵션) 로그인 세션을 생성할 대상 사이트 식별자 (기본값: "linkedin")
        
      [Usage Examples]
        - task app:browser:login SITE="linkedin"
    cmds:
      - task app:crawler:login SITE={{.SITE | default "linkedin"}}

  browser:open:
    desc: "Open the Playwright browser helper."
    summary: |
      Open Playwright in non-headless/headed mode to inspect current pages or debug sessions manually.
      
      [Variables]
        - SITE: (옵션) 로그인 세션을 디버깅할 대상 사이트 식별자 (기본값: "linkedin")
        
      [Usage Examples]
        - task app:browser:open SITE="linkedin"
    cmds:
      - task app:crawler:open SITE={{.SITE | default "linkedin"}}

  browser:inspect-layout:
    desc: Inspect a browser-rendered layout.
    summary: |
      Launches browser layout diagnostics to inspect crawler conversion.
      
      [Usage Examples]
        - task app:browser:inspect-layout
    cmds:
      - task app:crawler:inspect-layout

  browser:logout:
    desc: "Remove a browser-backed site session."
    summary: |
      Remove stored authentication credentials and cookie states for a given site session.
      
      [Variables]
        - SITE: (옵션) 로그아웃시킬 대상 사이트 식별자 (기본값: "linkedin")
        
      [Usage Examples]
        - task app:browser:logout SITE="linkedin"
    cmds:
      - task app:crawler:logout SITE={{.SITE | default "linkedin"}}

  gmail:sync:
    desc: Sync Gmail messages through the crawler Gmail tool.
    cmds:
      - task app:crawler:gmail:sync

  worker:rebuild:
    desc: Rebuild crawler worker images.
    cmds:
      - task app:crawler:build

  worker:restart:
    desc: "Restart crawler workers."
    summary: |
      Restart all crawler worker processes and scale them horizontally.
      
      [Variables]
        - SCALE: (옵션) 확장할 워커 복제본(Replica) 수 (기본값: "1")
        
      [Usage Examples]
        - task app:worker:restart SCALE=3
    cmds:
      - task app:crawler:up SCALE={{.SCALE | default "1"}}

  worker:clear-queue:
    desc: Clear crawler queues.
    cmds:
      - task app:crawler:clear-queue

  worker:grep-errors:
    desc: Grep scraper and converter errors from logs.
    cmds:
      - task app:crawler:grep-errors

  worker:dump-queue:
    desc: Dump active crawler queues.
    cmds:
      - task app:crawler:queue:dump

  worker:fix-urls:
    desc: Run crawler URL cleanup.
    cmds:
      - task app:crawler:queue:fix-urls

  worker:queue-status:
    desc: Print crawler queue status.
    cmds:
      - task app:crawler:queue:status

  tests:urls:
    desc: Run URL manager tests.
    cmds:
      - task app:crawler:test:urls

  tests:mcp:
    desc: Run MCP client tests.
    cmds:
      - task app:crawler:test:mcp

  tests:sites:
    desc: Run crawler site converter tests.
    cmds:
      - task app:crawler:test

  tests:extract:
    desc: "Extract an article."
    summary: |
      Manually run extraction and Silver conversion for a specific article ID.
      
      [Variables]
        - SITE: (필수) 추출할 대상 사이트명 (예: gpters, yozm, geeknews)
        - ID: (필수) 문서의 고유 ID 식별자 (MongoDB bronze.urls 내 _id 값 또는 URL 핑거프린트)
        
      [Usage Examples]
        - task app:tests:extract SITE="yozm" ID="2451"
    cmds:
      - task app:crawler:extract SITE={{.SITE}} ID={{.ID}}

  tests:debug:
    desc: "Debug HTML extraction."
    summary: |
      Run deep parser diagnostics on a raw HTML dump or a target document path.
      
      [Variables]
        - FILE: 로컬 raw HTML 파일의 경로 (이 옵션 지정 시 아래 SITE, ID 생략 가능)
        - SITE: 분석할 대상 사이트명
        - ID: 분석할 문서 고유 ID 식별자
        
      [Usage Examples]
        - task app:tests:debug FILE="/tmp/dump.html"
        - task app:tests:debug SITE="gpters" ID="102"
    cmds:
      - task app:crawler:debug FILE={{.FILE}} SITE={{.SITE}} ID={{.ID}}

  sites:list:
    desc: "Run crawler list command."
    summary: |
      List crawled target URLs, metadata, and status distribution for a specific site.
      
      [Variables]
        - SITE: (필수) 목록을 출력할 사이트명 (예: geeknews, linkedin, yozm)
        - PAGE: (옵션) 조회할 페이지 번호 (기본값: "1")
        - LIST_SLACK: (옵션) 슬랙(Slack) 로깅 제한 설정값 (기본값: "2")
        
      [Usage Examples]
        - task app:sites:list SITE="geeknews"
        - task app:sites:list SITE="yozm" PAGE=2
    cmds:
      - task app:crawler:site SITE={{.SITE}} CMD=list PAGE={{.PAGE | default "1"}} LIST_SLACK={{.LIST_SLACK | default "2"}}

  sites:refresh-urls:
    desc: "Refresh crawler URLs."
    summary: |
      Trigger crawling and scraping cycle to fetch newest URLs for a specific site.
      
      [Variables]
        - SITE: (필수) 새로운 URL 목록을 갱신할 사이트명 (예: gpters, linkedin)
        
      [Usage Examples]
        - task app:sites:refresh-urls SITE="gpters"
    cmds:
      - task app:crawler:site SITE={{.SITE}} CMD=refresh-urls

  sites:refresh-silver:
    desc: "Refresh crawler Silver documents."
    summary: |
      Re-process raw HTML data (Bronze) and convert it into structured markdown (Silver) for a specific site.
      
      [Variables]
        - SITE: (필수) 실버 데이터를 재생성할 사이트명 (예: maily_josh, uppity)
        
      [Usage Examples]
        - task app:sites:refresh-silver SITE="uppity"
    cmds:
      - task app:crawler:site SITE={{.SITE}} CMD=refresh-silver

  sites:aicasebook:list:
    desc: "List AiCasebook targets."
    summary: |
      List crawled target URLs, metadata, and status distribution for AiCasebook.
      
      [Variables]
        - PAGE: (옵션) 조회할 페이지 번호 (기본값: "1")
        - LIST_SLACK: (옵션) 슬랙 로깅 제한 수준 (기본값: "2")
        
      [Usage Examples]
        - task app:sites:aicasebook:list
        - task app:sites:aicasebook:list PAGE=2
    cmds:
      - task app:sites:list SITE=aicasebook PAGE={{.PAGE | default "1"}} LIST_SLACK={{.LIST_SLACK | default "2"}}

  sites:aicasebook:refresh-urls:
    desc: Refresh AiCasebook URLs.
    cmds:
      - task app:sites:refresh-urls SITE=aicasebook

  sites:aicasebook:refresh-silver:
