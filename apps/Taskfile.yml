version: '3'

includes:
  crawler:
    taskfile: ./crawler/Taskfile.yml
    dir: ./apps/crawler
  ebook:
    taskfile: ./ebook/Taskfile.yml
    dir: ./apps/ebook
  openkb:
    taskfile: ./openkb/Taskfile.yml
    dir: ./apps/openkb
  viewer:
    taskfile: ./viewer/Taskfile.yml
    dir: ./apps/viewer

tasks:
  browser:login:
    desc: "Log into a browser-backed site session. Variables: SITE."
    cmds:
      - task app:crawler:login SITE={{.SITE | default "linkedin"}}

  browser:open:
    desc: "Open the Playwright browser helper. Variables: SITE."
    cmds:
      - task app:crawler:open SITE={{.SITE | default "linkedin"}}

  browser:inspect-layout:
    desc: Inspect a browser-rendered layout.
    cmds:
      - task app:crawler:inspect-layout

  browser:logout:
    desc: "Remove a browser-backed site session. Variables: SITE."
    cmds:
      - task app:crawler:logout SITE={{.SITE | default "linkedin"}}

  gmail:sync:
    desc: Sync Gmail messages through the crawler Gmail tool.
    cmds:
      - task app:crawler:gmail:sync

  worker:rebuild:
    desc: Rebuild crawler worker images.
    cmds:
      - task app:crawler:build

  worker:restart:
    desc: "Restart crawler workers. Variables: SCALE."
    cmds:
      - task app:crawler:up SCALE={{.SCALE | default "1"}}

  worker:clear-queue:
    desc: Clear crawler queues.
    cmds:
      - task app:crawler:clear-queue

  worker:grep-errors:
    desc: Grep scraper and converter errors from logs.
    cmds:
      - task app:crawler:grep-errors

  worker:dump-queue:
    desc: Dump active crawler queues.
    cmds:
      - task app:crawler:queue:dump

  worker:fix-urls:
    desc: Run crawler URL cleanup.
    cmds:
      - task app:crawler:queue:fix-urls

  worker:queue-status:
    desc: Print crawler queue status.
    cmds:
      - task app:crawler:queue:status

  tests:urls:
    desc: Run URL manager tests.
    cmds:
      - task app:crawler:test:urls

  tests:mcp:
    desc: Run MCP client tests.
    cmds:
      - task app:crawler:test:mcp

  tests:sites:
    desc: Run crawler site converter tests.
    cmds:
      - task app:crawler:test

  tests:extract:
    desc: "Extract an article. Variables: SITE, ID."
    cmds:
      - task app:crawler:extract SITE={{.SITE}} ID={{.ID}}

  tests:debug:
    desc: "Debug HTML extraction. Variables: FILE or SITE and ID."
    cmds:
      - task app:crawler:debug FILE={{.FILE}} SITE={{.SITE}} ID={{.ID}}

  sites:list:
    desc: "Run crawler list command. Variables: SITE, PAGE, LIST_SLACK."
    cmds:
      - task app:crawler:site SITE={{.SITE}} CMD=list PAGE={{.PAGE | default "1"}} LIST_SLACK={{.LIST_SLACK | default "2"}}

  sites:refresh-urls:
    desc: "Refresh crawler URLs. Variables: SITE."
    cmds:
      - task app:crawler:site SITE={{.SITE}} CMD=refresh-urls

  sites:refresh-silver:
    desc: "Refresh crawler Silver documents. Variables: SITE."
    cmds:
      - task app:crawler:site SITE={{.SITE}} CMD=refresh-silver

  sites:aicasebook:list:
    desc: "List AiCasebook targets. Variables: PAGE, LIST_SLACK."
    cmds:
      - task app:sites:list SITE=aicasebook PAGE={{.PAGE | default "1"}} LIST_SLACK={{.LIST_SLACK | default "2"}}

  sites:aicasebook:refresh-urls:
    desc: Refresh AiCasebook URLs.
    cmds:
      - task app:sites:refresh-urls SITE=aicasebook

  sites:aicasebook:refresh-silver:
    desc: Refresh AiCasebook Silver documents.
    cmds:
      - task app:sites:refresh-silver SITE=aicasebook

  sites:dailydoseofds:list:
    desc: "List Daily Dose of DS targets. Variables: PAGE, LIST_SLACK."
    cmds:
      - task app:sites:list SITE=dailydoseofds PAGE={{.PAGE | default "1"}} LIST_SLACK={{.LIST_SLACK | default "2"}}

  sites:dailydoseofds:refresh-urls:
    desc: Refresh Daily Dose of DS URLs.
    cmds:
      - task app:sites:refresh-urls SITE=dailydoseofds

  sites:dailydoseofds:refresh-silver:
