services:
  ebook:
    build:
      context: ${HOST_PROJECT_PATH:-.}/apps/ebook
      dockerfile: docker/Dockerfile
    image: scraper/ebook:latest
    profiles:
      - ebook
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - MONGO_URL=${MONGO_URL:-mongodb://mongodb:27017}
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/ebook:/app/data
    restart: "no"
