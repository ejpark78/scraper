services:
  ebook:
    build:
      context: .
      dockerfile: Dockerfile
    image: scraper/ebook:latest
    profiles:
      - ebook
    environment:
      - TZ=Asia/Seoul
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/ebook:/app/data
    restart: "no"
