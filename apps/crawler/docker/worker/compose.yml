# ==============================================================================
# 🏃 LinkedIn Crawler CLI & Distributed Workers (profile: runtime)
# ==============================================================================

services:
  worker:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: scraper/worker:latest
    working_dir: /app
    profiles:
      - runtime
      - crawler
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - AUTH=${AUTH:-}
      - LIST_SLACK=${LIST_SLACK:-}
      - CHUNK_SIZE=${CHUNK_SIZE:-}
      - SESSION_DIR=/app/data/sessions
      - LISTS=${LISTS:-}
      - URLS=${URLS:-}
      - HTML=${HTML:-}
      - MD=${MD:-}
      - TZ=Asia/Seoul
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - ${HOST_PROJECT_PATH:-.}/data/sites:/app/data/sites
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  scraper:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: scraper/scraper:latest
    working_dir: /app
    profiles:
      - worker
      - crawler
    command: ["npx", "ts-node", "--project", "/app/tsconfig.json", "src/workers/ScraperWorker.ts"]
    environment:
      - TZ=Asia/Seoul
      - JSON_LOG=true
      - LIST_SLACK=0
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
      - SESSION_DIR=/app/data/sessions
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sessions:/app/data/sessions
      - ${HOST_PROJECT_PATH:-.}/data/sites:/app/data/sites
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ScraperWorker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: ${SCALE:-2}

  converter:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: scraper/converter:latest
    working_dir: /app
    profiles:
      - worker
      - crawler
    command: ["npx", "ts-node", "--project", "/app/tsconfig.json", "src/workers/ConverterWorker.ts"]
    environment:
      - TZ=Asia/Seoul
      - AUTH=${AUTH:-}
      - JSON_LOG=true
      - LIST_SLACK=0
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/sites:/app/data/sites
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ConverterWorker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1

  indexer:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: scraper/indexer:latest
    working_dir: /app
    profiles:
      - worker
      - crawler
    command: ["npx", "ts-node", "--project", "/app/tsconfig.json", "src/workers/IndexerWorker.ts"]
    environment:
      - TZ=Asia/Seoul
      - AUTH=${AUTH:-}
      - JSON_LOG=true
      - LIST_SLACK=0
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "IndexerWorker.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1

  ebook:
    build:
      context: ../../../../
      dockerfile: apps/crawler/docker/worker/ebook/Dockerfile
    image: scraper/ebook:latest
    profiles:
      - ebook
    environment:
      - TZ=Asia/Seoul
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ${HOST_PROJECT_PATH:-.}/apps/ebook:/app
      - ${HOST_PROJECT_PATH:-.}/data/ebook:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: "no"
