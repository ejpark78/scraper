    <title>Microsoft AI, 5개 분야 7종 MAI 모델 공개. 증류 없이 바닥부터 학습한 모델 패밀리 - 읽을거리&amp;정보공유 - PyTorchKR</title>
    <meta name="description" content="MAI 모델 패밀리 소개
2026년 6월 2일, Microsoft Build 2026 키노트에서 Microsoft AI(MAI)가 사내에서 직접 개발한 7종의 신규 모델을 한 번에 공개했습니다. 이 모델들은 이미지, 음성, 전사(transcription), 추론(reasoning), 코딩 이라는 5개 분야를 아우르며, 서로 독립된 제품이 아니라 같은 데이터 규율, 같은 인프라, 같은 평가 프레임워크를 공유하는 하나의 멀티모달 모델 패밀리(model family) 로 설계되었습니다. 발표를 이끈 Mustafa Suleyman과 MAI 팀은 이번 출시를 &amp;quot;모델 한 개&amp;quot;가 아니라 &amp;quot;지속적으로 더 나아지는 시스템&amp;quot;을 만드는 여정의 첫걸음으로 규정합니다. 
이번 발표에서 가장 눈에 띄는 차별점은 모델의 벤치마크 점수 자체보다 어떻게 만들어졌는가에 있습니다. MAI 팀은 다른 연구소의 모델로부터 지식을 증류(distillation) 하지 않고, 깨끗하고 적절히 라이선스된 데이터만으로 바닥부터(from scratch) 학습했다는 점을 반복해서 강조합니다. 아키텍처부터 학습 파이프라인, 사후 학습(post-training)까지 모든 구성요소를 직접 만들었고, 자체 실리콘인 Maia 200 가속기와 모델을 함께 설계(co-design)해 학습과 추론 효율을 끌어올렸습니다. 이는 단순한 성능 경쟁을 넘어 &amp;quot;출처를 신뢰할 수 있고, 상업적으로 안전하게 프로덕션에 투입할 수 있는 모델&amp;quot;을 만들겠다는 선언에 가깝습니다. 
또한 MAI는 이 모델들을 Azure Foundry와 자사 제품(PowerPoint, OneDrive, Copilot, Teams, GitHub, VS Code 등)에 통합하는 동시에, OpenRouter, Fireworks, Baseten 같은 개발자 플랫폼에도 폭넓게 배포합니다. 특히 개발자가 직접 모델의 가중치(weights)를 튜닝할 수 있다는 점이 처음으로 열렸습니다. 모델의 궁극적인 지향점은 MAI가 휴머니스트 초지능(Humanist Superint&amp;hellip;">

<meta property="og:description" content="MAI 모델 패밀리 소개 2026년 6월 2일, Microsoft Build 2026 키노트에서 Microsoft AI(MAI)가 사내에서 직접 개발한 7종의 신규 모델을 한 번에 공개했습니다. 이 모델들은 이미지, 음성, 전사(transcription), 추론(reasoning), 코딩 이라는 5개 분야를 아우르며, 서로 독립된 제품이 아니라 같은 데이터 규율, 같은 인프라, 같은 평가 프레임워크를 공유하는 하나의 멀티모달 모델 패밀리(model family) 로 설계되었습니다. 발표를 이끈 Mustafa Suleyman과 MAI 팀은 이번 출시를 &quot;모델 한 개&quot;가 아니라 &quot;지속적으로 더 나아지는 시스템&quot;을 만드는 여정의 첫걸음으로 규정합니다.  이번 발표에서 가장 눈에 띄는 차별점은 모델의 벤치마크 점수 자체보다 어떻게 만들어졌는가에 있습니다. MAI 팀은 다른 연구소의 모델로부터 지식을 증류(distillation) 하지 않고, 깨끗하고 적절히 라이선스된 데이터만으로 바닥..." />

\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-mai-1\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-mai-1\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003eMAI 모델 패밀리 소개\\u003c/h2\\u003e\\n\\u003cp\\u003e2026년 6월 2일, \\u003ca href=\\\&quot;https://microsoft.ai/news/microsoft-build-2026-mai-keynote-transcript/\\\&quot;\\u003eMicrosoft Build 2026\\u003c/a\\u003e 키노트에서 \\u003ca href=\\\&quot;https://microsoft.ai/\\\&quot;\\u003eMicrosoft AI(MAI)\\u003c/a\\u003e가 사내에서 직접 개발한 7종의 신규 모델을 한 번에 공개했습니다. 이 모델들은 \\u003cstrong\\u003e이미지, 음성, 전사(transcription), 추론(reasoning), 코딩\\u003c/strong\\u003e 이라는 5개 분야를 아우르며, 서로 독립된 제품이 아니라 같은 데이터 규율, 같은 인프라, 같은 평가 프레임워크를 공유하는 하나의 \\u003cstrong\\u003e멀티모달 모델 패밀리(model family)\\u003c/strong\\u003e 로 설계되었습니다. 발표를 이끈 Mustafa Suleyman과 MAI 팀은 이번 출시를 \\\&quot;모델 한 개\\\&quot;가 아니라 \\\&quot;지속적으로 더 나아지는 시스템\\\&quot;을 만드는 여정의 첫걸음으로 규정합니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이번 발표에서 가장 눈에 띄는 차별점은 모델의 벤치마크 점수 자체보다 \\u003cstrong\\u003e어떻게 만들어졌는가\\u003c/strong\\u003e에 있습니다. MAI 팀은 다른 연구소의 모델로부터 지식을 \\u003cstrong\\u003e증류(distillation)\\u003c/strong\\u003e 하지 않고, 깨끗하고 적절히 라이선스된 데이터만으로 \\u003cstrong\\u003e바닥부터(from scratch) 학습\\u003c/strong\\u003e했다는 점을 반복해서 강조합니다. 아키텍처부터 학습 파이프라인, 사후 학습(post-training)까지 모든 구성요소를 직접 만들었고, 자체 실리콘인 Maia 200 가속기와 모델을 함께 설계(co-design)해 학습과 추론 효율을 끌어올렸습니다. 이는 단순한 성능 경쟁을 넘어 \\\&quot;출처를 신뢰할 수 있고, 상업적으로 안전하게 프로덕션에 투입할 수 있는 모델\\\&quot;을 만들겠다는 선언에 가깝습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e또한 MAI는 이 모델들을 \\u003ca href=\\\&quot;https://aka.ms/mai-image-2.5-foundrycard\\\&quot;\\u003eAzure Foundry\\u003c/a\\u003e와 자사 제품(PowerPoint, OneDrive, Copilot, Teams, GitHub, VS Code 등)에 통합하는 동시에, \\u003ca href=\\\&quot;https://openrouter.ai/microsoft/mai-image-2.5\\\&quot;\\u003eOpenRouter\\u003c/a\\u003e, \\u003ca href=\\\&quot;https://fireworks.ai/\\\&quot;\\u003eFireworks\\u003c/a\\u003e, \\u003ca href=\\\&quot;https://www.baseten.co/blog/mai-thinking-1/\\\&quot;\\u003eBaseten\\u003c/a\\u003e 같은 개발자 플랫폼에도 폭넓게 배포합니다. 특히 \\u003cstrong\\u003e개발자가 직접 모델의 가중치(weights)를 튜닝할 수 있다\\u003c/strong\\u003e는 점이 처음으로 열렸습니다. 모델의 궁극적인 지향점은 MAI가 \\u003cstrong\\u003e휴머니스트 초지능(Humanist Superintelligence)\\u003c/strong\\u003e 이라 부르는 것으로, 사람과 조직을 대체하는 것이 아니라 돕도록 설계되고 끝까지 인간의 통제 아래 남는 AI를 의미합니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-h-5-7-2\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-h-5-7-2\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e5개 분야 7종 모델 한눈에 보기\\u003c/h2\\u003e\\n\\u003cp\\u003e먼저 이번에 공개된 7종 모델을 분야별로 정리하면 다음과 같습니다.\\u003c/p\\u003e\\n\\u003cdiv class=\\\&quot;md-table\\\&quot;\\u003e\\n\\u003ctable\\u003e\\n\\u003cthead\\u003e\\n\\u003ctr\\u003e\\n\\u003cth\\u003e분야\\u003c/th\\u003e\\n\\u003cth\\u003e모델\\u003c/th\\u003e\\n\\u003cth\\u003e크기/특징\\u003c/th\\u003e\\n\\u003cth\\u003e핵심 지표\\u003c/th\\u003e\\n\\u003c/tr\\u003e\\n\\u003c/thead\\u003e\\n\\u003ctbody\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e추론\\u003c/td\\u003e\\n\\u003ctd\\u003e\\u003cstrong\\u003eMAI-Thinking-1\\u003c/strong\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e35B 활성 / 약 1T 총 파라미터 희소 MoE, 256K 컨텍스트\\u003c/td\\u003e\\n\\u003ctd\\u003eSWE-Bench Pro 52.8%, AIME 2025 97.0%\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e코딩\\u003c/td\\u003e\\n\\u003ctd\\u003e\\u003cstrong\\u003eMAI-Code-1-Flash\\u003c/strong\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e5B 파라미터, GitHub Copilot 통합 추론 효율형\\u003c/td\\u003e\\n\\u003ctd\\u003eSWE-Bench Pro 51.2% (Haiku 4.5 대비 +16점)\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e이미지\\u003c/td\\u003e\\n\\u003ctd\\u003e\\u003cstrong\\u003eMAI-Image-2.5\\u003c/strong\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e최고 충실도(fidelity) 생성, 정밀 편집\\u003c/td\\u003e\\n\\u003ctd\\u003eArena 이미지 편집 2위\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e이미지\\u003c/td\\u003e\\n\\u003ctd\\u003e\\u003cstrong\\u003eMAI-Image-2.5-Flash\\u003c/strong\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e대규모 프로덕션용 고속, 저비용\\u003c/td\\u003e\\n\\u003ctd\\u003e이미지 출력 1M 토큰당 $19.50\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e전사\\u003c/td\\u003e\\n\\u003ctd\\u003e\\u003cstrong\\u003eMAI-Transcribe-1.5\\u003c/strong\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e43개 언어 SOTA 정확도, 배치 전사\\u003c/td\\u003e\\n\\u003ctd\\u003e1시간 오디오를 15초 이내 전사\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e음성\\u003c/td\\u003e\\n\\u003ctd\\u003e\\u003cstrong\\u003eMAI-Voice-2\\u003c/strong\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e15개 언어 표현형 음성 합성(한국어 포함)\\u003c/td\\u003e\\n\\u003ctd\\u003e이전 버전 대비 72% 선호\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e음성\\u003c/td\\u003e\\n\\u003ctd\\u003e\\u003cstrong\\u003eMAI-Voice-2-Flash\\u003c/strong\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e저지연 음성 에이전트용 고효율\\u003c/td\\u003e\\n\\u003ctd\\u003e최고 수준의 속도 대비 가치\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003c/tbody\\u003e\\n\\u003c/table\\u003e\\n\\u003c/div\\u003e\\u003cp\\u003e이제 각 모델을 분야별로 자세히 살펴보겠습니다. 비교 대상으로 자주 등장하는 모델로는 Anthropic의 \\u003ca href=\\\&quot;https://www.anthropic.com/claude\\\&quot;\\u003eClaude Sonnet 4.6와 Opus 4.6, Haiku 4.5\\u003c/a\\u003e, Google의 \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/google-deepmind-lwm-large-world-model-gemini-3/8241\\\&quot;\\u003eGemini 3 계열\\u003c/a\\u003e, 그리고 이미지 분야의 \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/google-deepmind-nano-banana-2/9098\\\&quot;\\u003eNano Banana 2\\u003c/a\\u003e 등이 있습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-h-3\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-h-3\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e\\\&quot;힐 클라이밍 머신\\\&quot;: 증류 없이 바닥부터 오르는 시스템\\u003c/h2\\u003e\\n\\u003cp\\u003eMAI 팀이 이번 발표 전반에서 사용하는 핵심 비유는 \\u003cstrong\\u003e힐 클라이밍 머신(Hill-Climbing Machine)\\u003c/strong\\u003e 입니다. 이는 한 번 잘 만든 모델이 아니라, \\u003cem\\u003e더 많은 연산, 더 좋은 데이터, 더 날카로운 평가\\u003c/em\\u003e를 반복적으로 투입할 때마다 능력이 꾸준히 그리고 안정적으로 올라가는 \\\&quot;조직과 시스템 자체\\\&quot;를 가리킵니다. 모델 개발을 시스템 수준의 최적화 문제로 보고, 데이터 파이프라인, 학습 인프라, 강화학습 환경과 보상, 평가 스위트, 안전 테스트를 모두 측정 가능하고 개선 가능한 형태로 묶어낸 것이 이 머신의 정체입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이 철학은 세 가지 원칙으로 요약됩니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003e능력은 물려받는 것이 아니라 학습하는 것입니다 (Learned, not inherited)\\u003c/strong\\u003e: 다른 모델의 출력을 모방하는 증류는 빠르게 능력을 얻을 수 있지만, 교사 모델의 설계 선택에 종속되어 새로운 상황에 적응하는 조종성(steerability)이 부족해집니다. MAI-Thinking-1은 제3자 모델로부터의 증류 없이 학습해, 모델이 과제를 진짜로 익히도록 강제했습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\n\\u003cstrong\\u003e깨끗한 데이터 (Clean data)\\u003c/strong\\u003e: MAI-Thinking-1은 적절히 라이선스된 깨끗한 데이터로만 학습되었고, \\u003cstrong\\u003e사전 학습(pre-training)\\u003c/strong\\u003e 단계에서 AI가 생성한 콘텐츠는 배제되었습니다. 무엇이 모델을 형성했는지 설명할 수 없으면 그 동작을 이해하거나 신뢰성 있게 개선할 수 없다는 판단입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\n\\u003cstrong\\u003e전 스택에 걸친 자립 (Self-sufficiency across the stack)\\u003c/strong\\u003e: 모델과 Microsoft 자체 가속기의 공동 설계부터 강화학습 프레임워크까지, 학습 인프라를 사내에서 직접 구축했습니다. 실제로 MAI-Thinking-1을 자사 Maia 200 칩에서 GB200과 정면 비교했을 때, end-to-end로 \\u003cstrong\\u003e1.4배의 와트당 성능(performance-per-watt)\\u003c/strong\\u003e 향상을 확인했다고 밝혔습니다. 이 규모에서는 모든 와트가 중요하며, 실리콘과 모델의 공동 설계가 효율의 핵심 우위라는 것입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이러한 규율은 \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/microsoft-phi-3-phi-3-5-phi-3-5-moe-instruct/5082\\\&quot;\\u003eMicrosoft가 이전에 공개한 소형 모델 Phi 계열\\u003c/a\\u003e에서 보여준 \\\&quot;데이터 품질 중심\\\&quot; 접근과도 맥이 닿아 있지만, 이번에는 프런티어급 대형 모델 전체를 자체 데이터와 인프라로 끌어올렸다는 점에서 규모가 다릅니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-mai-thinking-1-4\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-mai-thinking-1-4\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e추론 분야: MAI-Thinking-1\\u003c/h2\\u003e\\n\\u003cp\\u003e\\u003ca href=\\\&quot;https://microsoft.ai/news/introducing-mai-thinking-1/\\\&quot;\\u003eMAI-Thinking-1\\u003c/a\\u003e은 Microsoft AI의 첫 추론(reasoning) 모델이자 텍스트 기반(foundation) 모델입니다. 흥미로운 점은 거대한 모델이 아니라 \\u003cstrong\\u003e중간 체급(medium-sized)\\u003c/strong\\u003e 모델이라는 것입니다. 기반 모델인 MAI-Base-1은 \\u003cstrong\\u003e35B 활성(active), 약 1T 총(total) 파라미터의 희소 전문가 혼합(sparse Mixture of Experts, MoE)\\u003c/strong\\u003e 구조로, 훨씬 큰 모델들보다 추론 시 차지하는 자원(inference footprint)이 작습니다. 그럼에도 SWE-Bench Pro에서 Claude Opus 4.6과 어깨를 나란히 합니다. 모델 크기는 고급 코딩 보조 기능을 \\u003cem\\u003e어디에 배포할 수 있는지, 얼마나 자주 쓸 수 있는지, 일상 워크플로우로 들어올 수 있는지\\u003c/em\\u003e를 결정하기 때문에 이 체급에서의 성능은 실용적으로 중요합니다.\\u003c/p\\u003e\\n\\u003cp\\u003e함께 공개된 \\u003ca href=\\\&quot;https://microsoft.ai/wp-content/uploads/2026/06/main_20260602_2.pdf\\\&quot;\\u003e기술 보고서\\u003c/a\\u003e에 따르면, MAI-Base-1은 Azure 플랫폼 내 Microsoft 운영 클러스터의 \\u003cstrong\\u003e8,000개 GB200 GPU\\u003c/strong\\u003e에서 사내 분산 학습 인프라로 바닥부터 사전 학습되었습니다. 주 사전 학습 단계에서 \\u003cstrong\\u003e30조(30T) 토큰\\u003c/strong\\u003e, 이어지는 중간 학습(mid-training)에서 추가로 3.55조 토큰을 사용했고, 중간 학습 이후 최대 \\u003cstrong\\u003e256K 컨텍스트 길이\\u003c/strong\\u003e에 도달했습니다.\\u003c/p\\u003e\\n\\u003ch3\\u003e\\u003ca name=\\\&quot;p-20154-latentmoe-5\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-latentmoe-5\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e아키텍처: 디코더 트랜스포머와 LatentMoE\\u003c/h3\\u003e\\n\\u003cp\\u003eMAI-Base-1은 디코더 전용(decoder-only) 트랜스포머로, 하드웨어와의 공동 최적화를 염두에 두고 설계되었습니다. 주요 특징은 다음과 같습니다.\\u003c/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e주기적 로컬/글로벌 어텐션\\u003c/strong\\u003e: \\u003ca href=\\\&quot;https://blog.google/technology/developers/gemma-3/\\\&quot;\\u003eGemma 3\\u003c/a\\u003e의 설계를 따라 로컬 어텐션 5개 층마다 글로벌 어텐션 1개 층을 배치합니다. 로컬 층은 슬라이딩 윈도우 512에 \\u003ca href=\\\&quot;https://arxiv.org/abs/2104.09864\\\&quot;\\u003e회전 위치 인코딩(Rotary Position Embedding, RoPE)\\u003c/a\\u003e을 쓰고, 글로벌 층은 위치 인코딩을 쓰지 않습니다(NoPE). 이로써 학습 비용과 추론 시 KV 캐시 크기를 크게 줄입니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e그룹 쿼리 어텐션(Grouped-Query Attention, GQA)\\u003c/strong\\u003e: 8개의 KV 헤드와 헤드당 차원 128을 사용하며, \\u003ca href=\\\&quot;https://github.com/Dao-AILab/flash-attention\\\&quot;\\u003eFlashAttention\\u003c/a\\u003e 계열과 Ulysses 방식의 컨텍스트 병렬화로 긴 컨텍스트를 효율적으로 처리합니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e밀집 FFN과 MoE의 교차 배치\\u003c/strong\\u003e: 각 블록에서 고희소(high-sparsity) MoE 층과 작은 밀집(dense) FFN을 번갈아 배치합니다. MoE는 NVIDIA의 LatentMoE 설계를 채택해, all-to-all 디스패치 전에 공유 다운프로젝션을 적용하고 압축된 표현을 기준으로 \\u003cstrong\\u003e512개 전문가 중 8개\\u003c/strong\\u003e를 softmax 게이팅으로 라우팅합니다. 활성/비활성 메모리를 일정하게 유지하기 위해 토큰을 버리지 않는 \\u003cstrong\\u003edropless MoE\\u003c/strong\\u003e를 구현했습니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e표준 구성요소\\u003c/strong\\u003e: 입출력 양쪽에 \\u003ca href=\\\&quot;https://arxiv.org/abs/1910.07467\\\&quot;\\u003eRMSNorm\\u003c/a\\u003e, \\u003ca href=\\\&quot;https://arxiv.org/abs/2002.05202\\\&quot;\\u003eSwiGLU\\u003c/a\\u003e 활성, 입출력 임베딩 가중치 공유, 그리고 \\u003ccode\\u003eo200k_base\\u003c/code\\u003e 토크나이저(어휘 크기 200,019)를 사용합니다.\\u003c/li\\u003e\\n\\u003c/ul\\u003e\\n\\u003cp\\u003e강화학습(RL) 단계에서는 사고의 연쇄(Chain-of-Thought, CoT)를 과제별 피드백에 대해 학습시키고, 외부 도구를 사용하며, 사람의 선호와 안전 신호를 따르도록 가르칩니다. 추론 흔적(reasoning trace)에 대한 사전 노출 없이 바닥부터 추론하는 법을 배우며, STEM 추론, 에이전트 코딩 및 도구 사용, 유용성과 안전성이라는 세 가지 도메인별 전문가 모델을 각각 학습한 뒤 하나의 모델로 통합합니다.\\u003c/p\\u003e\\n\\u003ch3\\u003e\\u003ca name=\\\&quot;p-20154-h-6\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-h-6\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e벤치마크: 체급을 뛰어넘는 성능\\u003c/h3\\u003e\\n\\u003cp\\u003eMAI-Thinking-1은 다음과 같은 공개 벤치마크 성적을 보고했습니다.\\u003c/p\\u003e\\n\\u003cdiv class=\\\&quot;md-table\\\&quot;\\u003e\\n\\u003ctable\\u003e\\n\\u003cthead\\u003e\\n\\u003ctr\\u003e\\n\\u003cth\\u003e벤치마크\\u003c/th\\u003e\\n\\u003cth\\u003e점수\\u003c/th\\u003e\\n\\u003cth\\u003e의미\\u003c/th\\u003e\\n\\u003c/tr\\u003e\\n\\u003c/thead\\u003e\\n\\u003ctbody\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e\\u003ca href=\\\&quot;https://arxiv.org/abs/2509.16941\\\&quot;\\u003eSWE-Bench Pro\\u003c/a\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e52.8%\\u003c/td\\u003e\\n\\u003ctd\\u003e가장 까다로운 코딩 벤치마크 중 하나에서 Opus 4.6과 동급\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e\\u003ca href=\\\&quot;https://huggingface.co/datasets/MathArena/aime_2025\\\&quot;\\u003eAIME 2025\\u003c/a\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e97.0%\\u003c/td\\u003e\\n\\u003ctd\\u003e범용 수학 추론 능력의 핵심 지표\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003eAIME 2026\\u003c/td\\u003e\\n\\u003ctd\\u003e94.5%\\u003c/td\\u003e\\n\\u003ctd\\u003e최신 수학 경시 문제에서도 강력한 일반화\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003ctr\\u003e\\n\\u003ctd\\u003e\\u003ca href=\\\&quot;https://livecodebench.github.io/\\\&quot;\\u003eLiveCodeBench v6\\u003c/a\\u003e\\u003c/td\\u003e\\n\\u003ctd\\u003e87.7%\\u003c/td\\u003e\\n\\u003ctd\\u003e경쟁 프로그래밍 수준의 코딩 능력\\u003c/td\\u003e\\n\\u003c/tr\\u003e\\n\\u003c/tbody\\u003e\\n\\u003c/table\\u003e\\n\\u003c/div\\u003e\\u003cp\\u003e특히 어떤 벤치마크도 특정해 겨냥하지 않고, 증류 없이 자체 데이터와 보상, 평가 과정만으로 바닥부터 올라왔다는 점이 MAI 팀이 강조하는 부분입니다. 독립 평가 기관 Surge의 사람 평가자들은 블라인드 일대일 비교에서 전반적 품질 면에서 \\u003ca href=\\\&quot;https://www.anthropic.com/claude\\\&quot;\\u003eSonnet 4.6\\u003c/a\\u003e보다 MAI-Thinking-1을 선호했습니다. MAI-Thinking-1은 \\u003ca href=\\\&quot;https://www.baseten.co/blog/mai-thinking-1/\\\&quot;\\u003eBaseten\\u003c/a\\u003e을 통해 개발자에게 제공되며, 추론(reasoning) 모델의 흐름은 앞서 PyTorchKR에서 다룬 \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/gemini-2-5-google-deepmind-thinking/6637\\\&quot;\\u003eGoogle의 Gemini 2.5 \\\&quot;thinking\\\&quot; 모델\\u003c/a\\u003e 등과 함께 보면 맥락을 잡기 좋습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-mai-code-1-flash-7\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-mai-code-1-flash-7\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e코딩 분야: MAI-Code-1-Flash\\u003c/h2\\u003e\\n\\u003cp\\u003e\\u003ca href=\\\&quot;https://microsoft.ai/news/introducingmai-code-1-flash/\\\&quot;\\u003eMAI-Code-1-Flash\\u003c/a\\u003e는 추론 효율에 초점을 맞춘 에이전트 코딩 모델로, 단 \\u003cstrong\\u003e5B 파라미터\\u003c/strong\\u003e로 \\u003ca href=\\\&quot;https://www.anthropic.com/claude\\\&quot;\\u003eClaude Haiku 4.5\\u003c/a\\u003e와 비슷한 체급이지만 비용은 더 저렴합니다. 이 모델의 핵심 설계 철학은 \\u003cem\\u003e\\\&quot;벤치마크가 아니라 개발자를 위해 만든다\\\&quot;\\u003c/em\\u003e 입니다. 코딩 모델은 개발자가 매일 쓰는 바로 그 환경에서 잘 동작할 때 가장 유용하기 때문에, MAI-Code-1-Flash는 프로덕션에서 실제 사용되는 \\u003ca href=\\\&quot;https://github.com/features/copilot\\\&quot;\\u003eGitHub Copilot\\u003c/a\\u003e 하네스(harness)로 직접 학습되었습니다. 덕분에 에이전트 코딩 과제에서 주변 도구 및 시스템과 상호작용하는 법을 익혀, 실제 Copilot 워크플로우에 특히 잘 맞습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e또 하나의 핵심은 \\u003cstrong\\u003e적응형 솔루션 길이 제어(adaptive solution length control)\\u003c/strong\\u003e 입니다. 간단한 요청에는 간결하게 답하고, 더 깊은 분석이나 광범위한 코드 변경이 필요한 문제에는 추론 예산(reasoning budget)을 더 씁니다. 그 결과 개발자는 유용한 출력을 더 빨리 보기 시작하고, MAI 팀은 더 어려운 문제를 \\u003cstrong\\u003e최대 60% 더 적은 토큰\\u003c/strong\\u003e으로 해결하는 사례를 관찰했습니다. 지연(latency)과 비용이 줄고, 토큰당 가치(return on token)가 올라가며, 대화형 워크플로우가 더 매끄럽게 느껴진다는 것입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e성능 면에서는 개발자가 실제로 쓰는 동일한 프로덕션 하네스로 \\u003ca href=\\\&quot;https://www.anthropic.com/claude\\\&quot;\\u003eClaude Haiku 4.5\\u003c/a\\u003e와 비교했습니다. MAI-Code-1-Flash는 SWE-Bench Verified, \\u003ca href=\\\&quot;https://arxiv.org/abs/2509.16941\\\&quot;\\u003eSWE-Bench Pro\\u003c/a\\u003e, SWE-Bench Multilingual, Terminal Bench 2의 네 가지 핵심 코딩 벤치마크 모두에서 Haiku 4.5를 앞섰고, 특히 다양한 실세계 과제로 구성된 SWE-Bench Pro에서 \\u003cstrong\\u003e51.2% 대 35.2%로 16점 차이\\u003c/strong\\u003e를 냈습니다. \\u003cem\\u003e더 똑똑할 뿐 아니라 더 가볍다\\u003c/em\\u003e는 점, 즉 정확도와 효율이 더 이상 트레이드오프가 아니라는 점을 보여주는 결과입니다. 이 모델은 오늘부터 \\u003ca href=\\\&quot;https://code.visualstudio.com/\\\&quot;\\u003eVS Code\\u003c/a\\u003e의 기본 모델 중 하나로 약 10%의 개인 사용자에게 순차 적용되며, 모델 선택기에서 Auto를 고른 사용자에게 라우팅될 수 있습니다. 코딩 에이전트의 평가 방식 자체에 관심이 있다면 PyTorchKR의 \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/artificial-analysis/10183\\\&quot;\\u003eArtificial Analysis 코딩 에이전트 벤치마크 정리\\u003c/a\\u003e도 함께 참고할 만합니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-mai-image-25-25-flash-8\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-mai-image-25-25-flash-8\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e이미지 분야: MAI-Image-2.5와 2.5-Flash\\u003c/h2\\u003e\\n\\u003cp\\u003e\\u003ca href=\\\&quot;https://microsoft.ai/news/introducing-mai-image-2-5/\\\&quot;\\u003eMAI-Image-2.5\\u003c/a\\u003e는 MAI의 가장 강력한 이미지 모델로, \\u003ca href=\\\&quot;https://arena.ai/leaderboard/image-edit\\\&quot;\\u003eArena 이미지 편집 리더보드\\u003c/a\\u003e에서 \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/google-deepmind-nano-banana-2/9098\\\&quot;\\u003eNano Banana 2\\u003c/a\\u003e를 앞서며 \\u003cstrong\\u003e2위\\u003c/strong\\u003e로 데뷔했습니다. 고품질 생성과 정밀하고 제어 가능한 편집을 위해 만들어졌으며, 최고 충실도를 노리는 \\u003cstrong\\u003eMAI-Image-2.5\\u003c/strong\\u003e와 대규모 프로덕션 워크로드를 위한 고속, 저비용의 \\u003cstrong\\u003eMAI-Image-2.5-Flash\\u003c/strong\\u003e 두 가지로 출시됩니다.\\u003c/p\\u003e\\n\\u003cp\\u003e주요 기능은 다음과 같습니다.\\u003c/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e텍스트-이미지 품질의 비약\\u003c/strong\\u003e: 프롬프트로부터 더 디테일하고 일관된 이미지를 생성하며, 텍스트 렌더링, 제품 이미지, 프롬프트 준수도가 향상되었습니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e복잡한 시각적 추론\\u003c/strong\\u003e: 장면 구조, 조명, 스케일, 공간 관계를 이해해, 예를 들어 객체를 추가할 때 올바른 원근과 그림자를 맞춰 이미지 맥락에 어울리는 편집을 합니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e세밀한 편집 제어\\u003c/strong\\u003e: 객체 교체, 텍스트 수정, 모션 블러 제거 같은 정밀하고 국소적인 편집을 나머지 부분을 바꾸지 않고 수행합니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e얼굴 및 정체성 일관성\\u003c/strong\\u003e: 포즈, 표정, 시점이 바뀌어도 알아볼 수 있는 인물의 정체성을 유지합니다.\\u003c/li\\u003e\\n\\u003c/ul\\u003e\\n\\u003cp\\u003e벤치마크에서 MAI-Image-2.5는 GPT-Image-1.5와 Nano Banana Pro 2K를 능가하는 \\u003ca href=\\\&quot;https://arena.ai/leaderboard/text-to-image\\\&quot;\\u003eArena\\u003c/a\\u003e 점수를 기록하며 텍스트-이미지 3위, 이미지 편집 2위에 올랐습니다. 이전 버전인 MAI-Image-2 대비 전체 \\u003cstrong\\u003e+75점\\u003c/strong\\u003e 향상되었고, 텍스트 렌더링(+107점)과 카툰, 애니메이션, 판타지(+90점)에서 가장 큰 폭으로 개선되었습니다. 아래는 12개 편집 카테고리에서 블라인드 사람 선호 평가로 측정한 MAI-Image-2.5의 승률입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50.png\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/91a4d69f695a7700a23ecc8743950e5c5a3a0e50\\\&quot; title=\\\&quot;MAI-Image-2.5의 12개 편집 카테고리별 블라인드 사람 선호 승률\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50_2_1028x653.png\\\&quot; alt=\\\&quot;MAI-Image-2.5의 12개 편집 카테고리별 블라인드 사람 선호 승률\\\&quot; data-base62-sha1=\\\&quot;kMqoF7qnzI0poY1HdkdDiM8oeys\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;653\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50_2_1028x653.png, https://discuss.pytorch.kr/uploads/default/optimized/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50_2_1542x979.png 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50_2_2056x1306.png 2x\\\&quot; data-dominant-color=\\\&quot;738179\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003eMAI-Image-2.5의 12개 편집 카테고리별 블라인드 사람 선호 승률\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e2140×1360 54.4 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e활용 측면에서 MAI-Image-2.5는 이미 \\u003ca href=\\\&quot;https://support.microsoft.com/en-us/topic/edit-with-copilot-in-powerpoint-008f17aa-8e5f-4cda-ba6c-0588000bdad7\\\&quot;\\u003ePowerPoint\\u003c/a\\u003e에서 고품질 이미지 생성에 쓰이고 있고, \\u003ca href=\\\&quot;https://techcommunity.microsoft.com/blog/onedriveblog/onedrive-photos-restyle-with-ai-now-rolling-out-on-mobile-and-web/4503037\\\&quot;\\u003eOneDrive\\u003c/a\\u003e에는 정밀 편집 기능으로 순차 적용 중입니다. 가격은 \\u003ca href=\\\&quot;https://aka.ms/mai-image-2.5-foundrycard\\\&quot;\\u003eFoundry\\u003c/a\\u003e 기준으로 MAI-Image-2.5가 텍스트 입력 1M 토큰당 $5, 이미지 입력 1M 토큰당 $8, 이미지 출력 1M 토큰당 $47이며, Flash는 각각 $1.75, $1.75, $19.50로 더 저렴합니다. 이미지 생성 및 편집 모델의 최근 흐름은 PyTorchKR의 \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/gemini-2-5-flash-image-a-k-a-nano-banana/7590\\\&quot;\\u003eGemini 2.5 Flash Image(Nano Banana) 소개\\u003c/a\\u003e와 함께 보면 비교가 쉽습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-mai-transcribe-15-9\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-mai-transcribe-15-9\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e전사 분야: MAI-Transcribe-1.5\\u003c/h2\\u003e\\n\\u003cp\\u003e\\u003ca href=\\\&quot;https://microsoft.ai/news/mai-transcribe-1-5more-accurate-context-aware-and-built-for-production/\\\&quot;\\u003eMAI-Transcribe-1.5\\u003c/a\\u003e는 MAI 팀이 \\\&quot;세계 최고\\\&quot;라고 자신하는 다국어 음성-텍스트(speech-to-text) 모델입니다. 표준 다국어 벤치마크인 FLEURS에서 \\u003cstrong\\u003e43개 언어에 걸쳐 최고 수준의 단어 오류율(Word Error Rate, WER)\\u003c/strong\\u003e 을 달성했고, 그중 18개 언어에서 1위를 기록하며 GPT-4o-Transcribe, Scribe v2, Gemini 3.1 Flash Lite를 앞섰습니다. 지원 언어는 이전 버전의 25개에서 18개를 더해 43개로 확장되었으면서도 정확도와 품질은 떨어지지 않았습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd.png\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/ef869a691c9f9671e668359360ded3417b5ae1dd\\\&quot; title=\\\&quot;MAI-Transcribe-1.5의 언어별 단어 오류율(WER) 비교 표\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd_2_1028x1721.png\\\&quot; alt=\\\&quot;MAI-Transcribe-1.5의 언어별 단어 오류율(WER) 비교 표\\\&quot; data-base62-sha1=\\\&quot;yaWv5lzQZvKuniZbs2znEJvbTDn\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;1721\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd_2_1028x1721.png, https://discuss.pytorch.kr/uploads/default/optimized/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd_2_1542x2581.png 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd_2_2056x3442.png 2x\\\&quot; data-dominant-color=\\\&quot;E5E2D3\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003eMAI-Transcribe-1.5의 언어별 단어 오류율(WER) 비교 표\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e2140×3584 244 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e속도 역시 강점입니다. MAI-Transcribe-1.5는 \\u003ca href=\\\&quot;https://artificialanalysis.ai/\\\&quot;\\u003eArtificial Analysis\\u003c/a\\u003e 리더보드에서 정확도 대비 속도(Accuracy x Speed) 부문 선두에 올랐고, 동급 정확도 모델보다 \\u003cstrong\\u003e최대 5배 빠릅니다\\u003c/strong\\u003e. 특히 긴 오디오에서 효과가 두드러져 \\u003cstrong\\u003e1시간 분량 오디오를 15초 이내\\u003c/strong\\u003e에 전사할 수 있습니다. WER 2.4%로 매우 경쟁이 치열한 공개 벤치마크에서 3위를 차지했습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303.png\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/3c80873f7a88b6ddbed960419b2222d25cb7c303\\\&quot; title=\\\&quot;Artificial Analysis 리더보드의 단어 오류율(WER) 비교\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303_2_1028x584.png\\\&quot; alt=\\\&quot;Artificial Analysis 리더보드의 단어 오류율(WER) 비교\\\&quot; data-base62-sha1=\\\&quot;8De1awkUrXDHBhHLGhcs1XAxaw3\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;584\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303_2_1028x584.png, https://discuss.pytorch.kr/uploads/default/optimized/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303_2_1542x876.png 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303_2_2056x1168.png 2x\\\&quot; data-dominant-color=\\\&quot;DCCCBC\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003eArtificial Analysis 리더보드의 단어 오류율(WER) 비교\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e2142×1217 86.5 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cdiv class=\\\&quot;lightbox-wrapper\\\&quot;\\u003e\\u003ca class=\\\&quot;lightbox\\\&quot; href=\\\&quot;https://discuss.pytorch.kr/uploads/default/original/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c.png\\\&quot; data-download-href=\\\&quot;https://discuss.pytorch.kr/uploads/default/d57e00577e64b4adf2bc9765040dc26735d7754c\\\&quot; title=\\\&quot;MAI-Transcribe-1과 1.5의 정확도 및 속도 비교\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c_2_1028x241.png\\\&quot; alt=\\\&quot;MAI-Transcribe-1과 1.5의 정확도 및 속도 비교\\\&quot; data-base62-sha1=\\\&quot;usDEMF9zsMgRUBrOH2RJOcxXMEA\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;241\\\&quot; srcset=\\\&quot;https://discuss.pytorch.kr/uploads/default/optimized/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c_2_1028x241.png, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c_2_1542x361.png 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c_2_2056x482.png 2x\\\&quot; data-dominant-color=\\\&quot;B8B9B0\\\&quot;\\u003e\\u003cdiv class=\\\&quot;meta\\\&quot;\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-far-image svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#far-image\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003cspan class=\\\&quot;filename\\\&quot;\\u003eMAI-Transcribe-1과 1.5의 정확도 및 속도 비교\\u003c/span\\u003e\\u003cspan class=\\\&quot;informations\\\&quot;\\u003e2140×503 23.4 KB\\u003c/span\\u003e\\u003csvg class=\\\&quot;fa d-icon d-icon-discourse-expand svg-icon\\\&quot; aria-hidden=\\\&quot;true\\\&quot;\\u003e\\u003cuse href=\\\&quot;#discourse-expand\\\&quot;\\u003e\\u003c/use\\u003e\\u003c/svg\\u003e\\u003c/div\\u003e\\u003c/a\\u003e\\u003c/div\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e엔터프라이즈에 특히 유용한 기능은 \\u003cstrong\\u003e키워드 바이어싱(Keyword Biasing)\\u003c/strong\\u003e 입니다. 사람 이름, 제품명, 의료 용어, 내부 약어처럼 사용자에게 가장 중요한 도메인 특화 단어들은 일반 전사 모델이 자주 틀리는 부분입니다. MAI-Transcribe-1.5는 사용자가 제공한 키워드 목록 쪽으로 예측을 편향시키되, 맹목적으로 끼워 맞추지 않고 공유된 맥락을 보고 언제 바이어싱을 적용할지 스스로 결정합니다. 이 기능을 쓰면 FLEURS 벤치마크에서 WER이 \\u003cstrong\\u003e최대 30% 감소\\u003c/strong\\u003e합니다. 예를 들어 키워드 바이어싱 없이 \\\&quot;Sean\\\&quot;, \\\&quot;Oif\\\&quot;, \\\&quot;Societal\\\&quot;로 잘못 전사되던 이름들이, \\\&quot;Aisling, Shaun, Xochitl, Søren, Niamh\\\&quot; 같은 키워드 목록을 주면 \\\&quot;Shaun\\\&quot;, \\\&quot;Aoife\\\&quot;, \\\&quot;Xochitl\\\&quot;처럼 정확히 인식됩니다.\\u003c/p\\u003e\\n\\u003cp\\u003eMAI-Transcribe-1.5는 배치(batch) 전사 모델로, 이미 Copilot, Teams, GitHub, Dynamics 365 Contact Center에 통합되었고 \\u003ca href=\\\&quot;https://aka.ms/mai-transcribe-1.5-foundrycard\\\&quot;\\u003eFoundry\\u003c/a\\u003e에서도 제공됩니다. 향후 로드맵으로는 다중 화자 오디오에서 \\\&quot;누가 무엇을 말했는지\\\&quot; 구분하는 화자 분리(diarization), 실시간 전사를 위한 네이티브 스트리밍 API, 그리고 추가 언어 지원이 예고되어 있습니다. API 문서와 쿡북은 \\u003ca href=\\\&quot;https://learn.microsoft.com/en-us/azure/ai-services/speech-service/mai-transcribe\\\&quot;\\u003eAzure 문서\\u003c/a\\u003e에서 확인할 수 있습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-mai-voice-2-voice-2-flash-10\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-mai-voice-2-voice-2-flash-10\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e음성 분야: MAI-Voice-2와 Voice-2-Flash\\u003c/h2\\u003e\\n\\u003cp\\u003e\\u003ca href=\\\&quot;https://microsoft.ai/news/mai-voice-2expressive-speech-in-10-languages/\\\&quot;\\u003eMAI-Voice-2\\u003c/a\\u003e는 MAI가 지금까지 만든 가장 표현력 있고 자연스러운 텍스트-음성(text-to-speech) 모델입니다. 충실도, 언어 커버리지, 화자 일관성, 감정 범위 등 프로덕션 음성 경험에 중요한 모든 차원에서 이전 버전을 크게 뛰어넘었습니다. 영어 전용이던 이전과 달리 \\u003cstrong\\u003e15개 언어\\u003c/strong\\u003e를 지원하며, 반가운 점은 그 목록에 \\u003cstrong\\u003e한국어가 포함\\u003c/strong\\u003e된다는 것입니다. (전체 지원 로케일: 영어(미국/호주), 이탈리아어, 프랑스어, 독일어, 힌디어, 스페인어(스페인/멕시코), 포르투갈어(브라질/포르투갈), 한국어, 중국어(간체), 터키어, 러시아어, 태국어, 네덜란드어, 루마니아어, 헝가리어.)\\u003c/p\\u003e\\n\\u003cp\\u003e주요 기능은 다음과 같습니다.\\u003c/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e세밀한 감정 제어\\u003c/strong\\u003e: \\u003ccode\\u003esad\\u003c/code\\u003e, \\u003ccode\\u003ewhispered\\u003c/code\\u003e, \\u003ccode\\u003eexcited\\u003c/code\\u003e 같은 감정 태그(emotion tag)로 발화의 정서를 조절합니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e제로샷 음성 프롬프팅\\u003c/strong\\u003e: 5~60초 분량의 참조 오디오만으로 모든 지원 언어에서 화자의 목소리를 생성하며, 동의(consent) 가드레일이 내장되어 있습니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e장시간 화자 일관성\\u003c/strong\\u003e: 오디오북, 팟캐스트, 강의처럼 긴 콘텐츠에서도 안정적인 화자 정체성을 유지합니다.\\u003c/li\\u003e\\n\\u003cli\\u003e\\u003cstrong\\u003e코드 스위칭(Code-switching)\\u003c/strong\\u003e: 힌디어-영어, 스페인어-영어처럼 사람들이 일상에서 자연스럽게 언어를 섞는 방식을 문장 중간에도 운율과 화자 정체성을 잃지 않고 재현합니다.\\u003c/li\\u003e\\n\\u003c/ul\\u003e\\n\\u003cp\\u003e성능 평가에서 MAI-Voice-2는 일대일 선호 테스트에서 이전 버전 MAI-Voice-1보다 \\u003cstrong\\u003e72% 더 선호\\u003c/strong\\u003e되었고, 화자 유사도 평가에서는 합성 음성이 같은 목소리의 실제 녹음과 구별되지 않는 수준에 도달했습니다. 함께 발표된 \\u003cstrong\\u003eMAI-Voice-2-Flash\\u003c/strong\\u003e 는 2026년의 화두인 초저지연 음성 에이전트(Voice Agent)를 위해 최고의 속도 대비 가치를 제공합니다.\\u003c/p\\u003e\\n\\u003cp\\u003e안전 측면에서 음성 합성은 시스템 수준에서 동의가 강제되어, 프로덕션에서는 허가되고 라이선스된 목소리만 합성할 수 있으며 무단 음성 복제는 불가능합니다. 모든 출력에는 워터마크가 삽입됩니다. MAI-Voice-2는 \\u003ca href=\\\&quot;https://playground.microsoft.ai/chat\\\&quot;\\u003eFoundry\\u003c/a\\u003e와 \\u003ca href=\\\&quot;https://openrouter.ai/microsoft/mai-voice-2\\\&quot;\\u003eOpenRouter\\u003c/a\\u003e에서 제공되며 VS Code와 Dynamics 365 Contact Center에 통합되고 있습니다. 온디바이스 다국어 TTS나 음성 복제의 흐름은 PyTorchKR의 \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/supertonic-onnx-tts-feat-supertone-ai/10247\\\&quot;\\u003eSupertonic\\u003c/a\\u003e, \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/neutts-air-3-on-device-tts-text-to-speech/7928\\\&quot;\\u003eNeuTTS Air\\u003c/a\\u003e, \\u003ca href=\\\&quot;https://discuss.pytorch.kr/t/openai-tts-openai-fm/6801\\\&quot;\\u003eOpenAI.fm\\u003c/a\\u003e 소개 글과 비교해 보면 흥미롭습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-frontier-tuning-rle-11\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-frontier-tuning-rle-11\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e당신에게 맞춰지는 모델: Frontier Tuning과 RLE\\u003c/h2\\u003e\\n\\u003cp\\u003eMAI 팀은 모델 자체보다 \\u003cem\\u003e\\\&quot;그 모델로 무엇을 할 수 있는가\\\&quot;\\u003c/em\\u003e 가 더 중요한 변화라고 말합니다. 그 중심에 있는 것이 \\u003ca href=\\\&quot;https://devblogs.microsoft.com/microsoft365dev/frontier-tuning-teaching-ai-to-work-the-way-you-do/\\\&quot;\\u003eFrontier Tuning\\u003c/a\\u003e입니다. 실제 업무 환경에서의 강화학습을 통해 AI가 특정 워크플로우의 세부 사항에 처음으로 완전히 적응할 수 있게 되었다는 것입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e이 구조에서 가장 가치 있는 데이터는 외부 데이터가 아니라 \\u003cstrong\\u003e당신의 데이터\\u003c/strong\\u003e, 즉 에이전트가 실제 업무를 완수하며 남긴 단계와 결정, 행동의 흔적입니다. MAI는 이를 학습시키는 공간을 \\u003cstrong\\u003e강화학습 환경(Reinforcement Learning Environments, RLE)\\u003c/strong\\u003e 이라 부르며, \\\&quot;오직 당신만 접근할 수 있는 AI 전용 훈련 체육관(training gym)\\\&quot;에 비유합니다. Frontier Tuning으로 당신은 당신의 데이터로, 당신의 환경 안에서, 당신이 통제하는 당신만의 모델을 만들게 되고, 조직의 노하우가 모델의 일부가 되면서도 그 소유권은 당신에게 남습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e실제 성과도 제시되었습니다. Microsoft 내부에서 Excel용으로 튜닝한 MAI 모델은 \\u003ca href=\\\&quot;https://openai.com/\\\&quot;\\u003eGPT-5.4\\u003c/a\\u003e 수준의 품질을 내면서 \\u003cstrong\\u003e최대 10배 더 효율적\\u003c/strong\\u003e이었고, McKinsey의 까다로운 엔터프라이즈 기준에 맞춰 튜닝했을 때는 테스트한 모든 모델 중 가장 높은 승률을 기록하면서 비용은 약 \\u003cstrong\\u003e10배 낮았습니다\\u003c/strong\\u003e. MAI는 이를 두고, 공유 모델에서 지능을 \\\&quot;임대\\\&quot;하는 방식과 달리 당신이 만든 RLE와 모델이 곧 당신의 해자(moat)가 된다고 표현합니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-h-12\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-h-12\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e메이요 클리닉과의 헬스케어 프런티어 협업\\u003c/h2\\u003e\\n\\u003cp\\u003e특히 민감하고 중요한 영역에서는 더 깊은 협력이 필요하다는 인식 아래, Microsoft는 \\u003ca href=\\\&quot;https://www.mayoclinic.org/\\\&quot;\\u003eMayo Clinic\\u003c/a\\u003e과 헬스케어용 프런티어 AI 모델을 공동 개발한다고 발표했습니다. 이 모델은 메이요 클리닉의 세계적 임상 전문성, 비식별화된 임상 데이터, 종단적(longitudinal) 인사이트와 Microsoft의 기반 AI 역량을 결합해, 오늘날의 범용 시스템이 도달할 수 없는 수준의 폭넓은 임상 추론을 목표로 합니다.\\u003c/p\\u003e\\n\\u003cp\\u003e모델은 먼저 메이요 클리닉 자체 환경에 배포되어 더 이르고 정확한 진단과 치료 계획 수립을 돕고, 검증을 거친 뒤 \\u003ca href=\\\&quot;https://azure.microsoft.com/\\\&quot;\\u003eAzure Foundry\\u003c/a\\u003e를 통해 다른 기관에도 제공될 예정입니다. 중요한 점은 이 모델의 소유권이 메이요 클리닉에 있다는 것으로, 환자 신뢰와 임상적 엄밀성, 안전, 그리고 임상 데이터에 대한 책임 있는 관리라는 양측의 약속을 강조합니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-h-13\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-h-13\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e가격, 접근성, 그리고 안전\\u003c/h2\\u003e\\n\\u003cp\\u003e이번 모델 패밀리는 \\u003ca href=\\\&quot;https://aka.ms/mai-image-2.5-foundrycard\\\&quot;\\u003eAzure Foundry\\u003c/a\\u003e와 Microsoft 자사 제품에 통합되는 동시에, 개발자를 위해 \\u003ca href=\\\&quot;https://openrouter.ai/microsoft/mai-image-2.5\\\&quot;\\u003eOpenRouter\\u003c/a\\u003e, \\u003ca href=\\\&quot;https://fireworks.ai/\\\&quot;\\u003eFireworks\\u003c/a\\u003e, \\u003ca href=\\\&quot;https://www.baseten.co/blog/mai-thinking-1/\\\&quot;\\u003eBaseten\\u003c/a\\u003e에서도 제공됩니다. 앞서 언급했듯 개발자가 처음으로 모델 가중치를 직접 튜닝할 수 있게 되었으며, \\u003ca href=\\\&quot;https://playground.microsoft.ai/chat\\\&quot;\\u003eMAI Playground\\u003c/a\\u003e에서 모델들을 바로 체험해 볼 수 있습니다.\\u003c/p\\u003e\\n\\u003cp\\u003e안전과 보안은 전 모델에 처음부터 내장되었습니다. 음성 모델은 무단 복제에 대한 보호 장치를 포함하고 모든 출력에 워터마크를 넣으며, 과도한 거부(over-refusal)를 줄이고 장애를 가진 사람을 포함한 표현(representation)을 개선했습니다. 다만 이미지 모델은 다른 모든 이미지 모델과 마찬가지로 학습 데이터의 편향을 반영하거나 그럴듯하지만 부정확한 시각적 디테일을 만들 수 있으므로, 신원, 법률, 의료, 금융, 뉴스 관련 맥락에서는 사용 전에 반드시 검토가 필요합니다. MAI는 투명성을 위해 상세한 \\u003ca href=\\\&quot;https://microsoft.ai/wp-content/uploads/2026/06/main_20260602_2.pdf\\\&quot;\\u003e기술 보고서\\u003c/a\\u003e와 안전 보고서를 함께 공개했습니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-h-14\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-h-14\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e마치며: 휴머니스트 초지능을 향하여\\u003c/h2\\u003e\\n\\u003cp\\u003eMAI 팀은 이번 발표를 단순한 7종 모델 출시가 아니라, 제1원리(first principles)에 기반해 장기적 역량에 집중하는 연구소와 새로운 튜닝, 소유 방식을 함께 제시하는 \\\&quot;AI의 다음 단계\\\&quot;로 규정합니다. 그 궁극적 목표인 \\u003ca href=\\\&quot;https://microsoft.ai/news/towards-humanist-superintelligence/\\\&quot;\\u003e휴머니스트 초지능(Humanist Superintelligence)\\u003c/a\\u003e은 사람과 조직을 대체하는 것이 아니라 돕도록 설계된 고도의 AI 시스템을 뜻합니다. 이런 시스템은 어디까지나 인간의 의도에 의해 형성되고, 인간의 감독을 받으며, 인간의 목표에 종속되는 도구로 남아야 한다는 것이 MAI의 입장입니다.\\u003c/p\\u003e\\n\\u003cp\\u003e증류에 기대지 않고 깨끗한 데이터로 바닥부터 올라온 모델, 자체 실리콘과의 공동 설계, 그리고 사용자가 소유하고 통제하는 튜닝 방식이라는 세 축은, 성능 경쟁 일변도의 흐름 속에서 \\\&quot;신뢰할 수 있고 통제 가능한 AI\\\&quot;라는 다른 좌표를 제시합니다. 이 힐 클라이밍 머신이 앞으로의 연산과 역량 확장 속에서 실제로 얼마나 꾸준히 정상을 향해 오를지 지켜볼 만합니다.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-scroll-building-a-hill-climbing-machine-15\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-scroll-building-a-hill-climbing-machine-15\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/images/emoji/fluentui/scroll.png?v=15\\\&quot; title=\\\&quot;:scroll:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:scroll:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e Building a hill-climbing machine 소개 블로그\\u003c/h2\\u003e\\n\\u003caside class=\\\&quot;onebox allowlistedgeneric\\\&quot; data-onebox-src=\\\&quot;https://microsoft.ai/news/building-a-hillclimbing-machine-launching-seven-new-mai-models/\\\&quot;\\u003e\\n  \\u003cheader class=\\\&quot;source\\\&quot;\\u003e\\n      \\u003cimg src=\\\&quot;https://microsoft.ai/wp-content/uploads/2025/10/cropped-image-5-32x32.png\\\&quot; class=\\\&quot;site-icon\\\&quot; alt=\\\&quot;\\\&quot; width=\\\&quot;32\\\&quot; height=\\\&quot;32\\\&quot;\\u003e\\n\\n      \\u003ca href=\\\&quot;https://microsoft.ai/news/building-a-hillclimbing-machine-launching-seven-new-mai-models/\\\&quot; target=\\\&quot;_blank\\\&quot; rel=\\\&quot;noopener\\\&quot;\\u003eMicrosoft AI\\u003c/a\\u003e\\n  \\u003c/header\\u003e\\n\\n  \\u003carticle class=\\\&quot;onebox-body\\\&quot;\\u003e\\n    \\u003cdiv class=\\\&quot;aspect-image\\\&quot; style=\\\&quot;--aspect-ratio:695/390;\\\&quot;\\u003e\\u003cimg src=\\\&quot;https://microsoft.ai/wp-content/themes/wp-base-theme/images/social.jpg\\\&quot; class=\\\&quot;thumbnail\\\&quot; alt=\\\&quot;\\\&quot; width=\\\&quot;1028\\\&quot; height=\\\&quot;537\\\&quot;\\u003e\\u003c/div\\u003e\\n\\n\\u003ch3\\u003e\\u003ca href=\\\&quot;https://microsoft.ai/news/building-a-hillclimbing-machine-launching-seven-new-mai-models/\\\&quot; target=\\\&quot;_blank\\\&quot; rel=\\\&quot;noopener\\\&quot;\\u003eBuilding a hill-climbing machine:\\u0026nbsp;Launching seven new MAI models | Microsoft AI\\u003c/a\\u003e\\u003c/h3\\u003e\\n\\n\\n\\n  \\u003c/article\\u003e\\n\\n  \\u003cdiv class=\\\&quot;onebox-metadata\\\&quot;\\u003e\\n    \\n    \\n  \\u003c/div\\u003e\\n\\n  \\u003cdiv style=\\\&quot;clear: both\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003c/aside\\u003e\\n\\n\\u003ch2\\u003e\\u003ca name=\\\&quot;p-20154-microphone-microsoft-build-2026-mai-16\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-20154-microphone-microsoft-build-2026-mai-16\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\\u003e\\u003c/a\\u003e\\u003cimg src=\\\&quot;https://discuss.pytorch.kr/images/emoji/fluentui/microphone.png?v=15\\\&quot; title=\\\&quot;:microphone:\\\&q <h2><a name="p-20154-mai-1" class="anchor" href="#p-20154-mai-1" aria-label="Heading link"></a>MAI 모델 패밀리 소개</h2>
<p>2026년 6월 2일, <a href="https://microsoft.ai/news/microsoft-build-2026-mai-keynote-transcript/">Microsoft Build 2026</a> 키노트에서 <a href="https://microsoft.ai/">Microsoft AI(MAI)</a>가 사내에서 직접 개발한 7종의 신규 모델을 한 번에 공개했습니다. 이 모델들은 <strong>이미지, 음성, 전사(transcription), 추론(reasoning), 코딩</strong> 이라는 5개 분야를 아우르며, 서로 독립된 제품이 아니라 같은 데이터 규율, 같은 인프라, 같은 평가 프레임워크를 공유하는 하나의 <strong>멀티모달 모델 패밀리(model family)</strong> 로 설계되었습니다. 발표를 이끈 Mustafa Suleyman과 MAI 팀은 이번 출시를 "모델 한 개"가 아니라 "지속적으로 더 나아지는 시스템"을 만드는 여정의 첫걸음으로 규정합니다.</p>
<p>이번 발표에서 가장 눈에 띄는 차별점은 모델의 벤치마크 점수 자체보다 <strong>어떻게 만들어졌는가</strong>에 있습니다. MAI 팀은 다른 연구소의 모델로부터 지식을 <strong>증류(distillation)</strong> 하지 않고, 깨끗하고 적절히 라이선스된 데이터만으로 <strong>바닥부터(from scratch) 학습</strong>했다는 점을 반복해서 강조합니다. 아키텍처부터 학습 파이프라인, 사후 학습(post-training)까지 모든 구성요소를 직접 만들었고, 자체 실리콘인 Maia 200 가속기와 모델을 함께 설계(co-design)해 학습과 추론 효율을 끌어올렸습니다. 이는 단순한 성능 경쟁을 넘어 "출처를 신뢰할 수 있고, 상업적으로 안전하게 프로덕션에 투입할 수 있는 모델"을 만들겠다는 선언에 가깝습니다.</p>
<p>또한 MAI는 이 모델들을 <a href="https://aka.ms/mai-image-2.5-foundrycard">Azure Foundry</a>와 자사 제품(PowerPoint, OneDrive, Copilot, Teams, GitHub, VS Code 등)에 통합하는 동시에, <a href="https://openrouter.ai/microsoft/mai-image-2.5">OpenRouter</a>, <a href="https://fireworks.ai/">Fireworks</a>, <a href="https://www.baseten.co/blog/mai-thinking-1/">Baseten</a> 같은 개발자 플랫폼에도 폭넓게 배포합니다. 특히 <strong>개발자가 직접 모델의 가중치(weights)를 튜닝할 수 있다</strong>는 점이 처음으로 열렸습니다. 모델의 궁극적인 지향점은 MAI가 <strong>휴머니스트 초지능(Humanist Superintelligence)</strong> 이라 부르는 것으로, 사람과 조직을 대체하는 것이 아니라 돕도록 설계되고 끝까지 인간의 통제 아래 남는 AI를 의미합니다.</p>

<h2><a name="p-20154-h-3" class="anchor" href="#p-20154-h-3" aria-label="Heading link"></a>"힐 클라이밍 머신": 증류 없이 바닥부터 오르는 시스템</h2>
<p>MAI 팀이 이번 발표 전반에서 사용하는 핵심 비유는 <strong>힐 클라이밍 머신(Hill-Climbing Machine)</strong> 입니다. 이는 한 번 잘 만든 모델이 아니라, <em>더 많은 연산, 더 좋은 데이터, 더 날카로운 평가</em>를 반복적으로 투입할 때마다 능력이 꾸준히 그리고 안정적으로 올라가는 "조직과 시스템 자체"를 가리킵니다. 모델 개발을 시스템 수준의 최적화 문제로 보고, 데이터 파이프라인, 학습 인프라, 강화학습 환경과 보상, 평가 스위트, 안전 테스트를 모두 측정 가능하고 개선 가능한 형태로 묶어낸 것이 이 머신의 정체입니다.</p>
<p>이 철학은 세 가지 원칙으로 요약됩니다.</p>
<p><strong>능력은 물려받는 것이 아니라 학습하는 것입니다 (Learned, not inherited)</strong>: 다른 모델의 출력을 모방하는 증류는 빠르게 능력을 얻을 수 있지만, 교사 모델의 설계 선택에 종속되어 새로운 상황에 적응하는 조종성(steerability)이 부족해집니다. MAI-Thinking-1은 제3자 모델로부터의 증류 없이 학습해, 모델이 과제를 진짜로 익히도록 강제했습니다.</p>
<p><br>
<strong>깨끗한 데이터 (Clean data)</strong>: MAI-Thinking-1은 적절히 라이선스된 깨끗한 데이터로만 학습되었고, <strong>사전 학습(pre-training)</strong> 단계에서 AI가 생성한 콘텐츠는 배제되었습니다. 무엇이 모델을 형성했는지 설명할 수 없으면 그 동작을 이해하거나 신뢰성 있게 개선할 수 없다는 판단입니다.</p>
<p><br>
<strong>전 스택에 걸친 자립 (Self-sufficiency across the stack)</strong>: 모델과 Microsoft 자체 가속기의 공동 설계부터 강화학습 프레임워크까지, 학습 인프라를 사내에서 직접 구축했습니다. 실제로 MAI-Thinking-1을 자사 Maia 200 칩에서 GB200과 정면 비교했을 때, end-to-end로 <strong>1.4배의 와트당 성능(performance-per-watt)</strong> 향상을 확인했다고 밝혔습니다. 이 규모에서는 모든 와트가 중요하며, 실리콘과 모델의 공동 설계가 효율의 핵심 우위라는 것입니다.</p>
<p>이러한 규율은 <a href="https://discuss.pytorch.kr/t/microsoft-phi-3-phi-3-5-phi-3-5-moe-instruct/5082">Microsoft가 이전에 공개한 소형 모델 Phi 계열</a>에서 보여준 "데이터 품질 중심" 접근과도 맥이 닿아 있지만, 이번에는 프런티어급 대형 모델 전체를 자체 데이터와 인프라로 끌어올렸다는 점에서 규모가 다릅니다.</p>
<h2><a name="p-20154-mai-thinking-1-4" class="anchor" href="#p-20154-mai-thinking-1-4" aria-label="Heading link"></a>추론 분야: MAI-Thinking-1</h2>
<p><a href="https://microsoft.ai/news/introducing-mai-thinking-1/">MAI-Thinking-1</a>은 Microsoft AI의 첫 추론(reasoning) 모델이자 텍스트 기반(foundation) 모델입니다. 흥미로운 점은 거대한 모델이 아니라 <strong>중간 체급(medium-sized)</strong> 모델이라는 것입니다. 기반 모델인 MAI-Base-1은 <strong>35B 활성(active), 약 1T 총(total) 파라미터의 희소 전문가 혼합(sparse Mixture of Experts, MoE)</strong> 구조로, 훨씬 큰 모델들보다 추론 시 차지하는 자원(inference footprint)이 작습니다. 그럼에도 SWE-Bench Pro에서 Claude Opus 4.6과 어깨를 나란히 합니다. 모델 크기는 고급 코딩 보조 기능을 <em>어디에 배포할 수 있는지, 얼마나 자주 쓸 수 있는지, 일상 워크플로우로 들어올 수 있는지</em>를 결정하기 때문에 이 체급에서의 성능은 실용적으로 중요합니다.</p>
<p>함께 공개된 <a href="https://microsoft.ai/wp-content/uploads/2026/06/main_20260602_2.pdf">기술 보고서</a>에 따르면, MAI-Base-1은 Azure 플랫폼 내 Microsoft 운영 클러스터의 <strong>8,000개 GB200 GPU</strong>에서 사내 분산 학습 인프라로 바닥부터 사전 학습되었습니다. 주 사전 학습 단계에서 <strong>30조(30T) 토큰</strong>, 이어지는 중간 학습(mid-training)에서 추가로 3.55조 토큰을 사용했고, 중간 학습 이후 최대 <strong>256K 컨텍스트 길이</strong>에 도달했습니다.</p>
<h3><a name="p-20154-latentmoe-5" class="anchor" href="#p-20154-latentmoe-5" aria-label="Heading link"></a>아키텍처: 디코더 트랜스포머와 LatentMoE</h3>
<p>MAI-Base-1은 디코더 전용(decoder-only) 트랜스포머로, 하드웨어와의 공동 최적화를 염두에 두고 설계되었습니다. 주요 특징은 다음과 같습니다.</p>
<ul>
<li><strong>주기적 로컬/글로벌 어텐션</strong>: <a href="https://blog.google/technology/developers/gemma-3/">Gemma 3</a>의 설계를 따라 로컬 어텐션 5개 층마다 글로벌 어텐션 1개 층을 배치합니다. 로컬 층은 슬라이딩 윈도우 512에 <a href="https://arxiv.org/abs/2104.09864">회전 위치 인코딩(Rotary Position Embedding, RoPE)</a>을 쓰고, 글로벌 층은 위치 인코딩을 쓰지 않습니다(NoPE). 이로써 학습 비용과 추론 시 KV 캐시 크기를 크게 줄입니다.</li>
<li><strong>그룹 쿼리 어텐션(Grouped-Query Attention, GQA)</strong>: 8개의 KV 헤드와 헤드당 차원 128을 사용하며, <a href="https://github.com/Dao-AILab/flash-attention">FlashAttention</a> 계열과 Ulysses 방식의 컨텍스트 병렬화로 긴 컨텍스트를 효율적으로 처리합니다.</li>
<li><strong>밀집 FFN과 MoE의 교차 배치</strong>: 각 블록에서 고희소(high-sparsity) MoE 층과 작은 밀집(dense) FFN을 번갈아 배치합니다. MoE는 NVIDIA의 LatentMoE 설계를 채택해, all-to-all 디스패치 전에 공유 다운프로젝션을 적용하고 압축된 표현을 기준으로 <strong>512개 전문가 중 8개</strong>를 softmax 게이팅으로 라우팅합니다. 활성/비활성 메모리를 일정하게 유지하기 위해 토큰을 버리지 않는 <strong>dropless MoE</strong>를 구현했습니다.</li>
<li><strong>표준 구성요소</strong>: 입출력 양쪽에 <a href="https://arxiv.org/abs/1910.07467">RMSNorm</a>, <a href="https://arxiv.org/abs/2002.05202">SwiGLU</a> 활성, 입출력 임베딩 가중치 공유, 그리고 <code>o200k_base</code> 토크나이저(어휘 크기 200,019)를 사용합니다.</li>
</ul>
<p>강화학습(RL) 단계에서는 사고의 연쇄(Chain-of-Thought, CoT)를 과제별 피드백에 대해 학습시키고, 외부 도구를 사용하며, 사람의 선호와 안전 신호를 따르도록 가르칩니다. 추론 흔적(reasoning trace)에 대한 사전 노출 없이 바닥부터 추론하는 법을 배우며, STEM 추론, 에이전트 코딩 및 도구 사용, 유용성과 안전성이라는 세 가지 도메인별 전문가 모델을 각각 학습한 뒤 하나의 모델로 통합합니다.</p>

<td>최신 수학 경시 문제에서도 강력한 일반화</td>
</tr>
<tr>
<td><a href="https://livecodebench.github.io/">LiveCodeBench v6</a></td>
<td>87.7%</td>
<td>경쟁 프로그래밍 수준의 코딩 능력</td>

</tbody>
</table>
</div><p>특히 어떤 벤치마크도 특정해 겨냥하지 않고, 증류 없이 자체 데이터와 보상, 평가 과정만으로 바닥부터 올라왔다는 점이 MAI 팀이 강조하는 부분입니다. 독립 평가 기관 Surge의 사람 평가자들은 블라인드 일대일 비교에서 전반적 품질 면에서 <a href="https://www.anthropic.com/claude">Sonnet 4.6</a>보다 MAI-Thinking-1을 선호했습니다. MAI-Thinking-1은 <a href="https://www.baseten.co/blog/mai-thinking-1/">Baseten</a>을 통해 개발자에게 제공되며, 추론(reasoning) 모델의 흐름은 앞서 PyTorchKR에서 다룬 <a href="https://discuss.pytorch.kr/t/gemini-2-5-google-deepmind-thinking/6637">Google의 Gemini 2.5 "thinking" 모델</a> 등과 함께 보면 맥락을 잡기 좋습니다.</p>
<h2><a name="p-20154-mai-code-1-flash-7" class="anchor" href="#p-20154-mai-code-1-flash-7" aria-label="Heading link"></a>코딩 분야: MAI-Code-1-Flash</h2>
<p><a href="https://microsoft.ai/news/introducingmai-code-1-flash/">MAI-Code-1-Flash</a>는 추론 효율에 초점을 맞춘 에이전트 코딩 모델로, 단 <strong>5B 파라미터</strong>로 <a href="https://www.anthropic.com/claude">Claude Haiku 4.5</a>와 비슷한 체급이지만 비용은 더 저렴합니다. 이 모델의 핵심 설계 철학은 <em>"벤치마크가 아니라 개발자를 위해 만든다"</em> 입니다. 코딩 모델은 개발자가 매일 쓰는 바로 그 환경에서 잘 동작할 때 가장 유용하기 때문에, MAI-Code-1-Flash는 프로덕션에서 실제 사용되는 <a href="https://github.com/features/copilot">GitHub Copilot</a> 하네스(harness)로 직접 학습되었습니다. 덕분에 에이전트 코딩 과제에서 주변 도구 및 시스템과 상호작용하는 법을 익혀, 실제 Copilot 워크플로우에 특히 잘 맞습니다.</p>
<p>또 하나의 핵심은 <strong>적응형 솔루션 길이 제어(adaptive solution length control)</strong> 입니다. 간단한 요청에는 간결하게 답하고, 더 깊은 분석이나 광범위한 코드 변경이 필요한 문제에는 추론 예산(reasoning budget)을 더 씁니다. 그 결과 개발자는 유용한 출력을 더 빨리 보기 시작하고, MAI 팀은 더 어려운 문제를 <strong>최대 60% 더 적은 토큰</strong>으로 해결하는 사례를 관찰했습니다. 지연(latency)과 비용이 줄고, 토큰당 가치(return on token)가 올라가며, 대화형 워크플로우가 더 매끄럽게 느껴진다는 것입니다.</p>
<p>성능 면에서는 개발자가 실제로 쓰는 동일한 프로덕션 하네스로 <a href="https://www.anthropic.com/claude">Claude Haiku 4.5</a>와 비교했습니다. MAI-Code-1-Flash는 SWE-Bench Verified, <a href="https://arxiv.org/abs/2509.16941">SWE-Bench Pro</a>, SWE-Bench Multilingual, Terminal Bench 2의 네 가지 핵심 코딩 벤치마크 모두에서 Haiku 4.5를 앞섰고, 특히 다양한 실세계 과제로 구성된 SWE-Bench Pro에서 <strong>51.2% 대 35.2%로 16점 차이</strong>를 냈습니다. <em>더 똑똑할 뿐 아니라 더 가볍다</em>는 점, 즉 정확도와 효율이 더 이상 트레이드오프가 아니라는 점을 보여주는 결과입니다. 이 모델은 오늘부터 <a href="https://code.visualstudio.com/">VS Code</a>의 기본 모델 중 하나로 약 10%의 개인 사용자에게 순차 적용되며, 모델 선택기에서 Auto를 고른 사용자에게 라우팅될 수 있습니다. 코딩 에이전트의 평가 방식 자체에 관심이 있다면 PyTorchKR의 <a href="https://discuss.pytorch.kr/t/artificial-analysis/10183">Artificial Analysis 코딩 에이전트 벤치마크 정리</a>도 함께 참고할 만합니다.</p>
<h2><a name="p-20154-mai-image-25-25-flash-8" class="anchor" href="#p-20154-mai-image-25-25-flash-8" aria-label="Heading link"></a>이미지 분야: MAI-Image-2.5와 2.5-Flash</h2>
<p><a href="https://microsoft.ai/news/introducing-mai-image-2-5/">MAI-Image-2.5</a>는 MAI의 가장 강력한 이미지 모델로, <a href="https://arena.ai/leaderboard/image-edit">Arena 이미지 편집 리더보드</a>에서 <a href="https://discuss.pytorch.kr/t/google-deepmind-nano-banana-2/9098">Nano Banana 2</a>를 앞서며 <strong>2위</strong>로 데뷔했습니다. 고품질 생성과 정밀하고 제어 가능한 편집을 위해 만들어졌으며, 최고 충실도를 노리는 <strong>MAI-Image-2.5</strong>와 대규모 프로덕션 워크로드를 위한 고속, 저비용의 <strong>MAI-Image-2.5-Flash</strong> 두 가지로 출시됩니다.</p>
<p>주요 기능은 다음과 같습니다.</p>
<ul>
<li><strong>텍스트-이미지 품질의 비약</strong>: 프롬프트로부터 더 디테일하고 일관된 이미지를 생성하며, 텍스트 렌더링, 제품 이미지, 프롬프트 준수도가 향상되었습니다.</li>
<li><strong>복잡한 시각적 추론</strong>: 장면 구조, 조명, 스케일, 공간 관계를 이해해, 예를 들어 객체를 추가할 때 올바른 원근과 그림자를 맞춰 이미지 맥락에 어울리는 편집을 합니다.</li>
<li><strong>세밀한 편집 제어</strong>: 객체 교체, 텍스트 수정, 모션 블러 제거 같은 정밀하고 국소적인 편집을 나머지 부분을 바꾸지 않고 수행합니다.</li>
<li><strong>얼굴 및 정체성 일관성</strong>: 포즈, 표정, 시점이 바뀌어도 알아볼 수 있는 인물의 정체성을 유지합니다.</li>
</ul>
<p>벤치마크에서 MAI-Image-2.5는 GPT-Image-1.5와 Nano Banana Pro 2K를 능가하는 <a href="https://arena.ai/leaderboard/text-to-image">Arena</a> 점수를 기록하며 텍스트-이미지 3위, 이미지 편집 2위에 올랐습니다. 이전 버전인 MAI-Image-2 대비 전체 <strong>+75점</strong> 향상되었고, 텍스트 렌더링(+107점)과 카툰, 애니메이션, 판타지(+90점)에서 가장 큰 폭으로 개선되었습니다. 아래는 12개 편집 카테고리에서 블라인드 사람 선호 평가로 측정한 MAI-Image-2.5의 승률입니다.</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50.png" data-download-href="https://discuss.pytorch.kr/uploads/default/91a4d69f695a7700a23ecc8743950e5c5a3a0e50" title="MAI-Image-2.5의 12개 편집 카테고리별 블라인드 사람 선호 승률"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50_2_1028x653.png" alt="MAI-Image-2.5의 12개 편집 카테고리별 블라인드 사람 선호 승률" data-base62-sha1="kMqoF7qnzI0poY1HdkdDiM8oeys" width="1028" height="653" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50_2_1028x653.png, https://discuss.pytorch.kr/uploads/default/optimized/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50_2_1542x979.png 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/9/1/91a4d69f695a7700a23ecc8743950e5c5a3a0e50_2_2056x1306.png 2x" data-dominant-color="738179"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">MAI-Image-2.5의 12개 편집 카테고리별 블라인드 사람 선호 승률</span><span class="informations">2140×1360 54.4 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>활용 측면에서 MAI-Image-2.5는 이미 <a href="https://support.microsoft.com/en-us/topic/edit-with-copilot-in-powerpoint-008f17aa-8e5f-4cda-ba6c-0588000bdad7">PowerPoint</a>에서 고품질 이미지 생성에 쓰이고 있고, <a href="https://techcommunity.microsoft.com/blog/onedriveblog/onedrive-photos-restyle-with-ai-now-rolling-out-on-mobile-and-web/4503037">OneDrive</a>에는 정밀 편집 기능으로 순차 적용 중입니다. 가격은 <a href="https://aka.ms/mai-image-2.5-foundrycard">Foundry</a> 기준으로 MAI-Image-2.5가 텍스트 입력 1M 토큰당 $5, 이미지 입력 1M 토큰당 $8, 이미지 출력 1M 토큰당 $47이며, Flash는 각각 $1.75, $1.75, $19.50로 더 저렴합니다. 이미지 생성 및 편집 모델의 최근 흐름은 PyTorchKR의 <a href="https://discuss.pytorch.kr/t/gemini-2-5-flash-image-a-k-a-nano-banana/7590">Gemini 2.5 Flash Image(Nano Banana) 소개</a>와 함께 보면 비교가 쉽습니다.</p>
<h2><a name="p-20154-mai-transcribe-15-9" class="anchor" href="#p-20154-mai-transcribe-15-9" aria-label="Heading link"></a>전사 분야: MAI-Transcribe-1.5</h2>
<p><a href="https://microsoft.ai/news/mai-transcribe-1-5more-accurate-context-aware-and-built-for-production/">MAI-Transcribe-1.5</a>는 MAI 팀이 "세계 최고"라고 자신하는 다국어 음성-텍스트(speech-to-text) 모델입니다. 표준 다국어 벤치마크인 FLEURS에서 <strong>43개 언어에 걸쳐 최고 수준의 단어 오류율(Word Error Rate, WER)</strong> 을 달성했고, 그중 18개 언어에서 1위를 기록하며 GPT-4o-Transcribe, Scribe v2, Gemini 3.1 Flash Lite를 앞섰습니다. 지원 언어는 이전 버전의 25개에서 18개를 더해 43개로 확장되었으면서도 정확도와 품질은 떨어지지 않았습니다.</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd.png" data-download-href="https://discuss.pytorch.kr/uploads/default/ef869a691c9f9671e668359360ded3417b5ae1dd" title="MAI-Transcribe-1.5의 언어별 단어 오류율(WER) 비교 표"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd_2_1028x1721.png" alt="MAI-Transcribe-1.5의 언어별 단어 오류율(WER) 비교 표" data-base62-sha1="yaWv5lzQZvKuniZbs2znEJvbTDn" width="1028" height="1721" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd_2_1028x1721.png, https://discuss.pytorch.kr/uploads/default/optimized/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd_2_1542x2581.png 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/e/f/ef869a691c9f9671e668359360ded3417b5ae1dd_2_2056x3442.png 2x" data-dominant-color="E5E2D3"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">MAI-Transcribe-1.5의 언어별 단어 오류율(WER) 비교 표</span><span class="informations">2140×3584 244 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>속도 역시 강점입니다. MAI-Transcribe-1.5는 <a href="https://artificialanalysis.ai/">Artificial Analysis</a> 리더보드에서 정확도 대비 속도(Accuracy x Speed) 부문 선두에 올랐고, 동급 정확도 모델보다 <strong>최대 5배 빠릅니다</strong>. 특히 긴 오디오에서 효과가 두드러져 <strong>1시간 분량 오디오를 15초 이내</strong>에 전사할 수 있습니다. WER 2.4%로 매우 경쟁이 치열한 공개 벤치마크에서 3위를 차지했습니다.</p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303.png" data-download-href="https://discuss.pytorch.kr/uploads/default/3c80873f7a88b6ddbed960419b2222d25cb7c303" title="Artificial Analysis 리더보드의 단어 오류율(WER) 비교"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303_2_1028x584.png" alt="Artificial Analysis 리더보드의 단어 오류율(WER) 비교" data-base62-sha1="8De1awkUrXDHBhHLGhcs1XAxaw3" width="1028" height="584" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303_2_1028x584.png, https://discuss.pytorch.kr/uploads/default/optimized/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303_2_1542x876.png 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/3/c/3c80873f7a88b6ddbed960419b2222d25cb7c303_2_2056x1168.png 2x" data-dominant-color="DCCCBC"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">Artificial Analysis 리더보드의 단어 오류율(WER) 비교</span><span class="informations">2142×1217 86.5 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p><div class="lightbox-wrapper"><a class="lightbox" href="https://discuss.pytorch.kr/uploads/default/original/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c.png" data-download-href="https://discuss.pytorch.kr/uploads/default/d57e00577e64b4adf2bc9765040dc26735d7754c" title="MAI-Transcribe-1과 1.5의 정확도 및 속도 비교"><img src="https://discuss.pytorch.kr/uploads/default/optimized/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c_2_1028x241.png" alt="MAI-Transcribe-1과 1.5의 정확도 및 속도 비교" data-base62-sha1="usDEMF9zsMgRUBrOH2RJOcxXMEA" width="1028" height="241" srcset="https://discuss.pytorch.kr/uploads/default/optimized/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c_2_1028x241.png, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c_2_1542x361.png 1.5x, https://discuss.pytorch.kr/uploads/default/optimized/3X/d/5/d57e00577e64b4adf2bc9765040dc26735d7754c_2_2056x482.png 2x" data-dominant-color="B8B9B0"><div class="meta"><svg class="fa d-icon d-icon-far-image svg-icon" aria-hidden="true"><use href="#far-image"></use></svg><span class="filename">MAI-Transcribe-1과 1.5의 정확도 및 속도 비교</span><span class="informations">2140×503 23.4 KB</span><svg class="fa d-icon d-icon-discourse-expand svg-icon" aria-hidden="true"><use href="#discourse-expand"></use></svg></div></a></div></p>
<p>엔터프라이즈에 특히 유용한 기능은 <strong>키워드 바이어싱(Keyword Biasing)</strong> 입니다. 사람 이름, 제품명, 의료 용어, 내부 약어처럼 사용자에게 가장 중요한 도메인 특화 단어들은 일반 전사 모델이 자주 틀리는 부분입니다. MAI-Transcribe-1.5는 사용자가 제공한 키워드 목록 쪽으로 예측을 편향시키되, 맹목적으로 끼워 맞추지 않고 공유된 맥락을 보고 언제 바이어싱을 적용할지 스스로 결정합니다. 이 기능을 쓰면 FLEURS 벤치마크에서 WER이 <strong>최대 30% 감소</strong>합니다. 예를 들어 키워드 바이어싱 없이 "Sean", "Oif", "Societal"로 잘못 전사되던 이름들이, "Aisling, Shaun, Xochitl, Søren, Niamh" 같은 키워드 목록을 주면 "Shaun", "Aoife", "Xochitl"처럼 정확히 인식됩니다.</p>
<p>MAI-Transcribe-1.5는 배치(batch) 전사 모델로, 이미 Copilot, Teams, GitHub, Dynamics 365 Contact Center에 통합되었고 <a href="https://aka.ms/mai-transcribe-1.5-foundrycard">Foundry</a>에서도 제공됩니다. 향후 로드맵으로는 다중 화자 오디오에서 "누가 무엇을 말했는지" 구분하는 화자 분리(diarization), 실시간 전사를 위한 네이티브 스트리밍 API, 그리고 추가 언어 지원이 예고되어 있습니다. API 문서와 쿡북은 <a href="https://learn.microsoft.com/en-us/azure/ai-services/speech-service/mai-transcribe">Azure 문서</a>에서 확인할 수 있습니다.</p>
<h2><a name="p-20154-mai-voice-2-voice-2-flash-10" class="anchor" href="#p-20154-mai-voice-2-voice-2-flash-10" aria-label="Heading link"></a>음성 분야: MAI-Voice-2와 Voice-2-Flash</h2>
<p><a href="https://microsoft.ai/news/mai-voice-2expressive-speech-in-10-languages/">MAI-Voice-2</a>는 MAI가 지금까지 만든 가장 표현력 있고 자연스러운 텍스트-음성(text-to-speech) 모델입니다. 충실도, 언어 커버리지, 화자 일관성, 감정 범위 등 프로덕션 음성 경험에 중요한 모든 차원에서 이전 버전을 크게 뛰어넘었습니다. 영어 전용이던 이전과 달리 <strong>15개 언어</strong>를 지원하며, 반가운 점은 그 목록에 <strong>한국어가 포함</strong>된다는 것입니다. (전체 지원 로케일: 영어(미국/호주), 이탈리아어, 프랑스어, 독일어, 힌디어, 스페인어(스페인/멕시코), 포르투갈어(브라질/포르투갈), 한국어, 중국어(간체), 터키어, 러시아어, 태국어, 네덜란드어, 루마니아어, 헝가리어.)</p>
<p>주요 기능은 다음과 같습니다.</p>
<ul>
<li><strong>세밀한 감정 제어</strong>: <code>sad</code>, <code>whispered</code>, <code>excited</code> 같은 감정 태그(emotion tag)로 발화의 정서를 조절합니다.</li>
<li><strong>제로샷 음성 프롬프팅</strong>: 5~60초 분량의 참조 오디오만으로 모든 지원 언어에서 화자의 목소리를 생성하며, 동의(consent) 가드레일이 내장되어 있습니다.</li>
<li><strong>장시간 화자 일관성</strong>: 오디오북, 팟캐스트, 강의처럼 긴 콘텐츠에서도 안정적인 화자 정체성을 유지합니다.</li>
<li><strong>코드 스위칭(Code-switching)</strong>: 힌디어-영어, 스페인어-영어처럼 사람들이 일상에서 자연스럽게 언어를 섞는 방식을 문장 중간에도 운율과 화자 정체성을 잃지 않고 재현합니다.</li>
</ul>
<p>성능 평가에서 MAI-Voice-2는 일대일 선호 테스트에서 이전 버전 MAI-Voice-1보다 <strong>72% 더 선호</strong>되었고, 화자 유사도 평가에서는 합성 음성이 같은 목소리의 실제 녹음과 구별되지 않는 수준에 도달했습니다. 함께 발표된 <strong>MAI-Voice-2-Flash</strong> 는 2026년의 화두인 초저지연 음성 에이전트(Voice Agent)를 위해 최고의 속도 대비 가치를 제공합니다.</p>
<p>안전 측면에서 음성 합성은 시스템 수준에서 동의가 강제되어, 프로덕션에서는 허가되고 라이선스된 목소리만 합성할 수 있으며 무단 음성 복제는 불가능합니다. 모든 출력에는 워터마크가 삽입됩니다. MAI-Voice-2는 <a href="https://playground.microsoft.ai/chat">Foundry</a>와 <a href="https://openrouter.ai/microsoft/mai-voice-2">OpenRouter</a>에서 제공되며 VS Code와 Dynamics 365 Contact Center에 통합되고 있습니다. 온디바이스 다국어 TTS나 음성 복제의 흐름은 PyTorchKR의 <a href="https://discuss.pytorch.kr/t/supertonic-onnx-tts-feat-supertone-ai/10247">Supertonic</a>, <a href="https://discuss.pytorch.kr/t/neutts-air-3-on-device-tts-text-to-speech/7928">NeuTTS Air</a>, <a href="https://discuss.pytorch.kr/t/openai-tts-openai-fm/6801">OpenAI.fm</a> 소개 글과 비교해 보면 흥미롭습니다.</p>
<h2><a name="p-20154-frontier-tuning-rle-11" class="anchor" href="#p-20154-frontier-tuning-rle-11" aria-label="Heading link"></a>당신에게 맞춰지는 모델: Frontier Tuning과 RLE</h2>
<p>MAI 팀은 모델 자체보다 <em>"그 모델로 무엇을 할 수 있는가"</em> 가 더 중요한 변화라고 말합니다. 그 중심에 있는 것이 <a href="https://devblogs.microsoft.com/microsoft365dev/frontier-tuning-teaching-ai-to-work-the-way-you-do/">Frontier Tuning</a>입니다. 실제 업무 환경에서의 강화학습을 통해 AI가 특정 워크플로우의 세부 사항에 처음으로 완전히 적응할 수 있게 되었다는 것입니다.</p>
<p>이 구조에서 가장 가치 있는 데이터는 외부 데이터가 아니라 <strong>당신의 데이터</strong>, 즉 에이전트가 실제 업무를 완수하며 남긴 단계와 결정, 행동의 흔적입니다. MAI는 이를 학습시키는 공간을 <strong>강화학습 환경(Reinforcement Learning Environments, RLE)</strong> 이라 부르며, "오직 당신만 접근할 수 있는 AI 전용 훈련 체육관(training gym)"에 비유합니다. Frontier Tuning으로 당신은 당신의 데이터로, 당신의 환경 안에서, 당신이 통제하는 당신만의 모델을 만들게 되고, 조직의 노하우가 모델의 일부가 되면서도 그 소유권은 당신에게 남습니다.</p>
<p>실제 성과도 제시되었습니다. Microsoft 내부에서 Excel용으로 튜닝한 MAI 모델은 <a href="https://openai.com/">GPT-5.4</a> 수준의 품질을 내면서 <strong>최대 10배 더 효율적</strong>이었고, McKinsey의 까다로운 엔터프라이즈 기준에 맞춰 튜닝했을 때는 테스트한 모든 모델 중 가장 높은 승률을 기록하면서 비용은 약 <strong>10배 낮았습니다</strong>. MAI는 이를 두고, 공유 모델에서 지능을 "임대"하는 방식과 달리 당신이 만든 RLE와 모델이 곧 당신의 해자(moat)가 된다고 표현합니다.</p>
<h2><a name="p-20154-h-12" class="anchor" href="#p-20154-h-12" aria-label="Heading link"></a>메이요 클리닉과의 헬스케어 프런티어 협업</h2>
<p>특히 민감하고 중요한 영역에서는 더 깊은 협력이 필요하다는 인식 아래, Microsoft는 <a href="https://www.mayoclinic.org/">Mayo Clinic</a>과 헬스케어용 프런티어 AI 모델을 공동 개발한다고 발표했습니다. 이 모델은 메이요 클리닉의 세계적 임상 전문성, 비식별화된 임상 데이터, 종단적(longitudinal) 인사이트와 Microsoft의 기반 AI 역량을 결합해, 오늘날의 범용 시스템이 도달할 수 없는 수준의 폭넓은 임상 추론을 목표로 합니다.</p>
<p>모델은 먼저 메이요 클리닉 자체 환경에 배포되어 더 이르고 정확한 진단과 치료 계획 수립을 돕고, 검증을 거친 뒤 <a href="https://azure.microsoft.com/">Azure Foundry</a>를 통해 다른 기관에도 제공될 예정입니다. 중요한 점은 이 모델의 소유권이 메이요 클리닉에 있다는 것으로, 환자 신뢰와 임상적 엄밀성, 안전, 그리고 임상 데이터에 대한 책임 있는 관리라는 양측의 약속을 강조합니다.</p>
<h2><a name="p-20154-h-13" class="anchor" href="#p-20154-h-13" aria-label="Heading link"></a>가격, 접근성, 그리고 안전</h2>
<p>이번 모델 패밀리는 <a href="https://aka.ms/mai-image-2.5-foundrycard">Azure Foundry</a>와 Microsoft 자사 제품에 통합되는 동시에, 개발자를 위해 <a href="https://openrouter.ai/microsoft/mai-image-2.5">OpenRouter</a>, <a href="https://fireworks.ai/">Fireworks</a>, <a href="https://www.baseten.co/blog/mai-thinking-1/">Baseten</a>에서도 제공됩니다. 앞서 언급했듯 개발자가 처음으로 모델 가중치를 직접 튜닝할 수 있게 되었으며, <a href="https://playground.microsoft.ai/chat">MAI Playground</a>에서 모델들을 바로 체험해 볼 수 있습니다.</p>
<p>안전과 보안은 전 모델에 처음부터 내장되었습니다. 음성 모델은 무단 복제에 대한 보호 장치를 포함하고 모든 출력에 워터마크를 넣으며, 과도한 거부(over-refusal)를 줄이고 장애를 가진 사람을 포함한 표현(representation)을 개선했습니다. 다만 이미지 모델은 다른 모든 이미지 모델과 마찬가지로 학습 데이터의 편향을 반영하거나 그럴듯하지만 부정확한 시각적 디테일을 만들 수 있으므로, 신원, 법률, 의료, 금융, 뉴스 관련 맥락에서는 사용 전에 반드시 검토가 필요합니다. MAI는 투명성을 위해 상세한 <a href="https://microsoft.ai/wp-content/uploads/2026/06/main_20260602_2.pdf">기술 보고서</a>와 안전 보고서를 함께 공개했습니다.</p>
<h2><a name="p-20154-h-14" class="anchor" href="#p-20154-h-14" aria-label="Heading link"></a>마치며: 휴머니스트 초지능을 향하여</h2>
<p>MAI 팀은 이번 발표를 단순한 7종 모델 출시가 아니라, 제1원리(first principles)에 기반해 장기적 역량에 집중하는 연구소와 새로운 튜닝, 소유 방식을 함께 제시하는 "AI의 다음 단계"로 규정합니다. 그 궁극적 목표인 <a href="https://microsoft.ai/news/towards-humanist-superintelligence/">휴머니스트 초지능(Humanist Superintelligence)</a>은 사람과 조직을 대체하는 것이 아니라 돕도록 설계된 고도의 AI 시스템을 뜻합니다. 이런 시스템은 어디까지나 인간의 의도에 의해 형성되고, 인간의 감독을 받으며, 인간의 목표에 종속되는 도구로 남아야 한다는 것이 MAI의 입장입니다.</p>
<p>증류에 기대지 않고 깨끗한 데이터로 바닥부터 올라온 모델, 자체 실리콘과의 공동 설계, 그리고 사용자가 소유하고 통제하는 튜닝 방식이라는 세 축은, 성능 경쟁 일변도의 흐름 속에서 "신뢰할 수 있고 통제 가능한 AI"라는 다른 좌표를 제시합니다. 이 힐 클라이밍 머신이 앞으로의 연산과 역량 확장 속에서 실제로 얼마나 꾸준히 정상을 향해 오를지 지켜볼 만합니다.</p>
