version: '3'

tasks:
  config:
    desc: Validate crawler Docker Compose files.
    cmds:
      - '{{.COMPOSE}} config'

  build:
    desc: Build crawler worker images.
    cmds:
      - '{{.COMPOSE}} build --no-cache worker scraper converter indexer'

  up:
    desc: Start crawler workers.
    cmds:
      - SCALE={{.SCALE | default "1"}} {{.COMPOSE}} up -d worker scraper converter indexer

  logs:
    desc: Follow crawler logs.
    cmds:
      - '{{.COMPOSE}} logs -f scraper converter'

  down:
    desc: Stop crawler workers.
    cmds:
      - '{{.COMPOSE}} stop worker scraper converter indexer'

  test:
    desc: Run crawler site tests.
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run test:sites'

  test:urls:
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run test:urls'

  test:mcp:
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} viewer npm run test:mcp'

  login:
    desc: Log into a browser-backed site session.
    cmds:
      - SITE={{.SITE | default "linkedin"}} npx ts-node src/sites/linkedin/Crawler.ts login

  open:
    desc: Open the Playwright browser helper.
    cmds:
      - SITE={{.SITE | default "linkedin"}} npx ts-node src/tools/browser/open.ts

  inspect-layout:
    cmds:
      - npx ts-node src/scripts/inspect-layout.ts

  logout:
    cmds:
      - rm -f {{.ROOT_DIR}}/data/sessions/{{.SITE | default "linkedin"}}.json

  clear-queue:
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run queue:clear'

  queue:status:
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run queue:status'

  queue:dump:
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} -v {{.ROOT_DIR}}/data:/app/data worker npm run queue:dump'

  queue:fix-urls:
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run queue:status'
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run queue:fix-urls'
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run queue:status'

  grep-errors:
    cmds:
      - '{{.COMPOSE}} logs --no-color scraper converter | {{.COMPOSE}} run --rm -T {{.RUN_USER}} worker npm run log:grep-errors'

  gmail:sync:
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} -v {{.ROOT_DIR}}/data/gmail:/data gmail npm run gmail:sync'

  site:
    desc: "Run a crawler site command. Variables: SITE, CMD, PAGE, LIST_SLACK."
    cmds:
      - |
        if [ -z "{{.SITE}}" ] || [ -z "{{.CMD}}" ]; then
          echo "SITE and CMD variables are required. Example: task app:crawler:site SITE=yozm CMD=list"
          exit 1
        fi
        if [ "{{.CMD}}" = "list" ]; then
          {{.COMPOSE}} run --rm {{.RUN_USER}} {{.ENV_COMMON}} worker npm run scrape:{{.SITE}}:list -- --page "{{.PAGE | default "1"}}" --list-slack "{{.LIST_SLACK | default "2"}}"
        elif [ "{{.CMD}}" = "refresh-urls" ]; then
          {{.COMPOSE}} run --rm {{.RUN_USER}} {{.ENV_COMMON}} worker npm run scrape:{{.SITE}}:refresh-urls
        elif [ "{{.CMD}}" = "refresh-silver" ]; then
          {{.COMPOSE}} run --rm {{.RUN_USER}} {{.ENV_COMMON}} worker npm run scrape:{{.SITE}}:refresh-silver
        else
          echo "Unknown crawler command: {{.CMD}}"
          exit 1
        fi

  extract:
    cmds:
      - |
        if [ -z "{{.SITE}}" ] || [ -z "{{.ID}}" ]; then
          echo "SITE and ID variables are required. Example: task app:crawler:extract SITE=yozm ID=3800"
          exit 1
        fi
        {{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run extract:article -- --site {{.SITE}} --id {{.ID}}

  debug:
    cmds:
      - |
        if [ -n "{{.FILE}}" ]; then
          {{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run debug:html -- --file {{.FILE}}
        elif [ -n "{{.SITE}}" ] && [ -n "{{.ID}}" ]; then
          {{.COMPOSE}} run --rm {{.RUN_USER}} worker npm run debug:html -- --site {{.SITE}} --id {{.ID}}
        else
          echo "Either FILE, or SITE and ID variables must be specified."
          echo "Example 1: task app:crawler:debug FILE=tests/sites/yozm/fixtures/3800.html"
          echo "Example 2: task app:crawler:debug SITE=yozm ID=3800"
          exit 1
        fi
