# ==============================================================================
# 🧠 OpenKB Compiler Service Block (Pre-built Image Version)
# ==============================================================================

services:
  openkb:
    build:
      context: ${HOST_PROJECT_PATH:-.}/apps/openkb
      dockerfile: docker/Dockerfile
    container_name: scraper-openkb
    profiles:
      - tools
    environment:
      # OpenAI / litellm 규격을 만족시키기 위한 더미 api_key 주입
      - OPENAI_API_KEY=anything
      - LLM_API_KEY=anything
      - OLLAMA_API_BASE=http://host.docker.internal:11434
      - OPENAI_API_BASE=http://host.docker.internal:11434/v1
      - UV_CACHE_DIR=/tmp/uv_cache
      - HOME=/data/openkb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/openkb:/data/openkb
      - ${HOST_PROJECT_PATH:-.}/data/agents:/data/agents
      - ${HOST_PROJECT_PATH:-.}/data/gitea-wiki:/data/gitea-wiki
      - ${HOST_PROJECT_PATH:-.}/apps/openkb/src:/app/src
    working_dir: /data/openkb
