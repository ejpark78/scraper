version: '3'

tasks:
  config:
    desc: Validate Joplin Docker Compose.
    cmds:
      - '{{.COMPOSE}} config'

  build:
    desc: Build Joplin CLI tool image.
    cmds:
      - '{{.COMPOSE}} build joplin-tool'

  server:sync:
    desc: "Sync Joplin CLI and export notebooks from Joplin Server. Variables: TARGET_PATH."
    cmds:
      - '{{.COMPOSE}} run -i --rm {{.RUN_USER}} -e JOPLIN_SERVER_URL -e JOPLIN_USERNAME -e JOPLIN_PASSWORD -e JOPLIN_DEC_PASSWORD joplin-tool npx ts-node src/joplin.ts server:sync "{{.TARGET_PATH | default "data/joplin"}}"'

  server:push:
    desc: "Push local markdown book to Joplin Server via CLI import/sync. Variables: FROM_PATH, TO_PATH."
    cmds:
      - '{{.COMPOSE}} run -i --rm {{.RUN_USER}} -e JOPLIN_SERVER_URL -e JOPLIN_USERNAME -e JOPLIN_PASSWORD -e JOPLIN_DEC_PASSWORD joplin-tool npx ts-node src/joplin.ts server:push "{{.FROM_PATH}}" "{{.TO_PATH}}"'

  client:sync:
    desc: "Sync/download markdown notebooks from Local Joplin App Web Clipper API. Variables: TARGET_PATH."
    cmds:
      - '{{.COMPOSE}} run -i --rm {{.RUN_USER}} -e JOPLIN_TOKEN -e JOPLIN_API_URL joplin-tool npx ts-node src/joplin.ts client:sync "{{.TARGET_PATH | default "data/joplin"}}"'

  client:push:
    desc: "Push local markdown book to Local Joplin App Web Clipper API. Variables: FROM_PATH, TO_PATH."
    cmds:
      - '{{.COMPOSE}} run -i --rm {{.RUN_USER}} -e JOPLIN_TOKEN -e JOPLIN_API_URL joplin-tool npx ts-node src/joplin.ts client:push "{{.FROM_PATH}}" "{{.TO_PATH}}"'

  shell:
    desc: Open joplin-tool container shell.
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} --entrypoint bash joplin-tool'
