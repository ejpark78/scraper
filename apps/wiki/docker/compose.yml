# ==============================================================================
# 🐳 Module: compose.yml (joplin-tool)
# Description: Docker Compose service definition for Joplin CLI tool
# Last Updated: 2026-07-02
# ==============================================================================

services:
  wiki-tool:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - BUILD_DATE
        - VCS_REF
    image: scraper/wiki-tool:latest
    profiles:
      - tools
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - JOPLIN_SERVER_URL=${JOPLIN_SERVER_URL:-}
      - JOPLIN_USERNAME=${JOPLIN_USERNAME:-}
      - JOPLIN_PASSWORD=${JOPLIN_PASSWORD:-}
      - JOPLIN_DEC_PASSWORD=${JOPLIN_DEC_PASSWORD:-}
      - JOPLIN_API_URL=${JOPLIN_API_URL:-http://host.docker.internal:41184}
      - JOPLIN_TOKEN=${JOPLIN_TOKEN:-}
      - OBSIDIAN_API_URL=${OBSIDIAN_API_URL:-http://host.docker.internal:27123}
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
