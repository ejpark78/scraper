version: '3'

tasks:
  config:
    desc: Validate Wiki Docker Compose.
    cmds:
      - '{{.COMPOSE}} config'

  build:
    desc: Build Wiki CLI tool image.
    cmds:
      - '{{.COMPOSE}} build wiki-tool'

  joplin:server:sync:
    desc: "Sync Joplin CLI and export notebooks from Joplin Server."
    summary: |
      Sync Joplin CLI and export notebooks from Joplin Server.
      
      [Variables]
        - TARGET_PATH: 로컬 마크다운 문서집이 내보내져 저장될 호스트 경로 (기본값: "data/joplin")
        - JOPLIN_SERVER_URL: Joplin Server의 원격 URL (예: https://notes.domain.com)
        - JOPLIN_USERNAME: Joplin Server 계정 이메일 ID
        - JOPLIN_PASSWORD: Joplin Server 계정 비밀번호 (누락 시 대화형 프롬프트 제공)
        - JOPLIN_DEC_PASSWORD: Joplin E2EE 복호화 마스터 패스워드 (옵션)
        
      [Usage Examples]
        - task wiki:joplin:server:sync
        - task wiki:joplin:server:sync TARGET_PATH="data/custom_sync"

  joplin:server:push:
    desc: "Push local markdown book to Joplin Server via CLI import/sync."
    summary: |
      Push local markdown book to Joplin Server via CLI import/sync.
      
      [Variables]
        - FROM_PATH: (필수) 업로드할 로컬 마크다운 서적 디렉터리 경로
        - TO_PATH: (옵션) 생성될 Joplin 노트북 폴더 이름 (미입력 시 책 제목으로 자동 생성)
        - JOPLIN_SERVER_URL: Joplin Server의 원격 URL
        - JOPLIN_USERNAME: Joplin Server 계정 이메일 ID
        - JOPLIN_PASSWORD: Joplin Server 계정 비밀번호 (누락 시 대화형 프롬프트 제공)
        
      [Usage Examples]
        - task wiki:joplin:server:push FROM_PATH="data/ebook/output/python_guide"
        - task wiki:joplin:server:push FROM_PATH="data/ebook/output/python_guide" TO_PATH="Python Programming Wiki"

  joplin:client:sync:
    desc: "Sync/download markdown notebooks from Local Joplin App Web Clipper API."
    summary: |
      Sync/download markdown notebooks from Local Joplin App Web Clipper API.
      
      [Variables]
        - TARGET_PATH: 로컬 마크다운 문서집이 백업/다운로드되어 저장될 경로 (기본값: "data/joplin")
        - JOPLIN_TOKEN: (필수) 호스트 데스크톱 Joplin 앱의 Web Clipper API 인증 토큰 (누락 시 대화형 프롬프트 제공)
        - JOPLIN_API_URL: 호스트 데스크톱 Joplin 앱 Web Clipper API URL (기본값: http://host.docker.internal:41184)
        
      [Usage Examples]
        - task wiki:joplin:client:sync
        - task wiki:joplin:client:sync TARGET_PATH="data/my_backup"

  joplin:client:push:
    desc: "Push local markdown book to Local Joplin App Web Clipper API."
    summary: |
      Push local markdown book to Local Joplin App Web Clipper API.
      
      [Variables]
        - FROM_PATH: (필수) 업로드할 로컬 마크다운 서적 디렉터리 경로
        - TO_PATH: (옵션) 생성될 Joplin 노트북 폴더 이름 (미입력 시 책 제목으로 자동 생성)
        - JOPLIN_TOKEN: (필수) 호스트 데스크톱 Joplin 앱의 Web Clipper API 인증 토큰 (누락 시 대화형 프롬프트 제공)
        - JOPLIN_API_URL: 호스트 데스크톱 Joplin 앱 Web Clipper API URL (기본값: http://host.docker.internal:41184)
        
      [Usage Examples]
        - task wiki:joplin:client:push FROM_PATH="data/ebook/output/git_guide"
        - task wiki:joplin:client:push FROM_PATH="data/ebook/output/git_guide" TO_PATH="Git Guide Notebook"

  obsidian:push:
    desc: "Push local markdown book to Obsidian Vault via Local REST API."
    summary: |
      Push local markdown book to Obsidian Vault via Local REST API.
      
      [Variables]
        - FROM_PATH: (필수) 업로드할 로컬 마크다운 서적 디렉터리 경로
        - TO_PATH: (옵션) 생성될 Obsidian 내 타겟 폴더 이름 (기본값: 책 제목 기준 폴더)
        - OBSIDIAN_API_KEY: (필수) Obsidian Local REST API 커뮤니티 플러그인의 인증 키 (누락 시 대화형 프롬프트 제공)
        - OBSIDIAN_API_URL: Obsidian Local REST API의 호스트 URL (기본값: http://host.docker.internal:27123)
        
      [Usage Examples]
        - task wiki:obsidian:push FROM_PATH="data/ebook/output/rust_guide"
        - task wiki:obsidian:push FROM_PATH="data/ebook/output/rust_guide" TO_PATH="Rust Guide Vault"

  shell:
    desc: Open wiki-tool container shell.
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} --entrypoint bash wiki-tool'
