version: '3'

includes:
  autoheal:
    taskfile: ./autoheal/Taskfile.yml
    dir: ./infra/autoheal
  gitea:
    taskfile: ./gitea/Taskfile.yml
    dir: ./infra/gitea
  meilisearch:
    taskfile: ./meilisearch/Taskfile.yml
    dir: ./infra/meilisearch
  mongodb:
    taskfile: ./mongodb/Taskfile.yml
    dir: ./infra/mongodb
  redis:
    taskfile: ./redis/Taskfile.yml
    dir: ./infra/redis
  traefik:
    taskfile: ./traefik/Taskfile.yml
    dir: ./infra/traefik

tasks:
  meili:refresh-index:
    desc: "Sync MongoDB Silver documents to Meilisearch. Variables: SITE."
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npx ts-node src/scripts/meili-manager.ts {{if .SITE}}--site {{.SITE}}{{end}}'

  meili:reset-index:
    desc: "Clear and rebuild Meilisearch index. Variables: SITE."
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npx ts-node src/scripts/meili-manager.ts --clean {{if .SITE}}--site {{.SITE}}{{end}}'

  meili:reindex:
    desc: "Alias for infra:meili:reset-index. Variables: SITE."
    cmds:
      - task infra:meili:reset-index SITE={{.SITE}}

  meili:status:
    desc: Check Meilisearch index statistics.
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker node -e "const key=process.env.MEILI_MASTER_KEY; fetch(''http://meilisearch:7700/stats'', {headers: key ? {Authorization: ''Bearer '' + key} : {}}).then(r => r.json()).then(d => console.log(JSON.stringify(d, null, 2))).catch(e => { console.error(e.message); process.exit(1); })"'

  mongo:dump:
    desc: "Back up MongoDB databases. Variables: DB, DUMP_DIR."
    cmds:
      - |
        DB_VALUE="{{.DB | default "bronze,silver,crawler"}}"
        DUMP_DIR_VALUE="{{.DUMP_DIR | default "data/backup/mongodb/manual"}}"
        mkdir -p "$DUMP_DIR_VALUE"
        {{.COMPOSE}} exec -T mongodb sh -c "rm -rf /tmp/mongodb_backup && mkdir -p /tmp/mongodb_backup"
        for db in $(echo "$DB_VALUE" | tr ',' ' '); do
          {{.COMPOSE}} exec -T mongodb mongodump --db="$db" --gzip --out=/tmp/mongodb_backup
        done
        {{.COMPOSE}} cp mongodb:/tmp/mongodb_backup/. "$DUMP_DIR_VALUE"
        {{.COMPOSE}} exec -T mongodb rm -rf /tmp/mongodb_backup

  mongo:restore:
    desc: "Restore MongoDB backup. Variables: BACKUP_DIR."
    cmds:
      - |
        if [ -z "{{.BACKUP_DIR}}" ]; then
          echo "BACKUP_DIR is required. Example: task infra:mongo:restore BACKUP_DIR=data/backup/mongodb/manual"
          exit 1
        fi
        {{.COMPOSE}} exec -T mongodb sh -c "rm -rf /tmp/mongodb_restore"
        {{.COMPOSE}} cp "{{.BACKUP_DIR}}" mongodb:/tmp/mongodb_restore
        {{.COMPOSE}} exec -T mongodb mongorestore --gzip /tmp/mongodb_restore
        {{.COMPOSE}} exec -T mongodb rm -rf /tmp/mongodb_restore

  mongo:index:
    desc: Synchronize MongoDB indexes.
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npx ts-node src/scripts/sync-indexes.ts'

  mongo:show-columns:
    desc: Map MongoDB collection columns.
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npx ts-node src/scripts/show_collection_columns.ts'
