version: '3'

includes:
  autoheal:
    taskfile: ./autoheal/Taskfile.yml
    dir: ./infra/autoheal
  gitea:
    taskfile: ./gitea/Taskfile.yml
    dir: ./infra/gitea
  meilisearch:
    taskfile: ./meilisearch/Taskfile.yml
    dir: ./infra/meilisearch
  mongodb:
    taskfile: ./mongodb/Taskfile.yml
    dir: ./infra/mongodb
  redis:
    taskfile: ./redis/Taskfile.yml
    dir: ./infra/redis
  traefik:
    taskfile: ./traefik/Taskfile.yml
    dir: ./infra/traefik

tasks:
  meili:refresh-index:
    desc: "Sync MongoDB Silver documents to Meilisearch."
    summary: |
      Sync MongoDB Silver documents to Meilisearch indexes.
      
      [Variables]
        - SITE: (옵션) 인덱싱을 동기화할 특정 사이트명 (미지정 시 전체 사이트 동기화)
        
      [Usage Examples]
        - task infra:meili:refresh-index
        - task infra:meili:refresh-index SITE="geeknews"
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npx ts-node src/scripts/meili-manager.ts {{if .SITE}}--site {{.SITE}}{{end}}'

  meili:reset-index:
    desc: "Clear and rebuild Meilisearch index."
    summary: |
      Clean existing Meilisearch indexes and rebuild them from MongoDB Silver collection.
      
      [Variables]
        - SITE: (옵션) 인덱스를 완전 리셋하고 재생성할 특정 사이트명
        
      [Usage Examples]
        - task infra:meili:reset-index
        - task infra:meili:reset-index SITE="yozm"
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npx ts-node src/scripts/meili-manager.ts --clean {{if .SITE}}--site {{.SITE}}{{end}}'

  meili:reindex:
    desc: "Alias for infra:meili:reset-index."
    summary: |
      Shortcut alias for rebuilding Meilisearch index.
      
      [Variables]
        - SITE: (옵션) 인덱싱할 특정 사이트명
        
      [Usage Examples]
        - task infra:meili:reindex SITE="gpters"
    cmds:
      - task infra:meili:reset-index SITE={{.SITE}}

  meili:status:
    desc: Check Meilisearch index statistics.
    summary: |
      Fetch and output index stats, document counts, and memory layout of Meilisearch.
      
      [Usage Examples]
        - task infra:meili:status
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker node -e "const key=process.env.MEILI_MASTER_KEY; fetch(''http://meilisearch:7700/stats'', {headers: key ? {Authorization: ''Bearer '' + key} : {}}).then(r => r.json()).then(d => console.log(JSON.stringify(d, null, 2))).catch(e => { console.error(e.message); process.exit(1); })"'

  mongo:dump:
    desc: "Back up MongoDB databases."
    summary: |
      Generate gzip compressed backups of MongoDB databases on the host system.
      
      [Variables]
        - DB: (옵션) 백업할 대상 데이터베이스 이름 (기본값: "bronze,silver,crawler" 멀티 지정)
        - DUMP_DIR: (옵션) 백업본이 저장될 호스트 경로 (기본값: "data/backup/mongodb/manual")
        
      [Usage Examples]
        - task infra:mongo:dump
        - task infra:mongo:dump DB="silver" DUMP_DIR="data/backup/mongodb/manual_silver"
    cmds:
      - |
        DB_VALUE="{{.DB | default "bronze,silver,crawler"}}"
        DUMP_DIR_VALUE="{{.DUMP_DIR | default "data/backup/mongodb/manual"}}"
        mkdir -p "$DUMP_DIR_VALUE"
        {{.COMPOSE}} exec -T mongodb sh -c "rm -rf /tmp/mongodb_backup && mkdir -p /tmp/mongodb_backup"
        for db in $(echo "$DB_VALUE" | tr ',' ' '); do
          {{.COMPOSE}} exec -T mongodb mongodump --db="$db" --gzip --out=/tmp/mongodb_backup
        done
        {{.COMPOSE}} cp mongodb:/tmp/mongodb_backup/. "$DUMP_DIR_VALUE"
        {{.COMPOSE}} exec -T mongodb rm -rf /tmp/mongodb_backup

  mongo:restore:
    desc: "Restore MongoDB backup."
    summary: |
      Restore MongoDB databases from gzip compressed dump files.
      
      [Variables]
        - BACKUP_DIR: (필수) 복원할 백업본 폴더 경로
        
      [Usage Examples]
        - task infra:mongo:restore BACKUP_DIR="data/backup/mongodb/manual"
    cmds:
      - |
        if [ -z "{{.BACKUP_DIR}}" ]; then
          echo "BACKUP_DIR is required. Example: task infra:mongo:restore BACKUP_DIR=data/backup/mongodb/manual"
          exit 1
        fi
        {{.COMPOSE}} exec -T mongodb sh -c "rm -rf /tmp/mongodb_restore"
        {{.COMPOSE}} cp "{{.BACKUP_DIR}}" mongodb:/tmp/mongodb_restore
        {{.COMPOSE}} exec -T mongodb mongorestore --gzip /tmp/mongodb_restore
        {{.COMPOSE}} exec -T mongodb rm -rf /tmp/mongodb_restore

  mongo:index:
    desc: Synchronize MongoDB indexes.
    summary: |
      Scan collections and synchronize index structures configured in codebase.
      
      [Usage Examples]
        - task infra:mongo:index
    cmds:
      - '{{.COMPOSE}} run --rm {{.RUN_USER}} worker npx ts-node src/scripts/sync-indexes.ts'

  mongo:show-columns:
    desc: Map MongoDB collection columns.
    summary: |
      Analyses collection documents to map unique field columns and print schema matrix.
      
      [Usage Examples]
        - task infra:mongo:show-columns
