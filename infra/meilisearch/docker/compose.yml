# ==============================================================================
# 🔍 Meilisearch Service Block (Full-text Search Engine)
# ==============================================================================
# - 용도: 고속 텍스트 검색 및 다국어 필터링 전용 검색엔진
# - 볼륨: 프로젝트 루트의 `data/.services/meilisearch` 경로에 데이터 보존
# - 라우팅: Traefik 프록시를 통해 TLS 라우팅 서비스 (포트 7700)
# - 접속 URL: https://search.localhost 또는 https://search.127.0.0.1.nip.io
# ==============================================================================

services:
  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      - TZ=Asia/Seoul
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/.services/meilisearch:/meili_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meilisearch.rule=Host(`search.localhost`) || Host(`search.127.0.0.1.nip.io`)"
      - "traefik.http.routers.meilisearch.entrypoints=websecure"
      - "traefik.http.routers.meilisearch.tls=true"
      - "traefik.http.services.meilisearch.loadbalancer.server.port=7700"
