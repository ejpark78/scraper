# ==============================================================================
# 🐙 Gitea Service Block (Local Git Mirroring & Hosting)
# ==============================================================================
# - 주소: https://gitea.localhost/
# - DB: SQLite3 내장 데이터베이스
# - 데이터 경로: ${HOST_PROJECT_PATH}/data/.services/gitea
# ==============================================================================

services:
  gitea:
    image: gitea/gitea:1.26-rootless
    profiles:
      - tools
    depends_on:
      traefik:
        condition: service_healthy      
    environment:
      - GITEA__database__DB_TYPE=${GITEA_DATABASE_DB_TYPE:-sqlite3}
      - GITEA__database__PATH=${GITEA_DATABASE_PATH:-/data/gitea/gitea.db}
      - GITEA__server__ROOT_URL=${GITEA_SERVER_ROOT_URL:-https://gitea.localhost/}
      - GITEA__server__SSH_PORT=${GITEA_SERVER_SSH_PORT:-2222}
      - GITEA__server__DOMAIN=${GITEA_SERVER_DOMAIN:-gitea.localhost}
      - GITEA__security__INSTALL_LOCK=${GITEA_SECURITY_INSTALL_LOCK:-true}
      - GITEA__security__ADMIN_USERNAME=${GITEA_SECURITY_ADMIN_USERNAME:-gitea-admin}
      - GITEA__security__ADMIN_PASSWORD=${GITEA_SECURITY_ADMIN_PASSWORD:-admin12345}
      - GITEA__security__ADMIN_EMAIL=${GITEA_SECURITY_ADMIN_EMAIL:-admin@example.com}
      - GITEA__actions__ENABLED=${GITEA_ACTIONS_ENABLED:-true}
      - GITEA__repository.unit__DISABLED_REPOSITORY_UNITS=${GITEA_REPOSITORY_UNIT_DISABLED_REPOSITORY_UNITS:-}
      - GITEA__repository.unit__DEFAULT_REPOSITORY_UNITS=${GITEA_REPOSITORY_UNIT_DEFAULT_REPOSITORY_UNITS:-code,issues,pulls,releases,wiki}
      - TZ=${TZ:-Asia/Seoul}
    volumes:
      - ${HOST_PROJECT_PATH:-.}/data/.services/gitea/data:/data
      - ${HOST_PROJECT_PATH:-.}/data/.services/gitea/repositories:/var/lib/gitea/git
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`gitea.localhost`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls=true"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"

  gitea_runner:
    image: gitea/act_runner:latest
    profiles:
      - tools
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      - GITEA_INSTANCE_URL=${GITEA_INSTANCE_URL:-http://gitea:3000}
      - GITEA_RUNNER_REGISTRATION_TOKEN_FILE=${GITEA_RUNNER_REGISTRATION_TOKEN_FILE:-/data/token}
      - GITEA_RUNNER_NAME=${GITEA_RUNNER_NAME:-local-runner}
      - GITEA_RUNNER_LABELS=${GITEA_RUNNER_LABELS:-ubuntu-latest:docker://node:18-bullseye,ubuntu-22.04:docker://node:18-bullseye}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_PROJECT_PATH:-.}/data/.services/gitea/act_runner:/data
    restart: unless-stopped
